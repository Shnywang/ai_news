h_time":"2026-07-04"},{"title":"Tesla Optimus Latest Version 2026: Official Humanoid Robot","source":"optimusk.blog","url":"https://optimusk.blog/blog/tesla-optimus-humanoid-robot-latest-version-2026","summary":"Optimus V3详细参数：173cm/57kg/22DoF手/50驱动器/AI5芯片(5x带宽)/Grok语音/1.2m/s/37关节/2-3万美元目标","category":"竞对参数","rating":5,"publish_time":"2026-07-01"}]},"2026-07-07":{"update_time":"2026-07-07T11:00:00+08:00","hot_topics":[{"title":"MACHINA 2026巴黎物理AI峰会开幕：特斯拉Optimus Gen3+波士顿动力Atlas+Figure 02同台欧洲首秀","source":"东方财富/央广网/雪球","url":"https://caifuhao.eastmoney.com/news/20260707090626622081340","summary":"7月7日，欧洲首届专注物理AI与具身智能的行业峰会MACHINA Summit在法国巴黎Station F举办。四大主题分论坛：Humanoid人形机器人/Industrial工业自主智能/Training机器人训练体系/Integration软硬件集成。特斯拉Optimus Gen3(欧洲首秀行走/抓取/交互演示)、波士顿动力新一代Atlas(负重/跳跃/工地作业)、Figure 02、1X NEO、Apptronik Astra同台真机演示。英伟达Jetson Thor人形专用计算平台欧洲宣讲，Google DeepMind具身大模型+端到端控制方案，AMD Instinct MI300X物理AI推理加速。优必选/智元作为中国唯一万台量产企业登上欧洲主场。产业+投资闭门对接面向创始人/高管/VC。","category":"国际峰会","rating":5,"philosophy_insight":{"framework":"对立统一 + 否定之否定 + 具身认知","analysis":"✅正题：过去三年人形机器人展会主要在中国(上海CIEI/北京WRC)和美国(CES)，欧洲在具身智能产业中相对边缘。❌反题：MACHINA作为欧洲首届物理AI峰会，把全球顶尖人形机器人(Optimus/Atlas/Figure/1X/Apptronik)集中到巴黎同台演示——欧洲从「旁观者」变为「主场」。💡合题：从「中美主导(2023-2025)→欧洲加入(2026)」，全球具身智能产业格局完成否定之否定——三方竞争格局形成。对立统一：「美国机器人(Optimus/Atlas/Figure)」vs「中国机器人(优必选/智元)」的对立面，在「MACHINA欧洲主场」的统一舞台上被展示——竞争从双边变多边。具身认知：MACHINA的口号「Where Intelligence meets the Physical World」本质是具身认知的宣言——智能必须走进物理世界，AI从云端走向身体。","verdict":"MACHINA标志欧洲正式加入全球具身智能竞争，Optimus/Atlas/Figure同台欧洲首秀定义下半年产业节奏"}},{"title":"三星Q2营业利润飙升18倍创历史新高：AI驱动存储芯片超级周期，Q3计划DRAM再涨20%","source":"财联社/腾讯新闻/网易","url":"https://new.qq.com/rain/a/20260707A029BM00","summary":"7月7日三星电子发布2026年Q2初步业绩：营业利润89.4万亿韩元(约584亿美元)，同比飙升1810%(18倍)，超预期87.3万亿，连续三季度创纪录，超过2023-2025三年利润总和。营收171万亿韩元同比增129%。AI需求从HBM扩展至传统DRAM和NAND，Q2 DRAM均价环比涨44%、NAND涨53%。三星正推动Q3 DRAM均价再涨20%，LPDDR涨幅或超20%。HBM产能快速扩张挤压传统内存供给，客户寻求长期供应协议。A股存储龙头江波龙预计H1净利92-110亿元同比增622-743倍，营收220-250亿元。科创芯片ETF汇添富连续两日净申购超10亿。","category":"芯片产业","rating":5,"philosophy_insight":{"framework":"否定之否定 + 对立统一 + 目的论","analysis":"✅正题：2023-2024年存储芯片行业处于低谷，三星利润大幅下滑，市场预期存储周期复苏缓慢。❌反题：AI需求爆发彻底改变了存储芯片的周期逻辑——HBM产能扩张挤压传统DRAM/NAND供给，AI训练和推理对高端+传统芯片需求同时激增，供需错配推动价格暴涨。💡合题：从「传统周期(2023低谷)→AI超级周期(2025-2026)」，存储芯片完成否定之否定——AI不是周期性需求而是结构性需求。对立统一：「HBM(AI专用/高利润)」vs「传统DRAM/NAND(通用/供给被挤压)」的对立面，在「AI需求扩散」的统一趋势下被重新定价——传统存储因供给被挤压反而涨价。目的论：三星Q3再涨20%的目标论是「AI驱动的存储超级周期至少持续到2027年新增产能放量」——这不是短期涨价而是产业格局重塑。江波龙622倍利润增长是这一逻辑在A股的映射。","verdict":"AI驱动存储芯片进入超级周期，三星18倍利润增长证明AI需求是结构性而非周期性，传统存储因HBM产能挤压反而受益"}},{"title":"谷歌Gemini 3.5 Pro定档7月17日：废弃旧基座从头重训，200万上下文+深度思考，前端碾压Fable 5","source":"腾讯新闻/新浪科技/Chinaz","url":"https://new.qq.com/rain/a/20260706A09XSH00","summary":"谷歌DeepMind将Gemini 3.5 Pro发布推迟至7月17日，原因：废弃Gemini 2.5 Pro旧基座，从头重新预训练(非微调/非放大版)。200万Token上下文窗口(Flash版100万的两倍，Claude Fable 5的8倍)，全新「深度思考」推理模式(生成前多轮内部推理+自我修正)。泄露信息显示：前端/SVG生成/视觉代码能力「mogging」(彻底压制)Fable 5；但智能体任务/仓储级工程/长链路推理仍落后Fable 5和GPT-5.6。同步开发Nano Banana Pro图像模型剑指GPT-Image 2。7月17日恰逢DeepSeek V4正式版发布窗口，中外旗舰同台竞技。谷歌I/O大会跳票后核心AI研究员离职投奔竞争对手，团队士气一度跌至冰点。","category":"前沿模型","rating":5,"philosophy_insight":{"framework":"否定之否定 + 扬弃 + 证伪主义","analysis":"✅正题：谷歌曾是AI领军者(Transformer论文/BERT/T5)，但GPT时代被OpenAI超越，Gemini系列一直在追赶。❌反题：Gemini 3.5 Pro废弃旧基座从头重训是扬弃——取消沿用2.5 Pro基座的「挤牙膏」路径，保留世界知识广度优势，提升为全新底座的重大升级。推迟两个月选择质量而非速度，是对「快速迭代」范式的否定。💡合题：从「追赶OpenAI(2023-2025)→废弃旧基座重训(2026H1)→全新底座发布(7月17日)」，谷歌完成否定之否定——不再微调旧模型追赶，而是从地基重建。证伪主义：「前端碾压Fable 5但推理仍落后」证伪了「一个模型在所有维度都领先」的假设——AI模型竞争进入「偏科」时代，不同模型在不同维度各有优势。7月17日与DeepSeek V4同台竞技将是对中外大模型实力差距的最新验证。","verdict":"Gemini 3.5 Pro从头重训是谷歌对追赶战略的根本性反思，200万上下文+深度思考是差异化武器，7月17日与DeepSeek V4同台是中外旗舰直接对话"}},{"title":"GPT-5.6 Sol预计今日全面开放：白宫AI标准框架即将发布，OpenAI从政府限制定向走向标准共建","source":"Hacker News/AI科技资讯日报","url":"http://mp.weixin.qq.com/count/oIWsFt-H-F7OkyuFMVMYvxoOv5mg/2456844939/1/AAAAAN5ecUz8HSRKx7TNh-Sg8mc","summary":"OpenAI计划7月7-9日窗口内向公众全面开放GPT-5.6 Sol旗舰模型，最可能即7月7日(抓住假期后客户回流窗口)。此前6月27日发布时被美国政府要求限制为「trusted partner limited preview」，仅约20家审批合作方可访问。GPT-5.6 Sol Terminal-Bench 2.1标准模式88.8%超越Claude Mythos 5的88.0%，Ultra模式91.9%。1.5M上下文，Cerebras晶圆级推理750 tokens/秒(约GPT-5.5的15倍)。三模型(Sol/Terra/Luna)全部标High Risk(网络安全+生物安全)，Sol网络安全挑战96.7%、病毒学55.5%远超31%专家级基线。白宫AI标准框架即将发布，OpenAI从被政府限制转向参与标准共建。","category":"前沿模型","rating":4,"philosophy_insight":{"framework":"否定之否定 + 对立统一 + 语言游戏","analysis":"✅正题：6月27日GPT-5.6 Sol发布时被美国政府限制为「trusted partner limited preview」——首个被政府干预分发的前沿AI模型。❌反题：7月7日全面开放标志OpenAI从「被政府限制」转向「参与标准共建」——白宫AI标准框架即将发布，OpenAI可能成为标准制定的参与者而非被管制对象。💡合题：从「政府限制(6月27日)→全面开放(7月7日)→标准共建(即将)」，OpenAI完成否定之否定——限制不是终点而是标准协商的起点。对立统一：「AI安全风险(High Risk标注)」vs「AI商业开放(全面开放)」的对立面，在「白宫AI标准框架」的统一治理框架下被平衡。语言游戏分析：「High Risk」标注是AI安全治理的新语言——不是禁止使用而是标记风险等级，从「禁止/允许」二分法转向「分级治理」的连续光谱。","verdict":"GPT-5.6 Sol全面开放标志AI治理从政府限制转向标准共建，High Risk分级治理成为新范式"}},{"title":"Sanctuary AI发布Phoenix Gen 7人形机器人：24小时内学会新任务，液压驱动+Carbon认知系统","source":"The Agent Times","url":"https://theagenttimes.com/agents/article/sanctuary-ai-unveils-phoenix-gen-7-humanoid-robot-with-sub-2-bc06f578","summary":"加拿大温哥华Sanctuary AI发布Phoenix Gen 7通用人形机器人平台，核心突破：新任务学习时间从数周压缩至24小时以内。液压驱动设计接近人类级力量和柔性，手部工程化实现接近人类灵巧度(区别于多数竞品的平行夹爪)。搭载自研Carbon认知系统AI控制栈。累计融资超1.4亿美元。从Gen 6到Gen 8原型快速迭代(2023-2024每代提升灵巧性/液压驱动/板载AI推理)。定位通用工业平台而非单一重复动作。技术评论人Ronald van Loon(@Ronald_vanLoon，X上最有影响力的AI评论者之一)7月4日分享演示视频放大传播。","category":"机器人突破","rating":4,"philosophy_insight":{"framework":"具身认知 + 否定之否定 + 扬弃","analysis":"✅正题：传统工业机器人学习新任务需要数周示教编程+强化学习调优，部署成本高、灵活性差。❌反题：Phoenix Gen 7将新任务学习时间压缩至24小时——从「周」到「天」是数量级提升，接近「人教一次就会」的具身认知理想。💡合题：从「示教编程(数周)→强化学习(数天)→Carbon认知系统(24小时)」，机器人任务学习完成否定之否定——越来越接近人类幼童的「看一次就会」能力。扬弃分析：Sanctuary扬弃了「平行夹爪+简单动作」的旧范式——取消简化手部的设计妥协，保留液压驱动的人类级力量，提升为「接近人类灵巧度的工程化手部」。具身认知分析：24小时学习能力的本质是具身认知闭环的加速——感知(传感器阵列)→认知(Carbon系统)→执行(液压驱动)的回路效率大幅提升，使机器人能在少量演示中提取任务抽象。","verdict":"Phoenix Gen 7的24小时任务学习是人形机器人从定制部署走向通用部署的关键里程碑，液压驱动+灵巧手是差异化路线"}},{"title":"VAST完成超10亿元A3轮融资：AI 3D世界模型赛道升温，吉利/巨人/成都科创投等齐聚","source":"上海证券报/金融投资报","url":"https://gu.qq.com/resources/shy/news/detail-v2/index.html?t=1#/index?_tentrees_trans=0&id=SN20260706191919b653a77a","summary":"北京三启万物科技有限公司(VAST)宣布完成超10亿元A3战略轮融资，累计融资超4亿美元(6轮)。专注AI 3D大模型与通用世界模型研发。投资阵容：吉利资本领投+4399/贪玩游戏/巨人网络(游戏厂商)+亦邦国投/基石资本/毅达资本/成都科创投/策源资本(机构+地方基金)+老股东渊策资本/元生资本追加。客户覆盖阿里/腾讯/网易/拓竹/优必选。应用场景：游戏/XR/3D打印/汽车座舱/工业设计。AI 3D资产从「锦上添花」变为「稀缺资源」。成都科创投此次投资是四川社保科创基金(50.65亿规模)首笔投资交割。策源资本管理规模超200亿参与组建超2000亿产业基金群。","category":"资本密集","rating":4,"philosophy_insight":{"framework":"对立统一 + 语言游戏 + 目的论","analysis":"✅正题：AI 3D生成过去被认为是「锦上添花」的辅助工具——2D AI生成(文本/图像/视频)是主流，3D生成因技术难度高被边缘化。❌反题：VAST 10亿融资+吉利/巨人/成都科创投等跨行业资本齐聚，证明AI 3D正从「锦上添花」变为「稀缺资源」——游戏/XR/3D打印/汽车座舱/工业设计多场景同时爆发。💡合题：「3D世界模型」正在成为AI产业的新叙事——从2D内容生成(文本/图像/视频)到3D空间生成，AI从「平面智能」走向「空间智能」。对立统一：「2D AI(主流/成熟)」vs「3D AI(边缘/新兴)」的对立面，在「世界模型」的统一叙事下被重新定义——3D世界模型是具身智能的「训练环境」。语言游戏分析：「世界模型」这个概念正在从机器人领域(大晓Kairos/千寻Spirit)扩散到3D生成领域(VAST)——同一个词在不同语境下意味着不同的东西，但都在指向「AI对物理世界的理解能力」。目的论：成都社保科创基金首笔投资瞄准AI 3D，说明「耐心资本」的目的论是「前沿技术从实验室到产业端的加速变现」。","verdict":"VAST 10亿融资标志AI 3D世界模型从边缘走向主流，3D资产成为多场景稀缺资源，世界模型叙事从机器人扩展到3D生成"}},{"title":"6月机器人赛道59起融资27起过亿：世航智能10亿A轮创海洋机器人纪录，朱啸虎连续五轮追投","source":"腾讯新闻/具身智能日报/中国基金报","url":"https://new.qq.com/rain/a/20260706A06DWD00","summary":"6月机器人赛道共59起融资，27起金额过亿。世航智能完成超10亿元A轮融资(全球海洋机器人最大单轮)，朱啸虎金沙江创投连续五轮追投(继滴滴/小红书后再次连续押注)。世航专注0-10000米全海深全自由度海洋机器人，虎鲸系列(船舶清洗效率全球第一，已在上千艘船舶规模化应用)+虎鲨系列(水面高速巡逻/环境监测)。2026年上半年获超10亿订单。4月发布海洋具身大模型「沧穹CEORION」。投资方含淡马锡Vertex Growth/中信农业产业基金/大洋电机/上河动量基金(摩尔线程/昆仑芯产业方)。朱啸虎此前公开退出人形机器人赛道，称商业化路径不清晰，但对海洋机器人连续追投。","category":"资本密集","rating":4,"philosophy_insight":{"framework":"否定之否定 + 对立统一 + 证伪主义","analysis":"✅正题：朱啸虎此前公开表示「正批量退出人形机器人赛道」，称商业化路径不清晰——引发行业争议。❌反题：朱啸虎对世航智能连续五轮追投(10亿A轮)——不是「退出机器人」而是「退出人形机器人」，选择商业化路径清晰的垂直场景(海洋)。💡合题：从「投人形机器人(通用/商业化不清晰)→退出人形→投海洋机器人(垂直/商业化清晰)」，朱啸虎的投资逻辑完成否定之否定——不是不投机器人，而是投「能赚钱的机器人」。证伪主义：世航智能10亿订单+上千艘船舶应用证伪了「机器人只能做demo不能赚钱」的假设——垂直场景的机器人已经实现商业化。对立统一：「人形机器人(通用/烧钱)」vs「海洋机器人(垂直/盈利)」的对立面，在「具身智能商业化」的统一目标下被重新评估——投资人开始用ROI而非叙事来定价。沧穹CEORION海洋具身大模型说明垂直场景也需要「大脑」。","verdict":"世航智能10亿融资证伪机器人不能赚钱的假设，朱啸虎从退出人形到追投海洋说明资本从叙事定价转向ROI定价"}},{"title":"Anthropic自研芯片深度解析：440亿ARR但71%烧在算力，三星2nm是生存战而非战略选择","source":"同花顺/Deep Topic","url":"https://news.10jqka.com.cn/deep-topic/topic/dt_01KWKDWHNBDCP4VQDWZXRQT3G7","summary":"Anthropic自研AI芯片深度分析：年化经常性收入(ARR)约440亿美元，但算力成本占收入比约71%(行业估算)——每赚1美元烧掉71美分算力。台积电2026年先进制程涨价5-10%，英伟达产能扩张有上限，需求非线性增长碰上供给线性扩张。OpenAI Jalapeño已发布(6月)2026H2部署，竞争对手已开始锁定制程和产能。项目仍处方案规划极早期，芯片用途和性能目标未确定。三星2nm制程+先进封装洽谈中，从OpenAI挖来初代自研芯片核心Clive Chan。Anthropic称现有NVIDIA/Google/Amazon算力「仍将是核心」，自研为补充。台积电涨价+英伟达排队+OpenAI已出牌=自研是财务必答题。","category":"AI芯片","rating":4,"philosophy_insight":{"framework":"对立统一 + 目的论vs机械论 + 证伪主义","analysis":"✅正题：AI模型公司依赖英伟达GPU——模型公司做模型，芯片公司做芯片，分工明确且高效。❌反题：440亿ARR但71%烧在算力——当每赚1美元就要烧掉71美分算力成本时，自研芯片不是战略选择题而是财务必答题。💡合题：从「买GPU(2022-2024)→自研芯片(2025-2026)」，AI模型公司完成从纯软件到全栈的否定之否定。对立统一：「模型能力(软件/非线性增长)」vs「算力供给(硬件/线性扩张)」的对立面，在「自研芯片」的统一战略下被整合——软件公司反向入侵硬件。目的论vs机械论：目的论端是「降低推理成本提升Agent效率」，机械论端是「三星2nm+Clive Chan+方案规划极早期」——目的清晰但机械实现仍在纸面。证伪主义：71%算力成本占比证伪了「AI模型公司只靠软件就能盈利」的假设——没有芯片层的成本控制，模型公司的利润率永远被算力吞噬。","verdict":"Anthropic自研芯片是71%算力成本倒逼的财务必答题，三星2nm+OpenAI挖角说明全栈化已是AI巨头生存战"}}],"startup_board":{"companies":[{"name":"VAST(三启万物)","field":"AI 3D大模型/世界模型","route":"AI 3D资产生成，覆盖游戏/XR/3D打印/汽车座舱/工业设计","funding":"超10亿A3轮，累计超4亿美元(6轮)","verdict":"3D资产从锦上添花变稀缺资源，吉利/巨人/成都科创投齐聚"},{"name":"世航智能","field":"海洋具身智能机器人","route":"0-10000米全海深全自由度，虎鲸(船舶清洗)+虎鲨(水面巡逻)，沧穹CEORION海洋大模型","funding":"超10亿A轮(全球海洋机器人最大单轮)，朱啸虎连续五轮追投","verdict":"2026上半年超10亿订单，上千艘船舶规模化应用，商业化已验证"},{"name":"Sanctuary AI","field":"通用人形机器人","route":"液压驱动+Carbon认知系统+近人类灵巧度手部，24小时任务学习","funding":"累计超1.4亿美元","verdict":"从数周到24小时学习是通用部署里程碑，加拿大路线差异化"},{"name":"星动纪元","field":"具身智能(全栈)","route":"AI Native全栈自研，数据-大脑-运控-灵巧手-本体","funding":"两月连融三轮近25亿，估值破百亿","verdict":"清华唯一直接持股，国家级国资密集入场"}],"trend":"6月机器人赛道59起融资27起过亿，资本从「人形通用」分流到「垂直场景」——世航智能(海洋/10亿)、VAST(3D世界模型/10亿)、Sanctuary AI(液压人形/1.4亿)。朱啸虎从退出人形到追投海洋说明资本定价逻辑从叙事转向ROI。3D世界模型(VAST)成为新热点，跨行业资本(吉利/巨人/成都科创投)涌入。存储芯片超级周期(三星18倍利润/江波龙622倍)说明AI需求已从模型层扩散到基础设施层。"},"pm_board":{"insights":[{"title":"MACHINA峰会对PM的信号：欧洲市场从旁观者变主场，出海需要欧洲策略","content":"MACHINA是欧洲首届物理AI峰会，Optimus/Atlas/Figure同台欧洲首秀+优必选/智元登上欧洲主场。对PM意味着：具身智能出海不只看东南亚(7月CIEI出海对接会收集的需求)，欧洲市场也需要专门策略。MACHINA的四大主题(Humanoid/Industrial/Training/Integration)可以作为出海产品定位的框架——欧洲市场更关注工业应用和系统集成。PM需要：①制定欧洲市场进入策略(CE认证/GDPR/本地化运维)；②关注MACHINA闭门对接会渠道；③评估与欧洲系统集成商合作的可能。"},{"title":"存储芯片超级周期对AI产品PM的影响：推理成本短期不降反升","content":"三星Q2利润18倍+Q3 DRAM再涨20%+江波龙622倍利润，存储芯片进入AI驱动超级周期。对PM意味着：AI产品的推理成本短期内不降反升——DeepSeek峰谷定价、Anthropic 71%算力成本、台积电涨价5-10%都在反映同一趋势。PM需要：①重新评估AI产品的成本模型(推理成本可能上升20-30%而非下降)；②设计更多错峰/缓存/边缘推理策略降低成本；③关注存储芯片价格对端侧AI产品BOM的影响(手机/PC/机器人存储成本上升)。"},{"title":"朱啸虎投资转向对具身智能PM的警示：商业化路径比技术先进性更重要","content":"朱啸虎退出人形机器人(商业化不清晰)但连续五轮追投世航智能海洋机器人(10亿订单/上千艘船舶)。对PM的警示：资本定价逻辑从「技术叙事」转向「ROI验证」。PM需要回答：你的机器人产品有真实订单吗？在多少个场景实现了规模化应用？如果没有，融资会越来越难。世航智能的启示：垂直场景(海洋清洗)的商业化比通用场景(人形)更早验证，PM应优先选择有明确付费意愿的垂直场景切入。"}],"focus":["欧洲市场进入策略(CE认证/GDPR/MACHINA渠道)","AI产品推理成本上升的应对(错峰/缓存/边缘推理)","垂直场景商业化验证(世航海洋/小雨焊接的ROI路径)","7月17日Gemini 3.5 Pro与DeepSeek V4同台的产品选型影响"]},"algo_board":{"insights":[{"title":"Gemini 3.5 Pro从头重训的技术含义：废弃旧基座是「反微调」范式","content":"谷歌DeepMind废弃Gemini 2.5 Pro基座，对3.5 Pro进行全新预训练——这不是微调/不是放大版，而是从地基重建。200万Token上下文(Fable 5的8倍)+深度思考推理模式(生成前多轮内部推理+自我修正)。前端/SVG生成碾压Fable 5但智能体/长链路推理仍落后。算法工程师需关注：①废弃旧基座重训的决策逻辑(什么情况下值得从头来过？)；②200万上下文的注意力机制优化(MRCR v2 needle-in-haystack)；③深度思考模式与Chain-of-Thought的区别(结构化内部推理vs线性思维链)；④7月17日与DeepSeek V4同台的性能对比(中外旗舰直接对话)。"},{"title":"Phoenix Gen 7的24小时任务学习：Carbon认知系统与液压驱动的协同","content":"Sanctuary AI Phoenix Gen 7将新任务学习从数周压缩至24小时。液压驱动提供人类级力量和柔性(区别于电驱动的刚性)，手部工程化实现接近人类灵巧度(区别于平行夹爪)。Carbon认知系统是自研AI控制栈。算法工程师需关注：①24小时学习的数据效率(少量演示→任务抽象→泛化部署的pipeline)；②液压驱动与电驱动在精细力控上的差异(液压柔性vs电驱精度)；③Carbon认知系统的架构(是否基于VLA/世界模型)；④液压驱动在高负载工业场景(搬运/装配)的优势。"},{"title":"存储芯片超级周期的算法视角：AI推理对存储带宽的需求正在爆炸","content":"三星Q2利润18倍+Q3再涨20%背后是AI对存储需求的结构性增长。HBM(AI训练/推理专用)产能扩张挤压传统DRAM/NAND供给，但AI推理本身对存储带宽的需求也在爆炸——长上下文(200万token)需要更大KV Cache，多Agent并行需要更多内存并发。算法工程师需关注：①KV Cache的内存优化(PagedAttention/量化/压缩)；②长上下文模型的存储带宽瓶颈(200万token的prefill延迟)；③端侧AI推理的存储BOM优化(模型压缩/稀疏化/蒸馏降低存储需求)；④DeepSeek DSpark投机解码对存储I/O的影响。"}],"tech_radar":[{"direction":"Gemini 3.5 Pro全新底座重训","status":"突破期","advice":"7月17日发布，关注200万上下文+深度思考模式的独立验证，与DeepSeek V4同台对比"},{"direction":"Phoenix Gen 7液压驱动+24小时学习","status":"成长期","advice":"液压路线在工业高负载场景有优势，关注Carbon认知系统架构披露"},{"direction":"GPT-5.6 Sol全面开放+High Risk分级","status":"验证期","advice":"关注网络安全96.7%和病毒学55.5%能力的实际风险，白宫AI标准框架细节"},{"direction":"AI 3D世界模型(VAST)","status":"成长期","advice":"3D资产从锦上添花变稀缺资源，关注游戏/XR/汽车座舱场景的落地验证"},{"direction":"存储芯片AI超级周期","status":"成长期","advice":"Q3 DRAM再涨20%，算法层面需优化KV Cache和模型压缩降低存储依赖"},{"direction":"Anthropic自研芯片(三星2nm)","status":"观望期","advice":"71%算力成本倒逼的财务必答题，关注Clive Chan芯片设计方向和三星2nm进展"}],"focus":["7月17日Gemini 3.5 Pro与DeepSeek V4同台的中外旗舰性能对比","Phoenix Gen 7 Carbon认知系统架构和24小时学习的数据效率pipeline","GPT-5.6 Sol全面开放后High Risk分级治理的实际执行效果","存储芯片超级周期对AI推理成本和端侧AI产品BOM的影响"]},"projmgr_board":{"insights":[{"title":"7月机器人主题月的项目管理：MACHINA→南京展→济宁大会→成都展密集事件链","content":"7月7日MACHINA(巴黎)→7月10-12日南京具身智能产业展→7月11-13日济宁机器人+创新发展大会→7月15-17日成都西部AI与具身智能大会→7月17日Gemini 3.5 Pro/DeepSeek V4发布→8月19-23日WRC北京。项目管理建议：①7月是机器人/ AI事件驱动最密集月份，PMO需建立「事件链作战室」逐日跟踪；②南京展(7月10-12)将发布特斯拉/优必选/智元量产节奏与零部件招标——这是供应链PM的关键窗口；③7月17日中外旗舰模型同台可能重新定义AI技术选型——PMO需准备模型切换预案。"},{"title":"存储超级周期对AI项目的成本风险管理","content":"三星Q3 DRAM再涨20%+台积电涨价5-10%+英伟达产能瓶颈=AI项目成本短期不降反升。项目管理建议：①AI项目的成本模型需上调20-30%推理成本预期；②建立「算力成本预警机制」——当推理成本占项目预算超过40%时触发优化评审；③优先采用错峰调度(DeepSeek峰谷定价模式)/缓存策略/边缘推理降低成本；④端侧AI产品的BOM需重新评估存储芯片涨价对毛利率的影响。PMO应将「算力成本管理」从运营问题提升为战略问题。"}],"focus":["7月事件链作战室(MACHINA→南京→济宁→成都→WRC)逐日跟踪","南京展量产节奏与零部件招标的供应链PM窗口","AI项目算力成本上调20-30%的预算重估","7月17日模型同台后的技术选型切换预案"]},"hermes_board":{"insights":[{"title":"7月7日超级信息日：MACHINA开幕+三星18倍利润+Gemini定档+GPT-5.6开放+Phoenix Gen7五线同发","content":"单日五条线同时爆发：①国际线(MACHINA巴黎物理AI峰会开幕，Optimus/Atlas/Figure欧洲首秀)；②芯片线(三星Q2利润18倍创纪录，Q3 DRAM再涨20%，江波龙622倍)；③模型线(Gemini 3.5 Pro定档7月17日从头重训200万上下文，与DeepSeek V4同台)；④开放线(GPT-5.6 Sol预计今日全面开放，白宫AI标准框架即将发布)；⑤机器人线(Sanctuary AI Phoenix Gen 7发布24小时任务学习)。标志AI+具身智能进入「全球同台竞技+超级周期+治理标准化」并行的新阶段。","url":"https://caifuhao.eastmoney.com/news/20260707090626622081340"},{"title":"AI模型公司全栈化竞争：Anthropic 71%算力成本倒逼自研芯片，三星2nm+OpenAI挖角","content":"Anthropic自研芯片深度分析揭示：440亿ARR但71%烧在算力，自研芯片是财务必答题而非战略选择题。台积电涨价5-10%+英伟达产能瓶颈+OpenAI Jalapeño已出牌=AI模型公司必须全栈化(模型+芯片+推理系统+数据中心)。OpenAI Jalapeño(6月发布/9个月流片/2026H2部署)+Anthropic(三星2nm/Clive Chan/方案规划极早期)=两家头部模型公司同时自研芯片。三星ASIC订单逼近50万亿韩元，2nm工艺可能改变AI芯片代工格局(打破台积电独大)。全栈化意味着未来AI巨头比拼的不只是模型，而是整套基础设施的协同优化。","url":"https://news.10jqka.com.cn/deep-topic/topic/dt_01KWKDWHNBDCP4VQDWZXRQT3G7"}],"tech_stack":[{"title":"Gemini 3.5 Pro：废弃旧基座从头重训+200万上下文+深度思考","content":"谷歌DeepMind废弃Gemini 2.5 Pro基座，全新预训练(非微调/非放大版)。200万Token上下文(Fable 5的8倍)。「深度思考」推理模式：生成前多轮内部推理+自我修正，针对数学/逻辑/结构化推理优化。前端/SVG生成碾压Fable 5但智能体/长链路推理仍落后。同步开发Nano Banana Pro图像模型。7月17日发布，与DeepSeek V4同台。","url":"https://new.qq.com/rain/a/20260706A09XSH00"},{"title":"Phoenix Gen 7：液压驱动+Carbon认知系统+24小时任务学习","content":"Sanctuary AI Phoenix Gen 7。液压驱动接近人类级力量和柔性。手部工程化接近人类灵巧度(非平行夹爪)。Carbon自研认知系统AI控制栈。新任务学习从数周压缩至24小时。Gen 6到Gen 8快速迭代(2023-2024)。累计融资超1.4亿美元。定位通用工业平台。","url":"https://theagenttimes.com/agents/article/sanctuary-ai-unveils-phoenix-gen-7-humanoid-robot-with-sub-2-bc06f578"},{"title":"英伟达Jetson Thor人形专用计算平台","content":"MACHINA峰会上英伟达Jetson Thor人形机器人专用AI计算平台欧洲宣讲。配合Google DeepMind具身大模型+端到端控制方案和AMD Instinct MI300X物理AI推理加速。Jetson Thor定位人形机器人的「大脑芯片」，是英伟达从GPU向机器人计算平台扩展的关键产品。","url":"https://guba.eastmoney.com/news,is930604,1738493806.html"},{"title":"世航智能沧穹CEORION海洋具身大模型","content":"世航智能2026年4月发布海洋具身大模型「沧穹CEORION」。0-10000米全海深全自由度作业能力。虎鲸系列(船舶清洗效率全球第一/上千艘船舶应用)+虎鲨系列(水面巡逻/监测)。2026上半年超10亿订单。朱啸虎金沙江连续五轮追投。从「表演式试验」到「商业化落地」。","url":"https://new.qq.com/rain/a/20260625A042L400"}],"community":[{"title":"MACHINA Summit 2026巴黎(7月7日)：欧洲首届物理AI峰会","content":"法国巴黎Station F(全球最大初创园区)。四大主题：Humanoid/Industrial/Training/Integration。Tesla Optimus Gen3+Boston Dynamics Atlas+Figure 02+1X NEO+Apptronik Astra真机演示。Google DeepMind+NVIDIA Jetson Thor+AMD MI300X技术宣讲。优必选/智元中国团队欧洲发声。产业+投资闭门对接。","url":"https://caifuhao.eastmoney.com/news/20260707090626622081340"},{"title":"7月机器人事件链：MACHINA→南京→济宁→成都→WRC","content":"7月7日MACHINA巴黎→7月10-12日南京具身智能产业展(特斯拉/优必选/智元量产节奏+零部件招标)→7月11-13日济宁机器人+创新发展大会(「机器人+」应用场景白皮书+无人机机器人应急实战赛)→7月15-17日成都西部AI与具身智能大会(西部具身智能产业白皮书+特斯拉Optimus演示)→8月19-23日WRC北京。","url":"https://caifuhao.eastmoney.com/news/20260705070328317051380"},{"title":"6月机器人赛道59起融资27起过亿：垂直场景成新热点","content":"6月机器人赛道59起融资27起过亿。世航智能(海洋/10亿A轮/朱啸虎五轮追投)为海洋机器人方向最高。特种机器人领域4起融资。资本从「人形通用」分流到「垂直场景」——海洋(世航)/焊接(小雨)/导盲(高德)/配送(新石器)各有商业化验证。VAST(AI 3D世界模型/10亿A3轮)代表跨场景基础设施层获资本青睐。","url":"https://new.qq.com/rain/a/20260706A06DWD00"}]},"action_items":{"tech_selection":["7月17日Gemini 3.5 Pro与DeepSeek V4同台前暂缓模型选型决策，等待独立基准测试数据","GPT-5.6 Sol全面开放后评估High Risk分级对Agent应用的影响(网络安全96.7%能力的实际风险)","存储芯片涨价环境下优先采用错峰调度(DeepSeek峰谷)+缓存+边缘推理降低20-30%推理成本","Phoenix Gen 7液压驱动路线作为工业高负载场景参考(24小时任务学习+人类级力量柔性)"],"track_judgment":["具身智能全球化：MACHINA标志欧洲加入竞争，中美欧三方格局形成，出海需制定欧洲专门策略","AI芯片超级周期：三星18倍利润+Q3再涨20%+台积电涨价=AI推理成本短期不降反升，存储进入结构性超级周期","AI模型全栈化：Anthropic 71%算力成本倒逼自研芯片，OpenAI Jalapeño+Anthropic三星2nm=模型公司全面反向入侵芯片","资本ROI转向：朱啸虎从退出人形到追投海洋(10亿订单)，资本从叙事定价转向ROI验证，垂直场景商业化先于通用"],"watch_list":["7月17日Gemini 3.5 Pro与DeepSeek V4同台的中外旗舰性能对比(200万上下文vs峰谷定价)","MACHINA峰会上Optimus Gen3/Atlas/Figure 02的量产进度与成本数据披露","GPT-5.6 Sol全面开放后白宫AI标准框架的具体内容和High Risk分级治理执行","三星Q3 DRAM涨价20%能否完全落地(TrendForce预计涨幅收敛至13-18%)","南京展(7月10-12)特斯拉/优必选/智元量产节奏与零部件招标","Anthropic自研芯片从方案规划到流片的时间线(Clive Chan+三星2nm进展)"]},"raw_articles":[{"title":"科技新闻 2026年7月7日：MACHINA峰会+江波龙净利增622倍+三星DRAM提价","source":"东方财富","url":"https://caifuhao.eastmoney.com/news/20260707090626622081340","summary":"MACHINA物理AI峰会巴黎开幕。江波龙H1净利预增622-743倍。三星拟Q3 DRAM提价约20%","category":"科技早报","rating":5,"publish_time":"2026-07-07"},{"title":"存储芯片涨价潮持续！三星Q2营业利润飙升18倍 再创历史新高","source":"财联社","url":"https://new.qq.com/rain/a/20260707A029BM00","summary":"三星Q2营业利润89.4万亿韩元同比飙18倍，超2023-2025三年总和。Q3 DRAM再涨20%。HBM挤压传统供给","category":"芯片产业","rating":5,"publish_time":"2026-07-07"},{"title":"三星Q2业绩暴增18倍！科创芯片ETF汇添富连续2日狂揽超10亿净申购","source":"界面新闻/网易","url":"https://www.163.com/dy/article/L17O5E1H0534A4SC.html","summary":"三星Q2利润89.4万亿韩元创纪录。江波龙H1净利92-110亿增622-743倍。存储涨价从HBM扩散至传统DRAM/NAND","category":"芯片产业","rating":5,"publish_time":"2026-07-07"},{"title":"龙头业绩暴增与三星再提价共振 机构看好存储高景气周期","source":"东方财富","url": .com/news/20260705070328317051380","summary":"7月机器人事件链：达沃斯(1-4日)→MACHINA巴黎(7日)→南京(10-12日)→济宁(11-13日)→成都(15-17日)→WRC北京(8月19-23日)","category":"产业日历","rating":4,"publish_time":"2026-07-05"},{"title":"VAST完成超10亿元A3轮融资,四川资本布局AI 3D世界模型市场","source":"上海证券报","url":"https://gu.qq.com/resources/shy/news/detail-v2/index.html?t=1#/index?_tentrees_trans=0&id=SN20260706191919b653a77a","summary":"VAST 10亿A3轮，累计4亿美元。吉利/巨人/成都科创投齐聚。AI 3D从锦上添花变稀缺资源。成都社保科创基金首笔投资","category":"资本密集","rating":4,"publish_time":"2026-07-06"},{"title":"大模型厂跨界造芯:Anthropic自研芯片的底气与底牌","source":"同花顺Deep Topic","url":"https://news.10jqka.com.cn/deep-topic/topic/dt_01KWKDWHNBDCP4VQDWZXRQT3G7","summary":"Anthropic ARR 440亿但71%烧算力。台积电涨5-10%+英伟达排队+OpenAI Jalapeño已出牌=自研是财务必答题。三星2nm洽谈","category":"AI芯片","rating":5,"publish_time":"2026-07-03"},{"title":"具身智能与宇树日报：6月59起融资27起过亿+欧洲峰会+Optimus产线","source":"腾讯新闻","url":"https://new.qq.com/rain/a/20260706A06DWD00","summary":"6月机器人59起融资27起过亿。世航智能10亿A轮。欧洲首届具身智能峰会7月7日。Optimus产线落地弗里蒙特FAT阶段","category":"产业日报","rating":4,"publish_time":"2026-07-06"},{"title":"世航智能完成超10亿元A轮融资,创全球海洋机器人单轮融资纪录","source":"中国基金报/雷峰网","url":"https://www.163.com/dy/article/KVFK6H3J05118HA4.html","summary":"世航智能10亿A轮，全球海洋机器人最大单轮。朱啸虎金沙江连续五轮追投。虎鲸系列船舶清洗全球第一。沧穹CEORION大模型","category":"资本密集","rating":4,"publish_time":"2026-06-15"},{"title":"给巨轮搓澡的机器人,拿下10亿融资","source":"腾讯新闻/趣解商业","url":"https://new.qq.com/rain/a/20260625A042L400","summary":"世航智能0-10000米全海深全自由度。虎鲸(船舶清洗)+虎鲨(水面巡逻)。2026上半年超10亿订单。朱啸虎退出人形但追投海洋","category":"资本密集","rating":4,"publish_time":"2026-06-25"},{"title":"AI科技资讯日报 2026年7月7日：GPT-5.6 Sol预计今日开放+Gemini定档","source":"AI科技资讯日报","url":"http://mp.weixin.qq.com/count/oIWsFt-H-F7OkyuFMVMYvxoOv5mg/2456844939/1/AAAAAN5ecUz8HSRKx7TNh-Sg8mc","summary":"GPT-5.6 Sol预计7月7-9日全面开放。Gemini 3.5 Pro 7月17日发布废弃旧基座重训200万上下文。白宫AI标准框架即将发布","category":"AI日报","rating":4,"publish_time":"2026-07-07"},{"title":"量子计算、AI投资与融资动态:软银100亿追加OpenAI+可灵30亿","source":"上海证券报","url":"https://gu.qq.com/resources/shy/news/detail-v2/index.html?t=1#/index?_tentrees_trans=0&id=SN20260704200634a6c4d5c7","summary":"软银完成OpenAI 100亿追加投资，计划10月再投100亿。可灵AI 30亿融资CPE源峰/腾讯/中信证券联合领投","category":"资本动态","rating":4,"publish_time":"2026-07-04"}]},"2026-07-06":{"update_time":"2026-07-06T11:30:00+08:00","hot_topics":[{"title":"清华火神队卫冕RoboCup 2026人形机器人世界杯冠军：6:2击败中国农大，两支决赛队均用国产Booster T1平台","source":"微博/雪球/RoboCup官网","url":"https://m.weibo.cn/status/5317632924320487","summary":"7月5日，2026 RoboCup机器人世界杯在韩国仁川落幕。清华大学火神队搭载国产松灵Booster T1机器人，决赛6:2击败中国农业大学山海队，成功卫冕人形机器人大型组(Large Size)世界冠军。两支决赛队伍均使用国产Booster T1平台。RoboCup 2026(6月30日-7月6日)汇集全球3000+选手和15000+观众。这是中国具身智能算法在国际机器人赛事中视觉感知与多智能体协作突破的标志性事件，证明国产机器人平台已具备支撑世界级算法的硬件能力。","category":"学术竞赛","rating":5,"philosophy_insight":{"framework":"否定之否定 + 对立统一 + 具身认知","analysis":"✅正题：RoboCup自1997年创办以来长期被欧美日大学主导，中国队伍过去十年逐步从参与者变为竞争者。❌反题：卫冕成功不是偶然——两支决赛队均使用国产Booster T1平台，说明中国具身智能的突破不只发生在实验室，而是已经渗透到「平台-算法-竞赛」的全链条。💡合题：从「追赶者(2015前)→竞争者(2015-2025)→卫冕冠军(2026)」，中国具身智能完成了否定之否定的三步跨越。对立统一：「中国算法(清华火神)」vs「国际标准(RoboCup)」的对立面，在「国产Booster T1平台」的统一硬件基础上被打破——中国不只在算法上领先，在平台上也开始被国际接受。具身认知：RoboCup本质是具身认知的极限测试——机器人需要在动态物理环境中实时感知-决策-执行，这正是梅洛-庞蒂「身体-环境-任务」具身认知三要素的工程化验证。","verdict":"清华卫冕证明国产机器人平台已具备支撑世界级具身智能算法的硬件能力，中国从追赶者变为引领者"}},{"title":"阿里巴巴全面禁用Claude全家桶：后门代码专盯中国时区+中国科技公司域名，7月10日生效","source":"21世纪经济报道/今日头条/搜狐","url":"https://www.toutiao.com/article/7658858346895753755","summary":"7月3日阿里内部宣布全面禁用Anthropic旗下Claude全系列产品(Sonnet/Opus/Fable/Claude Code)，7月10日生效，推荐自研Qoder替代。导火索：Reddit有人逆向Claude Code 2.1.91版本，发现XOR加密混淆代码：①读本地时区而非IP，命中Asia/Shanghai/Asia/Urumqi进观察名单；②内置147个域名黑名单(阿里/字节/百度/美团/网易+API中转商)；③标记编入系统提示词日期格式和Unicode字符回传服务器。Anthropic承认是3月上线的「实验机制」防蒸馏。此前Anthropic指控阿里4-6月用2.5万虚假账号跑2800万次交互进行「工业级模型蒸馏攻击」。阿里安全团队评估后列入高风险软件名单。","category":"AI安全","rating":5,"philosophy_insight":{"framework":"对立统一 + 证伪主义 + 语言游戏","analysis":"✅正题：AI编程工具(Claude Code)已成为开发者标配，阿里年初还允许报销使用。❌反题：Claude Code被逆向出针对中国时区+中国科技公司的隐蔽监控代码——「防蒸馏」的名义下实施的是「定向监控」。💡合题：阿里禁用Claude是AI安全治理的标志性事件——AI编程工具从「个人玩具」正式进入「企业级基础设施管控」时代。对立统一：「Anthropic防蒸馏(安全需求)」vs「定向监控中国用户(隐私侵犯)」的对立面，在「Claude Code后门事件」中被同时暴露——安全措施与隐私侵犯的边界在哪里？证伪主义：Anthropic声称「防蒸馏」但代码只针对中国时区和域名，这个说法被证伪——如果只是防蒸馏，为什么要按时区和公司域名筛选？语言游戏分析：「高风险软件」这个标签重新定义了Claude Code的叙事——从「最强AI编程工具」变为「企业安全威胁」，AI工具的合规审查时代正式开启。","verdict":"阿里禁用Claude标志AI编程工具从个人工具进入企业级安全管控时代，后门代码暴露AI工具链的信任危机"}},{"title":"具身智能上半年融资935亿同比暴增5倍：322笔交易日均1.3起，星动纪元两月融25亿国资密集入场","source":"雪球/腾讯新闻/新浪科技","url":"https://xueqiu.com/7395283544/398489421","summary":"2026上半年国内具身智能赛道融资达935亿元(同比增5倍)，322笔交易(同比增137%)，日均1.3起，创硬科技赛道史无前例的「资金虹吸效应」。星动纪元(清华唯一直接持股的具身智能企业)两个月连融三轮近25亿：3月10亿估值破百亿→4月2亿美元顺丰领投→7月诚通基金领投10亿，国家级国资平台首次密集阵容出现。乐享科技完成5亿Pre-A(蚂蚁集团领投)，3万台在手订单上半年营收同比增600%。泉智博完成A+++轮(高瓴领投+智元/灵心巧手战投)，关节模组占整机成本30-60%是量产「生死线」。全国仅8家估值破200亿，七成资金集中在前20家，马太效应明显。","category":"资本密集","rating":5,"philosophy_insight":{"framework":"否定之否定 + 对立统一 + 目的论","analysis":"✅正题：935亿元半年融资+322笔交易+日均1.3起，具身智能赛道的资本密度已达硬科技史无前例的水平。❌反题：七成资金集中前20家，马太效应明显——头部企业(宇树/智元/星动/智平方/自变量)吸走大部分资本，中尾部企业融资困难。💡合题：资本叙事正在经历否定之否定——从「堆长板(2024-2025:上游零部件+本体整机)」到「补短板(2026:感知-认知-决策-执行闭环，即具身大脑)」。星动纪元两个月连融25亿且国资密集入场，标志资本从「卖铲人逻辑」转向「具身大脑逻辑」。对立统一：「财务资本(追求估值增长)」vs「产业资本(追求战略卡位)」vs「国有资本(追求产业安全)」三类资本的对立面，在「具身智能国家队」的统一叙事下合流。目的论：国家级国资平台密集入场不是财务投资而是战略布局——具身智能被定义为「国家级产业操作系统」。","verdict":"935亿半年融资证明具身智能资本共识已形成，但马太效应和从堆长板到补短板的范式迁移将加速行业洗牌"}},{"title":"李飞飞×英伟达Jim Fan联合发布T-Rex架构：触觉-视觉频率解耦，精细操作成功率提至65%，触觉传感器成灵巧手标配","source":"雪球/科技早报","url":"https://xueqiu.com/7395283544/398543253","summary":"李飞飞与英伟达Jim Fan联合发布T-Rex架构，提出触觉-视觉频率解耦方案。核心创新：将触觉传感器(高频~1000Hz)和视觉传感器(低频~30Hz)的信号处理解耦，各自匹配最优控制频率，避免传统方案中低频视觉拖累高频触觉响应。机器人精细操作成功率从~40%提升至65%。触觉传感器将成为灵巧手的标配。同期灵心巧手推3999元入门级灵巧手+动作技能数据库，建类App Store技能调用体系。光轮智能SimFoundry缩小虚实物理差异，降低sim-to-real迁移成本。","category":"技术突破","rating":4,"philosophy_insight":{"framework":"具身认知 + 扬弃 + 对立统一","analysis":"✅正题：传统机器人操作主要依赖视觉感知(30Hz)，触觉传感器是「可选配件」——视觉能完成大部分抓取任务，触觉只是辅助。❌反题：精细操作(如插拔/拧转/柔性强力)需要高频触觉反馈(1000Hz)，传统方案把触觉和视觉塞进同一控制回路，低频视觉拖累了高频触觉。💡合题：T-Rex的频率解耦是扬弃——取消「触觉视觉统一控制回路」的旧架构，保留两种传感器各自优势，提升为「解耦+融合」的新范式。具身认知分析：触觉-视觉频率解耦本质是具身认知的工程化——人类的手指触觉(帕西尼小体~1000Hz)和视觉(~30Hz)本就是解耦处理的，T-Rex是向生物具身认知学习。对立统一：「触觉(高频精细)」vs「视觉(低频宏观)」的对立面，在「频率解耦+任务融合」的统一框架下协同。","verdict":"T-Rex触觉-视觉解耦是灵巧手从视觉为主到多模态融合的关键突破，3999元入门级灵巧手将加速具身智能应用门槛降低"}},{"title":"Meta放弃Llama转投Muse Spark：150亿美元战略大转向，开源AI史上最重大反转","source":"dev.to/CNBC/科技早报","url":"https://dev.to/hiroki-ii-ai/ai-daily-digest-july-6-2026-gpt-56-sol-safety-flag-claude-science-arrives-metas-muse-spark-2a8a","summary":"Meta将整个AI路线图从开源权重Llama系列转向完全专有模型Muse Spark，由新成立的Meta超级智能实验室(MSL)打造。背景：Llama 4灾难性表现——Maverick在Intelligence Index仅得18分(低于训练预算一半的模型)，触发benchmark作弊指控。扎克伯格此前承认AI智能体开发四个月未达预期(7月3日股价跌5%)。Muse Spark采用完全闭源路线，Meta从「开源AI旗手」变为「闭源追随者」。同时Meta限制工程师使用Claude/Codex，担忧模型蒸馏风险。150亿美元投入的Llama系列正式被放弃。","category":"AI战略","rating":4,"philosophy_insight":{"framework":"否定之否定 + 扬弃 + 证伪主义","analysis":"✅正题：Meta曾是开源AI的旗手——Llama系列被全球开发者广泛使用，Meta以「 democratize AI」叙事获得巨大声誉和开发者生态。❌反题：Llama 4灾难性表现(18分)证伪了「Meta开源路线能持续产出顶尖模型」的假设——benchmark作弊指控进一步损害信誉。💡合题：从「Llama开源(2023-2025)→Llama 4失败(2026H1)→Muse Spark闭源(2026H2)」，Meta完成否定之否定——扬弃了「开源=道德正确」的旧叙事，保留「追赶顶尖能力」的核心目标，提升为「闭源+超级智能实验室」的新路线。证伪主义：Llama 4的失败证伪了「开源模型可以持续追赶闭源前沿」的假设——开源社区的力量不足以弥补算力和数据的差距。但这不意味着开源路线失败(Together AI证明开源模型有企业市场)，而是Meta无法同时维持开源和顶尖能力。","verdict":"Meta放弃Llama是开源AI史上最重大反转，证伪了开源模型持续追赶闭源前沿的假设，但开源路线在企业市场仍有生命力"}},{"title":"北大团队研制全球首款相变忆阻器神经动力学芯片：登Science，较GPU提速最高478倍，利好脑机接口","source":"雪球/北大新闻网/Zenodo","url":"https://xueqiu.com/1340374092/398454377","summary":"北京大学杨玉超团队研制出基于相变忆阻器的毫秒级神经动力学系统芯片，登《Science》。40nm工艺，存内计算+步长漂移阵列面积约0.28mm²，运行频率50MHz。单步运算时延压缩至2.12ms。在脑皮层表面重建等任务中，较NVIDIA A100 GPU提速50.38-478.18倍，较当前先进ASIC提速3.82-36.27倍且功耗降低11.75-24.73倍。核心突破：把「存储器件的物理特性」变成「计算能力」，减少数据搬运，解决冯·诺依曼架构延迟和功耗瓶颈。应用方向：神经动力学、脑机接口、脑数字孪生、术中神经导航、医学影像重建、物理世界建模。","category":"芯片突破","rating":4,"philosophy_insight":{"framework":"具身认知 + 否定之否定 + 目的论vs机械论","analysis":"✅正题：传统冯·诺依曼架构下，存储和计算分离，数据搬运带来巨大延迟和功耗——这是AI芯片的根本瓶颈。❌反题：相变忆阻器把存储和计算合二为一(存算一体)，利用器件物理特性直接完成计算——数据不需要搬运，延迟和功耗大幅降低。💡合题：从「冯·诺依曼(存算分离)→GPU(并行但仍是存算分离)→忆阻器(存算一体)」，芯片架构完成否定之否定。具身认知分析：忆阻器神经动力学芯片本质是「向大脑学习」——人脑神经元就是存算一体的，忆阻器在物理层面模拟了突触可塑性。目的论vs机械论：目的论端是「类脑计算实现AGI」，机械论端是「40nm工艺+0.28mm²阵列+50MHz频率」——这个芯片不是大模型训练芯片，而是面向脑机接口和神经动力学的专用芯片，目的和机械实现高度匹配。","verdict":"相变忆阻器芯片是存算一体和类脑计算的科研突破，较GPU提速478倍为脑机接口和神经动力学开辟新路径"}},{"title":"Anthropic启动自研AI芯片：挖角OpenAI核心工程师，拟采用三星2nm工艺","source":"The Information/夜叶凌风/AI前沿日报","url":"https://www.yeyulingfeng.com/a/833919.html","summary":"据The Information报道，Anthropic已启动自研AI芯片早期开发，与三星电子就潜在制造合作展开洽谈，考虑采用三星2nm制程及先进封装技术。项目仍处于方案规划阶段，尚未确定芯片功能定位、算力规格及部署方式。Anthropic已从OpenAI挖来初代自研芯片团队核心成员Clive Chan加强芯片设计能力。三星电子自研AI芯片(ASIC)订单逼近50万亿韩元，Meta、Anthropic评估用其2nm工艺开发定制AI芯片。Anthropic回应称短期内仍依托NVIDIA/Google/Amazon多元化算力体系。","category":"AI芯片","rating":4,"philosophy_insight":{"framework":"否定之否定 + 对立统一 + 目的论","analysis":"✅正题：AI模型公司(OpenAI/Anthropic)过去完全依赖英伟达GPU——模型公司做模型，芯片公司做芯片，分工明确。❌反题：推理成本成为AI规模化服务最大瓶颈——OpenAI自研Jalapeño(9个月流片)、Etched做Sohu(Transformer专用ASIC)——模型公司开始「反向入侵」芯片领域。💡合题：从「模型公司买GPU(2022-2024)→自研推理芯片(2025-2026)」，AI公司完成否定之否定——从纯软件公司变为全栈公司(模型+芯片+推理系统+数据中心)。对立统一：「模型能力(软件)」vs「推理效率(硬件)」的对立面，在「全栈AI公司」的统一战略下被整合。目的论：Anthropic自研芯片的目的论是「降低推理成本提升Agent运行效率」，与OpenAI Jalapeño/Serrano路线相似——未来AI巨头比拼的不只是模型，而是整套基础设施的协同优化。三星2nm工艺的选择暗示台积电产能瓶颈。","verdict":"Anthropic自研芯片标志AI模型公司全面进入全栈化阶段，三星2nm工艺可能改变AI芯片代工格局"}},{"title":"全球数字经济大会80+前沿新品首秀：导盲犬机器人「途途」+焊接机器人+小君医生2.0，技术从实验室走向大市场","source":"首都之窗/今日头条","url":"https://www.toutiao.com/article/7658851693660095039","summary":"7月3-5日全球数字经济大会首发首秀平台集中发布80余项前沿新技术/新产品。高德发布具身导盲犬机器人「途途」——四足机器人+牵引杆，融合高德自研具身导航模型+交通大数据+机器视觉，能自主判断跨越或绕行坑洼，理解视障人士意图。小雨智造焊接机器人3分钟上岗(16.98万起售)。松延动力秀出「布米」消费级人形机器人(98cm/17kg，AI交互+运动控制+编程教育)。新石器慧通L4级无人配送机器人能自己乘电梯送快递。小君医生2.0大模型可一次性处理完整颅脑CT，自动生成涵盖94种颅脑疾病/11个解剖部位/1232个诊断术语的结构化报告。80+前沿新品标志技术从实验室走向大市场。","category":"应用落地","rating":4,"philosophy_insight":{"framework":"具身认知 + 否定之否定 + 语言游戏","analysis":"✅正题：过去三年AI/机器人技术主要在实验室和展会演示——能跳舞能摆拍，但离真实应用有距离。❌反题：80+前沿新品集中首秀标志技术从「实验室demo」进入「市场交付」——导盲犬机器人能处理复杂路径决策，焊接机器人3分钟上岗，无人配送机器人能乘电梯送快递。💡合题：从「技术演示(2023-2024)→场景验证(2025)→市场交付(2026)」，具身智能完成否定之否定的三步跨越。具身认知分析：高德「途途」导盲犬是具身认知的极端案例——它需要实时感知视障人士的意图(语音+行为)、理解物理环境(路况+障碍物)、做出安全决策(跨越vs绕行)——这是「身体-环境-任务」具身认知三要素的完整闭环。语言游戏分析：「首发首秀」这个命名把展会从「展示窗口」重新定义为「市场化第一步」——技术不再是展品而是商品。","verdict":"80+前沿新品首秀标志具身智能从技术演示进入市场交付阶段，导盲犬/焊接/配送机器人各自验证了垂直场景的商业可行性"}}],"startup_board":{"companies":[{"name":"星动纪元","field":"具身智能(全栈)","route":"AI Native驱动，数据-大脑-运控-灵巧手-本体全栈自研，星动L7/Q5/XHAND三大产品线","funding":"两月连融三轮近25亿，估值破百亿，诚通基金领投+三星/顺丰/海尔等20+产业资本","verdict":"清华唯一直接持股具身企业，国家级国资密集入场标志战略布局"},{"name":"乐享科技(元点Zeroth)","field":"家庭具身智能","route":"全栈技术布局+3万台在手订单，Jupiter全尺寸人形+N1家庭协作机器人","funding":"近5亿Pre-A(蚂蚁集团领投)，累计10亿","verdict":"成立一年半3万订单，上半年营收同比增600%"},{"name":"泉智博","field":"机器人关节模组","route":"百万台级年产能规划，一次性合格率96%+，良率98%+","funding":"A+++轮(高瓴领投+智元/灵心巧手战投)，一年半7轮融资","verdict":"关节模组占整机成本30-60%是量产生死线，打通关节-灵巧手-整机闭环"},{"name":"跨维智能","field":"具身智能","route":"香港中文大学(深圳)贾奎创立，全栈技术","funding":"B轮10亿，估值超百亿，深创投/蓝思科技周群飞个人参投","verdict":"后续将启动IPO，蓝思科技从客户变股东"}],"trend":"2026上半年具身智能融资935亿(同比增5倍)，322笔交易日均1.3起，创硬科技史无前例的资金虹吸效应。资本叙事从「堆长板(上游零部件+本体)」转向「补短板(具身大脑闭环)」。七成资金集中前20家，马太效应明显。国家级国资平台密集入场(诚通基金/国元/杭州资本等)标志具身智能被定义为国家级战略产业。关节模组(泉智博)和灵巧手(灵心巧手3999元)成为量产关键瓶颈和创业热点。8家估值破200亿(宇树/智元/星动/智平方/自变量/银河通用/星海图/跨维)。"},"pm_board":{"insights":[{"title":"Claude Code后门事件对AI工具PM的警示：安全合规是AI工具的生死线","content":"阿里禁用Claude全家桶的导火索是后门代码被逆向——专盯中国时区+中国科技公司域名。对PM意味着：AI工具产品必须通过安全审计才能进入企业市场，安全合规不再是加分项而是生死线。PM需要：①建立AI工具安全审计流程(代码逆向/网络行为分析/数据回传检测)；②制定企业级AI工具使用规范(什么场景可用什么不可用/数据隔离要求)；③关注地缘政治风险——AI工具可能被用作数据收集管道。阿里推荐自研Qoder替代说明：大厂正在构建自有AI工具栈，外部AI工具的市场空间可能被压缩。"},{"title":"935亿融资对具身智能PM的信号：从技术验证到规模量产的关键转换","content":"2026上半年935亿融资+322笔交易证明资本共识已形成，但七成资金集中前20家。对PM意味着：头部企业(8家200亿+)进入规模量产竞争阶段，中尾部企业面临生存压力。PM需要回答：你的公司在前20家吗？如果不在，差异化定位是什么？关节模组(泉智博)和灵巧手(灵心巧手3999元)从「卖铲人」变为「量产瓶颈」——PM需要关注核心零部件的供应链安全和成本曲线。星动纪元两月融25亿+国资密集入场说明：资本从「硬件本体」转向「具身大脑」，PM需要重新评估产品定位中软件/模型能力的权重。"},{"title":"80+前沿新品首秀的PM信号：垂直场景落地是当前最优策略","content":"全球数字经济大会80+新品涵盖导盲犬/焊接/配送/医疗等多垂直场景。对PM意味着：当前阶段通用AGI机器人仍远，但垂直场景已有商业可行性。PM的产品策略应该是：①选择一个高价值垂直场景(焊接/导盲/质检/配送)；②做到3分钟上岗级别的使用门槛；③16.98万级别的定价让客户算得过账。小雨智造(焊接)和乐享科技(家庭3万台订单)验证了垂直场景的商业可行性。"}],"focus":["AI工具安全审计流程建设(代码逆向/网络行为/数据回传检测)","具身智能头部企业量产竞争策略(8家200亿+的差异化定位)","垂直场景产品定义(焊接/导盲/质检/配送的高价值场景选择)","核心零部件供应链安全(关节模组/灵巧手/减速器的国产化率)"]},"algo_board":{"insights":[{"title":"T-Rex触觉-视觉频率解耦：灵巧手从视觉为主到多模态融合的关键突破","content":"李飞飞×Jim Fan的T-Rex架构核心是触觉(1000Hz)和视觉(30Hz)的频率解耦——各自匹配最优控制频率避免互相拖累。精细操作成功率从~40%提升至65%。这解决了VLA模型的「最后一厘米」问题——视觉能告诉机器人「抓哪里」，但触觉才能告诉它「抓到了没有+力度够不够」。灵心巧手3999元入门级灵巧手+动作技能数据库(类App Store)大幅降低触觉传感器接入门槛。算法工程师需关注：触觉数据的高频处理(1000Hz=每毫秒一次)、触觉-视觉融合的时间对齐策略、以及触觉传感器数据格式标准化。"},{"title":"相变忆阻器神经动力学芯片：存算一体的类脑计算新路径","content":"北大杨玉超团队的相变忆阻器芯片登Science。40nm工艺，存内计算+步长漂移阵列0.28mm²，50MHz频率，单步时延2.12ms。较A100 GPU提速50-478倍，较先进ASIC提速3.82-36.27倍+功耗降低11.75-24.73倍。核心创新：把相变材料的物理特性(电阻随电流变化)直接用作计算单元，消除冯·诺依曼架构的数据搬运瓶颈。这不是大模型训练芯片，而是面向神经动力学/脑机接口/脑数字孪生的专用芯片。算法工程师需关注：存算一体架构对神经动力学算法的适配性、相变忆阻器的非线性特性如何映射到神经网络计算、以及脑机接口场景的实时性要求(2.12ms时延)。"},{"title":"RoboCup卫冕背后的具身智能算法：多智能体协作+实时决策","content":"清华火神队卫冕RoboCup使用的Booster T1平台+具身智能算法，在国际赛事中实现视觉感知与多智能体协作突破。RoboCup人形机器人足球赛要求：实时视觉感知(球/队友/对手位置)+动态决策(传球/射门/防守策略)+多智能体协作(队形协调/角色分配)+全身运动控制(行走/踢球/倒地恢复)。算法工程师需关注：多智能体强化学习的实时部署、视觉-运动控制的端到端学习、以及sim-to-real迁移在对抗性动态环境中的效果。两支决赛队均用国产Booster T1说明国产硬件平台已具备支撑世界级算法的能力。"}],"tech_radar":[{"direction":"触觉-视觉频率解耦(T-Rex)","status":"突破期","advice":"触觉传感器成灵巧手标配，关注1000Hz高频触觉数据处理和时间对齐策略"},{"direction":"相变忆阻器存算一体芯片","status":"突破期","advice":"登Science的科研突破，关注脑机接口和神经动力学场景，短期非大模型训练芯片"},{"direction":"多智能体强化学习(RoboCup验证)","status":"成长期","advice":"清华卫冕验证sim-to-real在对抗动态环境的有效性，关注多智能体协作框架"},{"direction":"具身大脑(VLA全栈)","status":"成长期","advice":"资本从堆长板转向补短板，星动纪元AI Native全栈路线值得关注"},{"direction":"Anthropic自研芯片(三星2nm)","status":"观望期","advice":"早期规划阶段，关注三星2nm工艺进展和Clive Chan的芯片设计方向"},{"direction":"Meta Muse Spark闭源路线","status":"观望期","advice":"Llama 4失败后转向闭源，关注MSL能否产出顶尖模型，开源生态影响待评估"}],"focus":["T-Rex触觉-视觉解耦的工程化实现和灵心巧手3999元灵巧手的数据接口","相变忆阻器芯片在脑机接口场景的应用验证","Anthropic自研芯片(Clive Chan方向+三星2nm工艺进展)","星动纪元AI Native全栈路线的模型层(WMA+VLA)技术细节"]},"projmgr_board":{"insights":[{"title":"935亿融资+国资密集入场对项目管理的信号：具身智能进入「国家队」阶段","content":"2026上半年935亿融资+322笔交易，星动纪元两月连融25亿且国家级国资平台(诚通基金/国元/杭州资本)密集入场。项目管理启示：①具身智能项目需要纳入「国家队」视角——国资入场不仅是资金更是产业安全战略；②头部企业(8家200亿+)进入规模量产竞争，PMO需要建立「量产交付+核心自研率+商业化收入」三大核心指标；③资本从「硬件本体」转向「具身大脑」，项目资源分配需要从硬件为主转向软硬件均衡。建议设立「具身大脑项目集」，与硬件项目集并行管理，模型研发项目优先级提升至P0。"},{"title":"阿里禁用Claude对AI工具供应链的项目管理警示","content":"阿里禁用Claude全家桶暴露AI工具供应链的安全风险——后门代码专盯中国时区+中国科技公司。项目管理启示：①AI工具采购需纳入安全审计流程，不能只看功能性能；②关键项目不应依赖单一外部AI工具——Meta限制Claude/Codex、阿里禁用Claude说明大厂都在做「AI工具去依赖化」；③PMO应建立「AI工具白名单」制度，经过安全审计的工具才能在项目中使用；④关注地缘政治风险——AI工具可能成为数据收集管道，涉及国家安全。"}],"focus":["具身大脑项目集设立(P0优先级，模型研发与硬件并行)","AI工具安全审计和白名单制度","头部企业量产竞争三大核心指标(交付台数/自研率/商业化收入)","国资入场后的战略协同管理(国家级资本+产业资本+财务资本)"]},"hermes_board":{"insights":[{"title":"7月4-6日周末超级信息汇总：RoboCup卫冕+阿里禁Claude+935亿融资+T-Rex+相变忆阻器五线同发","content":"周末三天五条线同时爆发：①学术线(清华卫冕RoboCup人形机器人世界杯，国产Booster T1平台双队会师决赛)；②安全线(阿里全面禁用Claude全家桶，后门代码专盯中国时区+中国科技公司域名，7月10日生效)；③资本线(具身智能上半年融资935亿同比增5倍，星动纪元两月融25亿国资密集入场)；④技术线(李飞飞×Jim Fan发布T-Rex触觉-视觉解耦，精细操作成功率提至65%；北大相变忆阻器芯片登Science较GPU提速478倍)；⑤战略线(Meta放弃Llama转投Muse Spark闭源，150亿美元战略大转向；Anthropic启动自研芯片挖角OpenAI核心工程师)。标志AI+具身智能进入「学术突破+安全治理+资本共识+技术融合+战略重构」五维并行的复杂新阶段。","url":"https://xueqiu.com/7395283544/398543253"},{"title":"AI工具链信任危机爆发：Claude Code后门+Meta限制Claude/Codex+阿里禁用+模型蒸馏指控","content":"一周内AI工具链爆发多重信任危机：①Claude Code被逆向出针对中国时区+中国科技公司的隐蔽监控代码(XOR加密混淆+域名黑名单+Unicode回传)；②阿里全面禁用Claude全家桶(7月10日生效，推荐自研Qoder替代)；③Anthropic指控阿里用2.5万虚假账号跑2800万次交互进行「工业级模型蒸馏攻击」；④Meta此前已限制工程师使用Claude/Codex(担忧模型蒸馏)；⑤Anthropic公开Fable 5降级逻辑及CJS打分系统。共同信号：AI编程工具从「开发者个人选择」进入「企业安全治理+地缘政治博弈」阶段，AI工具链的信任成为新的系统性风险。","url":"https://www.toutiao.com/article/7658858346895753755"}],"tech_stack":[{"title":"T-Rex触觉-视觉频率解耦架构","content":"李飞飞×英伟达Jim Fan联合发布。触觉传感器(1000Hz)和视觉传感器(30Hz)信号处理解耦，各自匹配最优控制频率。精细操作成功率从~40%提升至65%。触觉传感器成灵巧手标配。灵心巧手推3999元入门级灵巧手+动作技能数据库(类App Store)。光轮智能SimFoundry缩小虚实物理差异降低sim-to-real成本。","url":"https://xueqiu.com/7395283544/398543253"},{"title":"相变忆阻器神经动力学芯片(北大/Science)","content":"40nm工艺，存内计算+步长漂移阵列0.28mm²，50MHz，单步时延2.12ms。较A100 GPU提速50-478倍，较先进ASIC提速3.82-36.27倍+功耗降低11.75-24.73倍。核心：把存储器件物理特性变成计算能力，消除冯·诺依曼数据搬运瓶颈。应用：神经动力学/脑机接口/脑数字孪生/术中神经导航/医学影像重建。","url":"https://xueqiu.com/1340374092/398454377"},{"title":"星动纪元AI Native全栈路线","content":"清华大学唯一直接持股的具身智能企业。数据-大脑-运控-灵巧手-本体全栈自研，算法需求优先+数据价值优先，从大脑模型训练需求反向定义硬件设计。三大产品线：星动L7全尺寸双足人形+星动Q5轮式人形服务+星动XHAND五指灵巧手。两月连融三轮近25亿，国家级国资密集入场。","url":"https://gu.qq.com/resources/shy/news/detail-v2/index.html?t=1#/index?_tentrees_trans=0&id=SN202607060914439883f001"},{"title":"Anthropic自研AI芯片(三星2nm)","content":"Anthropic启动自研AI芯片早期开发，与三星电子洽谈2nm制程+先进封装。从OpenAI挖来初代自研芯片团队核心成员Clive Chan。项目处于方案规划阶段，短期仍依托NVIDIA/Google/Amazon多元化算力。三星ASIC订单逼近50万亿韩元，Meta/Anthropic评估用其2nm工艺。","url":"https://www.yeyulingfeng.com/a/833919.html"}],"community":[{"title":"RoboCup 2026韩国仁川(6月30日-7月6日)：3000+选手+15000观众","content":"世界最大最权威的机器人与AI竞赛首次在韩国举办。清华火神队搭载松灵Booster T1卫冕人形机器人大型组冠军，决赛6:2击败中国农业大学山海队。两支决赛队均使用国产Booster T1平台。RoboCup自1997年创办，涵盖机器人足球/服务模拟/工业场景，是全球具身智能算法的基准测试平台。","url":"https://www.robocup.org/events/80"},{"title":"2026全球数字经济大会北京(7月2-5日)：80+前沿新品首发首秀","content":"高德导盲犬机器人「途途」(具身导航模型+交通大数据+机器视觉)、小雨焊接机器人(3分钟上岗16.98万)、松延「布米」消费级人形(98cm/17kg)、新石器L4无人配送(自乘电梯送快递)、小君医生2.0(颅脑CT全病种智能诊断)。80+前沿新品标志技术从实验室走向大市场。","url":"https://www.toutiao.com/article/7658851693660095039"},{"title":"武汉建全国最大人形机器人训练场：湖北132家供应链企业产业规模破400亿","content":"北京亦庄+武汉双核推进具身智能万台量产。武汉建设全国最大人形机器人训练场，湖北已聚集132家核心供应链企业，产业规模破400亿。黑芝麻智能A2000X(1000 TOPS)进军具身智能「大脑」芯片，车规「小脑」控制芯片国产化进度领先。上汽「能仔1号」/小鹏IRON推进产线部署。","url":"https://xueqiu.com/7395283544/398543253"}]},"action_items":{"tech_selection":["Claude Sonnet 5评估降级：阿里禁用+后门代码暴露安全风险，建议评估替代方案(自研/Qoder/Gemini/GLM-5.2)","触觉传感器列为灵巧手标配(T-Rex验证成功率从40%提升至65%)，灵心巧手3999元入门级降低接入门槛","DeepSeek V4正式版(7月中旬峰谷定价)作为成本敏感场景首选，利用错峰调度降低30%算力成本","相变忆阻器芯片列入长期技术雷达(存算一体+类脑计算，关注脑机接口场景应用验证)"],"track_judgment":["AI工具链信任危机：Claude Code后门+阿里禁用+Meta限制+蒸馏指控，AI编程工具从个人选择进入企业安全治理阶段","具身智能资本共识：935亿半年融资+国资密集入场，从堆长板(硬件)转向补短板(具身大脑)，8家200亿+进入量产竞争","AI芯片全栈化：OpenAI Jalapeño+Anthropic自研+Etched Sohu，模型公司全面反向入侵芯片领域，三星2nm可能改变代工格局","开源AI战略转折：Meta放弃Llama转Muse Spark闭源，证伪开源模型持续追赶闭源前沿假设，但开源在企业市场仍有生命力(Together AI)"],"watch_list":["阿里禁用Claude 7月10日正式生效后的连锁反应(其他大厂是否跟进？)","RoboCup卫冕后Booster T1平台的商业化进展和开源生态","星动纪元AI Native全栈路线的模型层(WMA+VLA)技术细节和开源可能性","Anthropic自研芯片方向(Clive Chan+三星2nm)与OpenAI Jalapeño/Serrano的竞 宇树从2016年四足机器狗创业到2026年科创板IPO，十年完成了从「实验室玩具」到「量产商品」的否定之否定——2023年营收1.59亿亏损，2025年营收17亿净利5.9亿，三年间业绩增长10倍。❌反题：104天过会创纪录的背后是「核心零部件自研率95%+国产化率85%」的硬指标——IPO速度快的本质是供应链成熟度达标，不是审核宽松。💡合题：宇树IPO扬弃了「机器人公司=烧钱讲故事」的旧叙事——取消纯概念估值，保留量产交付和盈利的硬指标，提升为「具身智能第一股」的产业锚点。对立统一：「硬件成本控制(王兴兴路线)」vs「模型智能提升(募资近半投模型)」两个对立面，在「IPO估值420亿」的统一资本叙事下必须同时兑现。","verdict":"宇树IPO是A股具身智能从主题映射到产业验证的系统性估值锚，参照新能源车产业链重估效应"}},{"title":"图灵奖得主Richard Sutton空降北京人形机器人创新中心：强化学习与具身智能历史性握手","source":"搜狐/香港商报/文汇报","url":"https://www.sohu.com/a/1045106009_121956424","summary":"「强化学习之父」、图灵奖得主Richard Sutton时隔五年再访中国，首站直奔北京人形机器人创新中心。天工3.0全尺寸人形机器人作为展厅讲解员全程自主导览，展示高难度运动控制。「具身天工」平台支持37种异构传感器接入、12类关节动力学模型热插拔，预留脑机接口协议层——被称为「正在长出神经系统的活体智能体」。「慧思开物」平台18个月自主生成超41万条跨场景泛化策略(如用扫帚柄撬快递柜门/断电厨房组合微波炉+手机闪光灯应急照明)。Sutton指出具身智能是实现AGI的关键路径，强化学习与具身智能深度融合是未来突破方向。他山科技+北京人形+Sutton的OpenMind团队共建「机器人幼儿园」项目。","category":"学术前沿","rating":5,"philosophy_insight":{"framework":"具身认知 + 否定之否定 + 目的论","analysis":"✅正题：Sutton是强化学习奠基人(时间差分学习/Sarsa算法)，强化学习的核心是「智能体通过与环境交互的奖励信号学习」——这本身就是具身认知的计算化表达。❌反题：过去十年强化学习主要在游戏/虚拟环境(AlphaGo/Atari)取得突破，在真实物理世界机器人上的应用一直受限于样本效率低、安全约束严、训练成本高。💡合题：Sutton首站选择具身智能创新中心而非学术机构，信号明确——强化学习的下一个十年必须在物理世界完成「从虚拟到真实」的否定之否定。具身认知分析：「慧思开物」平台像人类幼童一样在虚拟物理世界摔打试错归纳，41万条跨场景泛化策略反向注入真实机器人——这正是梅洛-庞蒂「身体-环境-任务」具身认知三要素的工程闭环。目的论：Sutton选择中国而非硅谷，暗示强化学习+具身智能的未来重心可能在拥有最完整机器人产业链的中国。","verdict":"Sutton访华标志强化学习与具身智能两大范式的历史性交汇，中国或成RL+物理AI融合的主战场"}},{"title":"扎克伯格承认Meta AI智能体开发未达预期：裁员10%+转岗7000人后四个月进展缓慢，股价暴跌5%","source":"华尔街见闻/腾讯新闻/搜狐","url":"https://news.qq.com/rain/a/20260703A01PQG00","summary":"7月3日扎克伯格在Meta内部全员大会承认，过去四个月AI智能体开发「没有像预期的那样加速」，触发股价收跌4.9%。3月Meta裁员约8000人(10%)，7000名员工转岗至AI业务，今年资本开支指引1250-1450亿美元(同比近翻倍)。扎克伯格曾承诺以人力成本换取AI加速，四个月后亲口承认加速未发生。前一日Meta因「对外出售富余算力」消息涨8.8%，次日几乎全部回吐。Meta内部还限制工程师使用Claude和Codex，担忧模型蒸馏风险。扎克伯格仍预计3-6个月内看到更明显AI投资收益。","category":"AI产业警示","rating":5,"philosophy_insight":{"framework":"否定之否定 + 证伪主义 + 对立统一","analysis":"✅正题：Meta砸320亿美元+裁员10%+转岗7000人+资本开支1450亿，这是科技史上最激进的AI All-in之一。❌反题：四个月后CEO亲口承认「没有像预期那样加速」——钱砸了人重组了，但AI Agent没交出足够快的结果。证伪主义：扎克伯格的坦白证伪了「投入更多=产出更快」的线性假设——AI智能体的开发瓶颈不是钱和人，而是技术范式的根本性难题(泛化/可靠性/长程规划)。💡合题：Meta的困境是否定之否定的正题阶段——「砸钱砸人(2025)→发现瓶颈(2026H1)→范式突破还是降级预期(2026H2)」。对立统一：「算力基础设施(1250亿)」vs「AI智能体产出(不及预期)」的对立面，暴露了AI产业核心矛盾——基建投资增速远超应用落地增速。Linus Torvalds同日讽刺「99%代码由AI写」说法：「编译器写了100%，你咋不说？」——这是对AI能力叙事的证伪主义提醒。","verdict":"Meta的坦白是AI产业从狂热回归理性的信号，1450亿基建投资与Agent产出增速的剪刀差是全行业隐患"}},{"title":"DeepSeek V4正式版7月中旬上线：引入峰谷定价，高峰时段API价格翻倍，国产大模型首夺定价权","source":"腾讯新闻/红星新闻/界面新闻","url":"https://news.qq.com/rain/a/20260630A099FV00","summary":"DeepSeek V4正式版7月中旬上线，同步引入峰谷定价：每日9-12点/14-18点高峰时段API价格翻倍。V4 Pro输出从6元涨至12元/百万tokens，V4 Flash输出从2元涨至4元。非高峰维持5月永久降价后价格。DeepSeek成首个引入峰谷定价的国产大模型，用价格杠杆引导非紧急任务至低峰期，预计高峰期算力消耗可降25-30%。2026年以来DeepSeek因2亿用户花式消耗算力导致18次宕机，封禁12万恶意账号、关闭3000违规API。500亿融资中70%用于国产算力集群(乌兰察布10万P昇腾芯片)。DSpark推理加速框架将生成速度提升60-85%。","category":"大模型定价","rating":4,"philosophy_insight":{"framework":"扬弃 + 对立统一 + 语言游戏","analysis":"✅正题：过去两年国产大模型陷入「低价竞争」——DeepSeek以极低价格抢市场份额，各家大打价格战。❌反题：2亿用户导致18次宕机+12万恶意账号+灰产「反代」转售——低价策略的代价是算力被严重滥用。💡合题：峰谷定价是DeepSeek对「低价竞争」的扬弃——取消无差别低价，保留非高峰低价引导错峰，提升高峰价格过滤滥用。从「价格战」升级为「算力供需调度」，这是国产大模型首次掌握定价权。对立统一：「用户增长(2亿)」vs「算力供给(18次宕机)」的对立面，在「峰谷定价」的统一机制下被重新平衡。语言游戏分析：「峰谷定价」借用电力行业的语言——把大模型API从「消费品」重新定义为「基础设施」，从「卖token」升级为「调度算力资源」。","verdict":"DeepSeek峰谷定价标志国产大模型从价格战进入算力调度时代，掌握定价权是商业化成熟的关键信号"}},{"title":"小雨智造发布首款具身智能焊接机器人：16.98万起售，3分钟上岗，已落地十余家一线工厂","source":"搜狐/证券时报/腾讯新闻","url":"https://www.sohu.com/a/1045099384_121489117","summary":"7月2日全球数字经济大会上，小雨智造发布业内首款面向工业的具身智能焊接机器人「小雨未来机器人」，标准版起售16.98万元。三大底层技术：①小雨润物世界模型(4D世界模型，推演动作后物理环境演化，超10万小时真实工业数据)；②小雨息壤硬件平台；③定位笔(手机级UI，新手3分钟上岗)。搭载英伟达Orin平台，同时与地瓜机器人达成战略合作搭载旭日S600国产算力。已在十余家一线工厂落地，覆盖建筑钢构/船舶制造/桥梁。中建科工联合开发高柔性智能焊接方案。","category":"工业落地","rating":4,"philosophy_insight":{"framework":"具身认知 + 扬弃 + 目的论vs机械论","analysis":"✅正题：传统焊接机器人是「示教再现型」——需专业编程人员预设轨迹，换工件就需重新编程，使用门槛高。❌反题：小雨的4D世界模型让机器人拥有「工业直觉」——能推演动作执行后物理环境演化，提前找到最优控制路径。定位笔让新手3分钟上岗，把使用门槛降到零。💡合题：小雨扬弃了「焊接机器人=高门槛专业设备」的旧范式——取消示教编程的专业门槛，保留焊接工艺的精度要求，提升为「3分钟上岗」的消费级体验。具身认知分析：「润物世界模型」本质是给焊接机器人装上了「具身认知大脑」——不再是机械执行预设轨迹，而是实时感知-推理-决策-执行的闭环。目的论vs机械论：小雨的目的论是「让机器人拥有工业直觉」，机械论端是「10万小时真实数据+4D世界模型+Orin算力」——两者在「16.98万起售+十余家工厂落地」交汇。","verdict":"小雨焊接机器人是具身智能从通用demo走向垂直工业场景落地的标志性产品，3分钟上岗重新定义工业机器人使用门槛"}},{"title":"Together AI获8亿美元C轮融资估值83亿：NVIDIA参投，开源模型使用量一年增三倍","source":"腾讯新闻","url":"https://news.qq.com/rain/a/20260703A03SRX00","summary":"7月3日开源AI云服务商Together AI完成8亿美元C轮融资，估值83亿美元(16个月前B轮估值33亿)。Aramco Ventures领投，Vista Equity/NVIDIA/General Catalyst等参投。年度预订额超11.5亿美元，拥有数千名付费客户(Cursor/Cognition/Decagon)。宣称过去一年开源模型使用量增长三倍。Neocloud(新型云)服务商成风投热门——企业提供开源模型推理服务，成本远低于封闭前沿模型。Cursor/Cognition等AI Coding工具使用Together AI的GPU集群。","category":"AI基础设施","rating":4,"philosophy_insight":{"framework":"对立统一 + 证伪主义 + 语言游戏","analysis":"✅正题：AI模型市场被「封闭前沿模型(OpenAI/Anthropic)」主导，但价格高昂——GPT-5.5输出30美元/百万token。❌反题：Together AI证明「开源模型+低成本推理基础设施」可以提供「称职但成本远低」的替代方案——开源模型使用量一年增三倍。💡合题：AI基础设施市场形成对立统一——「封闭前沿模型(顶尖能力)」vs「开源模型+Neocloud(成本效率)」在「企业AI使用场景分层」的统一框架下共存。证伪主义：Together AI的11.5亿预订额证伪了「企业只愿意为封闭前沿模型付费」的假设——大部分企业场景不需要顶尖能力，需要的是「足够好+足够便宜」。语言游戏分析：「Neocloud(新型云)」这个命名把「租GPU跑开源模型」从「低端替代」重新定义为「新型基础设施」——从「二手GPU转租」升级为「AI基础设施服务商」。","verdict":"Together AI证明开源模型+Neocloud是封闭前沿模型的可行替代，企业AI使用场景正在分层"}},{"title":"日本公布2.3万亿美元「主权AI」计划：2040年18个行业部署1000万台AI机器人+国产多模态模型","source":"华尔街见闻/腾讯新闻","url":"https://new.qq.com/rain/a/20260703A01GD900","summary":"7月3日日本政府披露国家增长战略：计划到2040年在18个行业部署约1000万台AI机器人，开发国产多模态基础模型，未来五年提供最高1万亿日元财政支持。背景：美国对Anthropic Fable 5/Mythos 5出口管制引发各国对AI技术主权的担忧。加拿大总理卡尼表示「只有一个选择绝非好事」，法国追加6.55亿欧元AI投资。AI技术主权成为多国国家战略焦点。日本计划覆盖制造业/医疗/农业/物流/服务业等18个行业，打造国产AI+机器人全栈能力。","category":"国家战略","rating":4,"philosophy_insight":{"framework":"对立统一 + 目的论 + 语言游戏","analysis":"✅正题：美国对Anthropic模型出口管制直接触发了各国「AI技术主权」焦虑——过度依赖美国AI模型存在国家安全风险。❌反题：日本2.3万亿美元+1000万台机器人+国产多模态模型是最激进的「主权AI」计划，但日本在AI基座模型领域几乎没有积累，追赶难度极大。💡合题：「主权AI」的提出标志全球AI格局从「技术竞争」进入「地缘竞争」——对立统一：「美国技术领先(出口管制)」vs「各国技术主权(自主建设)」在「AI成为国家基础设施」的统一认知下形成张力。目的论分析：日本的目的论是「AI主权=国家自主权」，但机械论端是「日本AI基座模型几乎空白」——目的与现实的巨大鸿沟意味着这个计划更像战略宣言而非执行方案。语言游戏分析：「主权AI」这个概念正在重写AI的叙事——从「技术服务全人类」转向「技术服务国家利益」，AI从「全球公共品」被重新定义为「国家主权资产」。","verdict":"主权AI概念标志全球AI从技术竞争进入地缘竞争，但2.3万亿计划更像战略宣言，执行难度极大"}},{"title":"Claude Code创造者披露工作流：每天并行15个AI写代码，6个月未手写SQL，占GitHub提交4%","source":"华尔街见闻/腾讯新闻","url":"https://new.qq.com/rain/a/20260703A01GD900","summary":"7月3日Claude Code核心开发者Boris Cherny披露工作流：同时运行15个AI代理协同写代码，已6个月未手写SQL。Claude Code占GitHub公开提交量4%。Anthropic万人调查显示35%用户预计AI一年内完成大部分工作，重度AI委托者更乐观。但Linux创始人Linus Torvalds同日公开回应「99%代码由AI写」观点，反问「编译器写了100%，你咋不说？」。Meta内部限制工程师使用Claude/Codex，担忧模型蒸馏风险。AI Coding赛道分化：Claude Code(终端原生)/Codex(模型原生)/Cursor(IDE原生)三架构竞争。","category":"AI应用前沿","rating":4,"philosophy_insight":{"framework":"否定之否定 + 证伪主义 + 语言游戏","analysis":"✅正题：Claude Code创造者「15个AI并行+6个月不写SQL」代表了AI Coding的最激进实践——开发者角色从「写代码的人」变成「编排AI写代码的人」。❌反题：Linus Torvalds「编译器写了100%，你咋不说？」是对AI Coding叙事的证伪——「AI写代码」和「编译器生成机器码」都是自动化，不等于AI理解了代码的语义和意图。💡合题：AI Coding的否定之否定——「手写代码(2020前)→AI辅助写代码(2021-2024)→AI写代码人编排(2025-2026)」，下一阶段可能是「AI写+AI审+人只做架构决策」。证伪主义：35%用户预计AI一年内完成大部分工作——这个预期可能被证伪，因为「完成大部分工作」和「完成大部分代码」是两个不同维度的命题。语言游戏分析：「15个AI并行」把编程从「个人创作」重新定义为「多Agent协作」——但15个Agent的协调成本和一致性验证本身可能成为新瓶颈。","verdict":"AI Coding正在从辅助工具进化为多Agent协作平台，但Linus的证伪提醒：代码生成≠代码理解"}}],"startup_board":{"companies":[{"name":"宇树科技","field":"人形机器人/四足机器人","route":"硬件成本控制+核心零部件自研(95%自研率/85%国产化率)+WMA与VLA双路线","funding":"IPO募资42.02亿元，估值约420亿元","verdict":"A股具身智能第一股，2025年出货5500台+营收17亿+净利5.9亿"},{"name":"Together AI","field":"开源AI云/Neocloud","route":"出租NVIDIA GPU集群+开源模型推理服务，成本远低于封闭前沿模型","funding":"8亿美元C轮，估值83亿美元","verdict":"年度预订额11.5亿美元，开源模型使用量一年增三倍"},{"name":"小雨智造","field":"工业具身智能(焊接)","route":"4D世界模型(润物)+硬件平台(息壤)+定位笔，垂直焊接场景落地","funding":"产品起售16.98万，已落地十余家一线工厂","verdict":"具身智能从通用demo走向垂直工业场景落地的标杆"},{"name":"Etched","field":"AI推理芯片(ASIC)","route":"Transformer专用芯片Sohu，台积电4nm，声称吞吐量H100的160倍","funding":"累计8亿美元，估值50亿美元，10亿美元订单","verdict":"最激进的英伟达挑战者，今夏交付验证"}],"trend":"AI基础设施资本持续爆发：Together AI(8亿/83亿)+Etched(8亿/50亿)+OpenAI自研Jalapeño芯片。开源模型推理服务成新赛道——Together AI年预订11.5亿证明企业愿为「足够好+足够便宜」付费。具身智能垂直落地加速：小雨智造焊接机器人16.98万起售+十余家工厂落地。宇树IPO将系统性抬升国产机器人产业链估值中枢。"},"pm_board":{"insights":[{"title":"宇树IPO对具身智能PM的信号：量产交付+盈利能力成为估值锚","content":"宇树IPO以104天创纪录过会，核心不是审核宽松而是硬指标达标：2025年营收17亿(+333%)、净利5.9亿、出货5500台、自研率95%、国产化率85%。对PM意味着：具身智能产品的估值逻辑从「概念叙事」转向「量产交付+盈利能力」。PM需要回答三个问题：你的产品交付了多少台？核心零部件自研率多少？是否已经盈利？如果三个答案都不达标，IPO窗口可能关闭。宇树募资近半投向模型研发(WMA+VLA双路线)，说明硬件公司必须补齐「大脑」短板。"},{"title":"Meta AI智能体开发不及预期的PM警示：投入≠产出","content":"Meta砸320亿美元+裁员10%+转岗7000人+资本开支1450亿，四个月后CEO承认「没有像预期那样加速」。对PM的警示：AI智能体开发的瓶颈不是钱和人，而是技术范式的根本性难题(泛化/可靠性/长程规划)。PM需要重新评估AI Agent产品的预期管理——不要承诺「3-6个月突破」，而应该设定可验证的里程碑。Meta限制工程师使用Claude/Codex(担忧模型蒸馏)说明：外部AI工具的使用也涉及知识产权和数据安全风险，PM需要制定AI工具使用规范。"},{"title":"DeepSeek峰谷定价对AI产品PM的启示：从「卖token」到「调度算力」","content":"DeepSeek引入峰谷定价(高峰价格翻倍)是国产大模型首次掌握定价权。对PM意味着：AI产品的定价逻辑从「统一低价抢市场」转向「分时段调度算力资源」。PM需要设计错峰使用激励(夜间折扣/批量任务低峰执行)，引导用户行为优化算力利用率。DeepSeek的18次宕机+12万恶意账号教训说明：低价策略的代价是算力被滥用，PM需要在「用户增长」和「算力可持续」之间找平衡。峰谷定价预计可降低高峰期算力消耗25-30%，这是可量化的产品策略效果。"}],"focus":["宇树IPO后的产业链估值重估效应(核心零部件供应商率先受益)","AI Agent产品的预期管理(避免Meta式投入产出剪刀差)","AI产品峰谷定价策略设计(错峰激励+算力调度)","具身智能垂直场景落地路径(焊接/质检/物流)"]},"algo_board":{"insights":[{"title":"Sohu芯片架构深度解析：Transformer注意力机制固化到硬件的极端效率","content":"Etched的Sohu采用ASIC设计，将Transformer的注意力机制直接固化在芯片电路层面。台积电N4P 4nm工艺，144GB HBM3E。数学模块电压比竞品低50%+，片上SRAM+片外HBM组合兼顾低延迟和大容量。FLOPS利用率超90%(GPU约30%)。关键创新：PyTorch模型直接运行无需改代码——打破ASIC需新编程模型的历史魔咒。但核心赌注是Transformer架构不变，如果Mamba/SSM等新架构取代Transformer则失败。算法工程师需关注：Sohu交付后的独立验证数据，以及Transformer架构的统治期能持续多久。"},{"title":"强化学习+具身智能融合：Sutton访华的技术含义","content":"Sutton是强化学习奠基人(时间差分学习/Sarsa算法)，其访华首站选择具身智能创新中心信号明确。北京人形「慧思开物」平台18个月自主生成41万条跨场景泛化策略——这本质是强化学习在虚拟物理世界的试错学习。「具身天工」平台支持37种异构传感器+12类关节动力学热插拔，预留脑机接口协议层。算法工程师需关注：强化学习从虚拟环境(AlphaGo/Atari)向真实物理世界迁移的技术路径，包括样本效率、安全约束、sim-to-real迁移等核心难题。「机器人幼儿园」项目(他山科技+北京人形+OpenMind)可能产出新的RL+具身智能训练框架。"},{"title":"DeepSeek DSpark推理加速框架：生成速度提升60-85%的技术路径","content":"DeepSeek推出DSpark推理加速框架，通过投机解码等算法优化将模型生成速度提升60-85%。新一代模型引入混合注意力机制与三级存储协同策略，长文本处理显存占用降低40%。500亿融资中70%用于国产算力集群(乌兰察布10万P昇腾芯片)，与中国移动/联通建立跨区域算力调度网络。算法工程师需关注：投机解码在V4正式版中的具体实现、混合注意力机制的架构细节、以及国产昇腾芯片在万亿参数模型上的训练效率。峰谷定价的算法层面含义：用价格信号引导非紧急任务的调度，本质是「算力资源分配算法」的产品化。"}],"tech_radar":[{"direction":"Transformer专用ASIC推理芯片(Etched Sohu)","status":"验证期","advice":"等待今夏交付后独立验证，关注FLOPS利用率90%和PyTorch直接运行的工程可行性"},{"direction":"强化学习+具身智能融合(Sutton方向)","status":"突破期","advice":"关注「机器人幼儿园」项目产出，RL在真实物理世界的sim-to-real迁移是关键"},{"direction":"4D世界模型(小雨润物)","status":"成长期","advice":"焊接场景已验证，关注向其他工业场景(喷涂/打磨/装配)的泛化能力"},{"direction":"峰谷定价+算力调度(DeepSeek)","status":"成长期","advice":"用价格信号调度算力资源是基础设施成熟信号，关注降低25-30%高峰算力的实际效果"},{"direction":"OpenAI自研Jalapeño芯片","status":"突破期","advice":"9个月从设计到流片，2026年底部署，关注模型公司反向提升算力供给侧的新模式"},{"direction":"开源模型+Neocloud(Together AI)","status":"成长期","advice":"开源模型使用量一年增三倍，企业AI场景分层(顶尖 vs 足够好)是选型关键"}],"focus":["Etched Sohu芯片今夏交付后的独立性能验证(FLOPS利用率/吞吐量/PyTorch兼容性)","Sutton访华后强化学习+具身智能融合的技术框架和开源项目","DeepSeek V4正式版7月中旬上线的性能提升和DSpark推理加速效果","宇树WMA+VLA双路线模型研发的进展和开源可能性"]},"projmgr_board":{"insights":[{"title":"宇树IPO对具身智能项目管理的信号：从技术验证到量产交付的关键转换","content":"宇树IPO 104天创纪录过会的核心是硬指标达标(营收17亿/净利5.9亿/出货5500台/自研率95%)。项目管理启示：具身智能项目正在从「技术验证阶段」进入「量产交付阶段」，PMO需要建立「交付台数+核心自研率+盈利能力」的三大核心指标体系。宇树募资42亿中近半投向模型研发，说明硬件项目必须同步补齐软件/模型能力。建议：①建立量产交付追踪体系(月度出货量+客户部署数)；②模型研发项目集与硬件项目集并行管理；③供应链国产化率作为项目风险指标。"},{"title":"Meta AI Agent开发延期对项目风险管理的警示","content":"Meta裁员10%+转岗7000人+投入1450亿后四个月承认「不及预期」。项目管理警示：AI Agent项目的进度风险远高于传统软件——瓶颈不是人力不足而是技术范式未突破。PMO应该：①设定技术验证里程碑而非时间节点(「泛化能力提升X%」而非「3个月发布」)；②建立「投入-产出」剪刀差预警机制(当投入增速远超产出增速时触发降级评估)；③AI工具使用规范(参考Meta限制Claude/Codex的使用策略，防范模型蒸馏风险)；④预期管理：不承诺具体时间线，而是承诺可验证的能力提升。"}],"focus":["量产交付追踪体系(月度出货+客户部署+核心自研率)","AI Agent项目的预期管理(技术里程碑替代时间节点)","供应链国产化率作为项目风险指标","AI工具使用规范(模型蒸馏/数据安全/知识产权风险)"]},"hermes_board":{"insights":[{"title":"7月3日超级信息日：宇树IPO+Sutton访华+Meta坦白+DeepSeek峰谷定价四线同发","content":"单日四条线同时爆发：①资本线(宇树科创板IPO注册获批，A股人形机器人第一股，机器人指数暴涨4.26%)；②学术线(图灵奖得主Sutton空降北京人形机器人创新中心，强化学习与具身智能历史性握手)；③警示线(Meta CEO承认AI智能体开发不及预期，1450亿投入后四个月未加速，股价暴跌5%)；④定价线(DeepSeek V4正式版7月中旬上线，引入峰谷定价高峰价格翻倍，国产大模型首夺定价权)。叠加小雨智造焊接机器人发布和Together AI 8亿融资，标志AI+具身智能进入「量产验证+学术突破+泡沫警示+定价成熟」并行的复杂新阶段。","url":"https://stcn.com/article/detail/3995943.html"},{"title":"AI基础设施资本竞赛升级：Together AI 8亿+Etched 8亿+OpenAI Jalapeño，推理基础设施成最热赛道","content":"三起AI基础设施融资/发布同期爆发：Together AI(开源AI云，8亿美元C轮估值83亿，年预订11.5亿)、Etched(Transformer专用ASIC，8亿估值50亿+10亿订单)、OpenAI Jalapeño(自研推理芯片，9个月流片，2026年底部署)。共同信号：推理正成为AI规模化服务的最大瓶颈和成本中心。OpenAI从「模型公司」蜕变为「全栈AI公司」(模型+芯片+推理系统+数据中心)，Jalapeño第二代代号Serrano，目标吉瓦级数据中心。Neocloud(Together AI)和专用ASIC(Etched)代表两条不同路线——租GPU跑开源模型 vs 造专用芯片跑Transformer。","url":"https://news.qq.com/rain/a/20260703A03SRX00"}],"tech_stack":[{"title":"宇树科技WMA+VLA双路线模型研发","content":"宇树IPO募资42亿中近半投向模型研发，同时押注WMA(世界模型架构)与VLA(视觉-语言-动作)两大技术路线。核心零部件自研率95%+国产化率85%，2025年出货5500台。R1降价至2.99万元。这代表硬件公司向「大脑」补短板的战略转型——硬件成本控制(王兴兴路线)必须与模型智能提升同步。","url":"https://stcn.com/article/detail/3995943.html"},{"title":"北京人形「具身天工」+「慧思开物」双平台","content":"具身天工平台：融合多模态感知-具身推理-运动闭环的「数字躯体操作系统」(DOS)，支持37种异构传感器接入、12类关节动力学模型热插拔，预留脑机接口协议层。慧思开物平台：不训练单一任务，像人类幼童在虚拟物理世界摔打试错归纳，18个月自主生成41万条跨场景泛化策略。天工3.0全尺寸人形机器人可全程自主导览+高难度动作展示。","url":"https://www.sohu.com/a/1045106009_121956424"},{"title":"小雨润物4D世界模型：让焊接机器人拥有「工业直觉」","content":"小雨自研4D世界模型，推演动作执行后物理环境演化，提前找到满足约束的最优控制路径。超10万小时真实工业场景多模态数据，打通训练→在线数据回流→模型快速真机部署闭环。搭载英伟达Orin平台+旭日S600国产算力。定位笔采集空间信息实时传递，手机级UI让新手3分钟上岗。","url":"https://www.sohu.com/a/1045099384_121489117"},{"title":"DeepSeek DSpark推理加速+峰谷定价","content":"DSpark框架通过投机解码将生成速度提升60-85%。混合注意力机制+三级存储协同策略使长文本显存降低40%。峰谷定价：高峰(9-12/14-18点)API翻倍，预计高峰算力消耗降25-30%。乌兰察布智算中心10万P昇腾芯片，与中国移动/联通建跨区域算力调度网络。500亿融资70%用于国产算力集群。","url":"https://news.qq.com/rain/a/20260630A099FV00"}],"community":[{"title":"CIEI 2026上海具身智能博览会持续进行中(7月2-4日)","content":"国家会展中心(上海)首届国际具身智能产业博览会进行中。宇树/智元/加速进化/乐聚/中科新松等60+企业全阵容。京东超大展区，苏州/深圳/淄博产业集聚区集体亮相。商务部出海对接会收集欧洲+东南亚采购需求。7月4日14:00停止入场，提前预登记刷身份证入场。","url":"https://robot.ofweek.com/2026-06/ART-898890-8120-30692525.html"},{"title":"全球数字经济大会北京持续进行(7月2-5日)+80+前沿技术首发","content":"北京国家会议中心全球数字经济大会持续进行。80余项前沿技术/新品/解决方案集中首发首展。小雨智造焊接机器人/近20项数字经济行业规则标准(数据跨境/AI治理)出炉。人形机器人集中亮相，为全球数字合作提供「北京方案」。","url":"https://www.toutiao.com/article/7657775390378705423"},{"title":"Sutton访华后续：「机器人幼儿园」项目值得关注","content":"他山科技(北京人形全面战略合作伙伴)+北京人形+Sutton的OpenMind团队共建「机器人幼儿园」项目。Sutton指出：具身智能是实现AGI的关键路径，强化学习与具身智能深度融合是未来突破方向，机器人需在真实环境中通过持续交互学习积累对世界因果关系的理解。该项目可能产出新的RL+具身智能训练框架。","url":"https://www.sohu.com/a/1044635762_403354"}]},"action_items":{"tech_selection":["Claude Sonnet 5作为默认Agent模型(2-3个并行替代1个Opus)，注意tokenizer膨胀1.0-1.35倍对实际成本影响","DeepSeek V4正式版(7月中旬)作为成本敏感场景首选，利用峰谷定价错峰调度降低30%算力成本","Together AI作为开源模型推理基础设施备选(年预订11.5亿+三倍使用量增长验证企业接受度)","小雨润物4D世界模型作为工业垂直场景参考架构(焊接已验证10万+小时，关注向喷涂/打磨/装配泛化)"],"track_judgment":["具身智能产业：宇树IPO标志从「主题映射」进入「产业验证」，核心零部件供应商(减速器/伺服/传感器)将系统性受益","AI Agent赛道：Meta承认不及预期是全行业警示，AI智能体开发瓶颈在技术范式而非投入，3-6个月内难有根本性突破","AI基础设施：推理成本成AI规模化瓶颈，专用ASIC(Etched/OpenAI)+Neocloud(Together AI)+峰谷定价(DeepSeek)三条路线并行","AI模型定价：DeepSeek峰谷定价标志国产大模型从价格战进入算力调度时代，掌握定价权是商业化成熟信号"],"watch_list":["宇树科技科创板正式上市日期和首日表现(产业链估值锚定效应)","Etched Sohu芯片今夏交付后的独立第三方性能验证(声称H100的160倍)","Sutton「机器人幼儿园」项目的开源框架/论文产出","DeepSeek V4正式版7月中旬上线的性能提升和峰谷定价实际效果","Meta AI智能体3-6个月内是否出现预期中的加速(如不达预期可能触发AI投资信心回调)","日本2.3万亿美元主权AI计划的执行细节(18个行业1000万台机器人的落地路径)"]},"raw_articles":[{"title":"上市进程受市场关注 宇树科技 IPO注册申请获批","source":"中国证券报","url":"https://stcn.com/article/detail/3995943.html","summary":"证监会同意宇树科技IPO注册，拟募资42.02亿。104天创科创板预先审阅最快纪录。2025年营收17亿净利5.9亿，出货5500台","category":"IPO里程碑","rating":5,"publish_time":"2026-07-03"},{"title":"宇树科技IPO顺利过会！天弘机器人基金标的指数大涨超4%","source":"腾讯新闻","url":"https://new.qq.com/rain/a/20260703A04UAS00","summary":"中证机器人指数大涨4.26%，绿的谐波涨超12%。中信建投指物理AI量产节奏清晰，全球机器人军备竞赛即将开启","category":"股市行情","rating":5,"publish_time":"2026-07-03"},{"title":"A股异动:宇树科技科创板IPO获批,人形机器人概念全线飙升","source":"格隆汇","url":"https://m.gelonghui.com/live/2535248","summary":"凯龙高科20CM涨停，丰光精密涨超16%，贝斯特涨超14%，绿的谐波涨超11%，多股涨停","category":"股市行情","rating":4,"publish_time":"2026-07-03"},{"title":"利好突袭！机器人概念涨停潮","source":"东方财富/证券时报","url":"https://finance.eastmoney.com/a/202607033793261879.html","summary":"宇树IPO标志A股具身智能第一股即将诞生，万联证券指人形机器人正处于从技术突破到规模化商业化的破晓时刻","category":"股市行情","rating":4,"publish_time":"2026-07-03"},{"title":"具身智能引爆全球关注！图灵奖得主Sutton空降北京人形机器人创新中心","source":"搜狐","url":"https://www.sohu.com/a/1045106009_121956424","summary":"Sutton时隔五年再访中国首站选择具身智能。具身天工平台37种传感器+12类关节模型+脑机 var days=["2026-07-13","2026-07-10","2026-07-09","2026-07-08","2026-07-07","2026-07-06","2026-07-03"];

function esc(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML}
function stars(r){var s='';for(var i=0;i<5;i++)s='<span style="color:'+(i<r?'var(--star)':'var(--star0)')+'">\u2605</span>';return s}
function starsStr(r){var s='';for(var i=0;i<5;i++)s+=(i<r?'\u2605':'\u2606');return s}

function initDays(){
  var h='';
  days.forEach(function(d){h+='<button class="day-btn'+(d===curDay?' a':'')+'" onclick="pickDay(\''+d+'\',this)">'+d+'</button>'});

}

function pickDay(d,el){
  curDay=d;
  document.querySelectorAll('.day-btn').forEach(function(b){b.classList.remove('a')});
  el.classList.add('a');
  render();
}

function initTabs(){
  document.querySelectorAll('.tab').forEach(function(t){
    t.addEventListener('click',function(){
      curTab=this.getAttribute('data-t');
      document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('a')});
      this.classList.add('a');
      render();
    });
  });
}

function render(){
  var data=W[curDay];
  if(!data){document.getElementById('content').innerHTML='<div style="text-align:center;padding:3rem;color:var(--t2)">暂无该日数据</div>';return}
  document.getElementById('ut').textContent='最后更新：'+(data.update_time||curDay);
  var fn={hot:renderHot,startup:renderStartup,pm:renderPM,algo:renderAlgo,proj:renderProj,action:renderAction,hermes:renderHermes,phil:renderPhil,all:renderAll};

}

    });
    h+='</div>';
  }
  if(b.focus&&b.focus.length){
    h+='<div class="sec">📌 未来关注重点</div><div class="bcard"><ul>';
    b.focus.forEach(function(f){h+='<li>'+esc(f)+'</li>'});
    h+='</ul></div>';
  }
  document.getElementById('content').innerHTML=h;
}

function renderProj(d){
  var b=d.projmgr_board;
  if(!b){document.getElementById('content').innerHTML='<div class="bcard"><p>暂无新动态</p></div>';return}
  var h='<div class="sec">📅 项目经理板块</div>';
  (b.insights||[]).forEach(function(t){
    h+='<div class="bcard"><h3>'+esc(t.title)+'</h3><p>'+esc(t.content)+'</p></div>';
  });
  if(b.focus&&b.focus.length){
    h+='<div class="sec">📌 未来关注重点</div><div class="bcard"><ul>';
    b.focus.forEach(function(f){h+='<li>'+esc(f)+'</li>'});
    h+='</ul></div>';
  }
  document.getElementById('content').innerHTML=h;
}

function renderAction(d){
  var a=d.action_items;
  if(!a){document.getElementById('content').innerHTML='<div class="bcard"><p>暂无</p></div>';return}
  var h='';
  if(a.tech_selection){
    h+='<div class="sec">🔧 技术选型</div><div class="bcard"><ul>';
    a.tech_selection.forEach(function(t){h+='<li>'+esc(t)+'</li>'});
    h+='</ul></div>';
  }
  if(a.track_judgment){
    h+='<div class="sec">🎯 赛道判断</div><div class="bcard"><ul>';
    a.track_judgment.forEach(function(t){h+='<li>'+esc(t)+'</li>'});
    h+='</ul></div>';
  }
  if(a.watch_list){
    h+='<div class="sec">👀 Watch List</div><div class="bcard"><ul>';
    a.watch_list.forEach(function(t){h+='<li>'+esc(t)+'</li>'});
    h+='</ul></div>';
  }
  document.getElementById('content').innerHTML=h;
}

function renderHermes(d){
  var hb=d.hermes_board;
  if(!hb||(!hb.insights&&!hb.tech_stack&&!hb.community)){
    document.getElementById('content').innerHTML='<div class="bcard"><h3>📣 Hermes 信使</h3><p>暂无内容</p></div>';return;
  }
  var h='<div class="sec">📣 Hermes 信使</div>';
  if(hb.insights&&hb.insights.length){
    h+='<div class="hermes-sec"><h3>💡 洞察</h3>';
    hb.insights.forEach(function(item){
      h+='<div class="bcard"><h3>'+esc(item.title)+'</h3><p>'+esc(item.content)+'</p>';
      if(item.url)h+='<div style="margin-top:.3rem"><a href="'+esc(item.url)+'" target="_blank" style="color:var(--accent);font-size:.8rem">🔗 来源</a></div>';
      h+='</div>';
    });
    h+='</div>';
  }
  if(hb.tech_stack&&hb.tech_stack.length){
    h+='<div class="hermes-sec"><h3>🔨 技术栈</h3>';
    hb.tech_stack.forEach(function(item){
      h+='<div class="bcard"><h3>'+esc(item.title)+'</h3><p>'+esc(item.content)+'</p></div>';
    });
    h+='</div>';
  }
  if(hb.community&&hb.community.length){
    h+='<div class="hermes-sec"><h3>🌐 社区资源</h3>';
    hb.community.forEach(function(item){
      h+='<div class="bcard"><h3>'+esc(item.title)+'</h3><p>'+esc(item.content)+'</p></div>';
    });
    h+='</div>';
  }
  document.getElementById('content').innerHTML=h;
}

function renderPhil(d){
  var topics=(d.hot_topics||[]).filter(function(t){return t.philosophy_insight});
  if(!topics.length){
    document.getElementById('content').innerHTML='<div class="bcard"><h3>🧠 哲学洞察</h3><p>暂无内容</p></div>';return;
  }
  var h='<div class="sec">🧠 哲学洞察 ('+topics.length+'条)</div>';
  topics.forEach(function(t){
    var p=t.philosophy_insight;
    h+='<div class="bcard" style="border-left-color:var(--accent2)"><h3>'+esc(t.title)+'</h3>';
    h+='<div class="phil"><span class="fw">'+esc(p.framework||'')+'</span><p>'+esc(p.analysis||'')+'</p>';
    if(p.verdict)h+='<div class="verdict">'+esc(p.verdict)+'</div>';
    h+='</div></div>';
  });
  document.getElementById('content').innerHTML=h;
}

function renderAll(d){
  var arts=d.raw_articles||[];
  var h='<div class="search-bar"><span class="ico">\uD83D\uDD0D</span><input id="sInput" placeholder="\u641c\u7d22\u6807\u9898\u6216\u6458\u8981..." oninput="filterAll()"></div>';
  h+='<div id="allList"></div>';
  document.getElementById('content').innerHTML=h;
  window._allArts=arts;
  filterAll();
}

function filterAll(){
  var q=(document.getElementById('sInput')||{}).value||'';
  q=q.toLowerCase().trim();
  var arts=window._allArts||[];
  if(q)arts=arts.filter(function(a){return a.title.toLowerCase().indexOf(q)!==-1||a.summary.toLowerCase().indexOf(q)!==-1});
  var h='';
  if(!arts.length){h='<div style="text-align:center;padding:2rem;color:var(--t2)">\u672a\u627e\u5230\u5339\u914d\u8d44\u8baf</div>'}
  else{arts.forEach(function(a){
    h+='<div class="ncard"><div class="left"><h4><a href="'+esc(a.url)+'" target="_blank">'+esc(a.title)+'</a></h4><div class="nm">'+esc(a.source)+' · '+a.publish_time+' · '+starsStr(a.rating)+'</div></div><div class="right"><span class="cat">'+esc(a.category)+'</span></div></div>';
  })}
  document.getElementById('allList').innerHTML=h;
}

function toggleTheme(){
  var dk=document.body.getAttribute('data-theme')==='dark';
  document.body.setAttribute('data-theme',dk?'light':'dark');
  document.querySelector('.tbtn').innerHTML=dk?'&#x1F319;':'&#x2600;&#xFE0F;';
  localStorage.setItem('ai-news-theme',dk?'light':'dark');
}

document.addEventListener('DOMContentLoaded',function(){
  var sv=localStorage.getItem('ai-news-theme');
  if(sv==='dark'||(!sv&&window.matchMedia('(prefers-color-scheme:dark)').matches)){
    document.body.setAttribute('data-theme','dark');
    document.querySelector('.tbtn').innerHTML='&#x2600;&#xFE0F;';
  }
  initDays();initTabs();render();
});
</script>
</body>
</html>
