道资本密度前所未有。","url":"https://finance.eastmoney.com/a/202606303788424882.html"},{"title":"AI资本化周期出现裂缝信号","content":"OpenAI推迟IPO+SpaceX暴跌32%+软银股价暴跌13%。一级市场仍在狂热（自变量四轮/视比特/擎羽/源策），但二级市场已经开始修正。","url":"https://new.qq.com/rain/a/20260630A03SUC00"},{"title":"闭源模型独占时代终结：多云分发成为新常态","content":"GPT-5.5上AWS，Claude 4.x上Azure。模型厂商从封闭生态走向多云分发，企业选型从选模型转向选云+模型组合。","url":"https://view.inews.qq.com/a/20260630A04H3Y00"}]},"action_items":{"tech_selection":["【P0/7.7】试用LongCat-2.0 API评估Agent场景表现——特别是Claude Code/OpenClaw等Agent平台上的实际任务完成率","【P1/7.10】评估GPT-5.6 Agentic-First训练范式对自身Agent项目的技术启发——子智能体并行架构是否可借鉴","【P1】建立多模型多供应商架构（GPT-5.5 on AWS + Claude 4.x on Azure + LongCat/Claude Code本地），避免单点依赖","【P2】试用华为openPangu-2.0-Flash评估作为轻量级Agent底座的可行性"],"track_judgment":["AI+具身智能消费市场正式开启——优必选U1的1.3万台订单证明C端需求真实存在，2026年下半年是品类定型窗口期","AI资本化周期从狂热进入理性修正——SpaceX暴跌32%和OpenAI推迟IPO是泡沫裂缝的第一个信号，融资窗口可能收窄","全球基础模型进入淘汰赛——世界经济论坛预测仅剩10个，LongCat-2.0证明国产算力路线可行但性能仍有差距","美国政府开始管控AI模型分发——前沿模型从技术产品变为战略资产，出海模型面临地缘政治风险"],"watch_list":["【P0/9.16】优必选U1系列首批交付——评估13361台订单的实际交付率和用户满意度，判断消费级仿生品类是否站稳","【P1/7.15】自变量机器人商业化进展——200亿估值后的首个大客户订单和技术demo","【P1/7.10】SpaceX Grok 4.5公开测试——评估每月从零训练策略的可行性，观察与GPT-5.6/Claude的性能差距变化","【P1/7.8】推进哲学深挖Day 5：证伪主义——用波普尔框架检验「万亿估值」「每月新模型」「1.3万台消费订单」等核心主张的可证伪性","【P2】英伟达机器人团队中国招聘进展——关注其具身智能技术栈和生态建设方向","【P2】GPT-5.6 Sol全面开放时间表——美国政府审批制下的开放节奏对行业的影响"]}},"2026-06-29":{"update_time":"2026-06-29T18:00:00+08:00","hot_topics":[{"title":"智元机器人第15000台量产下线：精灵G2龙旗工厂6天并线直播，作业成功率99.99%","source":"科创板日报/上海证券报/财联社","url":"https://cj.sina.com.cn/articles/view/2868676035/aafc85c302001rp6q","summary":"6月28日，智元第15000台具身智能机器人精灵G2在量产基地正式下线，即日交付至龙旗科技南昌工厂。同日，龙旗工厂8台精灵G2的6天连续并线作业直播结束：总作业时长64小时，产线累计产量17625件，作业成功率99.99%。从2023年6台样机到1.5万台，三年间实现3000倍跨越。智元CEO邓泰华提出2026年为「部署态元年」，机器人从开发工具转变为即插即用的生产力。","category":"量产突破","rating":5,"philosophy_insight":{"framework":"否定之否定 + 扬弃","analysis":"✅正题：智元从6台到1.5万台的三年跨越证明了人形机器人量产的可行性，99.99%的作业成功率远超行业预期，龙旗直播消除了「只能摆拍」的行业质疑。❌反题：15000台数字惊人但绝对值仍小——对比手机产线日产万台的规模，人形机器人的供应链成熟度仍处于早期。99.99%成功率在3C质检这一半结构化场景中达成，开放场景泛化能力尚未验证。💡合题：15000台是「量产的量产」拐点——它第一次让供应链有了规模化采购的动力，也倒逼了零部件成本曲线下降。但真正考验是从「造得出」到「用得好」，部署态元年才刚刚开始。扬弃分析：智元扬弃了从实验室到量产的线性格局——取消了对单台精雕细琢的工匠思维，保留了全栈自研的技术壁垒，提升为供应链标准化交付体系（A链）。","verdict":"15000台是供应链量变到质变的临界点，部署态元年意味着从造得出到用得好的二次长征"}},{"title":"银河通用完成25亿元B轮融资估值破200亿：国家队领投，创具身智能单轮融资纪录","source":"经济参考报/钛媒体","url":"https://www.toutiao.com/article/7654570058366992959","summary":"银河通用近日完成25亿元B轮融资，投后估值突破200亿元。国家AI产业基金三期、上汽金控联合牵头，中国石化、中银资产、中芯聚源、亦庄国投等数十家产业与国资机构同步加码，创国内具身智能单轮融资金额新高。Galbot系列人形机器人已批量进驻宁德时代电池产线和连锁药店场景，万台级量产交付订单落地。","category":"资本化突破","rating":5,"philosophy_insight":{"framework":"对立与统一 + 语言游戏","analysis":"核心矛盾对：国家队产业资本(追求战略价值+长期回报) vs 商业财务资本(追求高倍数+快速退出)。银河通用25亿融资是国家队与商业资本第一次在人形机器人赛道形成合力——大基金三期首次投资具身智能意味着赛道从「概念验证」升级为「国家级生产力工具」。语言游戏分析：「25亿融资」「估值200亿」等数字在资本市场语境中是「定价信号」而非「价值确认」——融资额与估值反映的是稀缺性溢价和押注未来的决心，而非当前营收水平的映射。银河通用2026年预计营收3-4亿元，200亿估值对应的PS约50-66倍，是典型的高成长预期定价。","verdict":"国家队入场是赛道从概念验证升级为国家战略的转折信号，但高估值意味着高期待，商业化兑现压力前所未有"}},{"title":"工信部发布2026年度人形机器人实景实训通知：万台级规模落地开启「作业模式」","source":"新华网/工信部官方","url":"https://www.toutiao.com/a7656331259446870537","summary":"工信部与国务院国资委近日联合发布通知，开展2026年度人形机器人与具身智能实景实训专项行动，明确到年底前在百个以上高价值应用场景完成验证部署，带动万台级规模落地能力。同期，8台智元精灵G2在龙旗南昌工厂完成6天并线作业直播，是政策落地后的首个标志性验证案例。","category":"政策驱动","rating":5,"philosophy_insight":{"framework":"证伪主义 + 目的论vs机械论","analysis":"证伪主义分析：政策目标「万台级规模落地」是可证伪的——到年底是否有万台真实部署，有明确的统计口径可验证。相比之前「大力发展」「积极推进」等不可证伪的政策表述，万台级量化目标具备实质认知价值。目的论vs机械论：政策驱动的产业路径是典型的目的论——政府设定万台目标、配套资金和制度，引导企业向目标前进。但市场层面的实际部署量是涌现结果——取决于技术成熟度、成本曲线和客户接受度，而非政策指令的直接映射。两者的张力决定了最终落地规模可能偏离政府目标。","verdict":"万台级量化目标使政策具备可证伪性，但目的论的政策指引与涌现式的市场落地之间存在天然张力"}},{"title":"Agility Robotics通过SPAC登陆美股：全球首个纯人形机器人上市主体","source":"今日头条","url":"https://www.toutiao.com/a7654929842474861090","summary":"6月24日，美国人形机器人企业Agility Robotics通过与SPAC公司Churchill Capital Corp XI合并登陆美股，交易估值约25亿美元(约170亿人民币)。富士康领投2亿美元定向增发。Digit是目前全球唯一在客户现场持续执行量产性工作的双足人形机器人，累计运行超6.5万小时，RoboFab工厂全面投产后年产能1万台。","category":"资本化里程碑","rating":4,"philosophy_insight":{"framework":"否定之否定 + 语言游戏","analysis":"✅正题：Agility上市标志着人形机器人从一级市场概念战切换到二级市场定价战，年营收1000万美元、250倍市销率表明市场愿意为赛道潜力买单。❌反题：250倍PS远超行业合理估值，Digit当前规模化营收有限，如果未来几个季度营收增长不及预期，估值将面临大幅修正。💡合题：Agility上市的意义不在于当前估值是否合理，而在于它为整个赛道开辟了二级市场融资和退出通道。语言游戏视角：「人形机器人第一股」的叙事在资本语境中换取流动性溢价——公众市场为稀缺性买单，但终将回归基本面。","verdict":"Agility上市打开了人形机器人资本化的新通道，但250倍PS的估值需要真实营收增长来消化"}},{"title":"宁德时代与银河通用达成全球战略合作：Galbot S1搭载宁德电池上岗智慧产线","source":"凤凰科技/宁德时代官方","url":"https://tech.ifeng.com/c/8uE1Ldd4o8t","summary":"6月24日，宁德时代与银河通用正式签署全球战略合作协议。Galbot S1是全球首款搭载宁德时代电池的人形机器人，具备双臂50公斤级载重、纯视觉厘米级定位及360°全向避障能力，已进入宁德智慧产线承担物料搬运和拣选作业。双方将建立全球首个具身智能后市场服务标准。","category":"应用落地","rating":4,"philosophy_insight":{"framework":"具身认知 + 对立与统一","analysis":"具身认知视角：Galbot S1验证了具身认知的核心命题——智能在身体-电池-环境的完整回路中。搭载宁德电池意味着人形机器人第一次获得了与电动汽车同等级的能源基座，续航瓶颈从「能不能做」转向「能做多久」。对立统一分析：电池化工链(制造业思维) vs 机器人智能链(科技思维)正在融合，催生「机器人的加油站和4S店」这一新基础设施需求。","verdict":"宁德时代下场是具身智能产业链融合的标志性事件——电池巨头开始为机器人建「加油站和4S店」"}},{"title":"微信AI助手「小微」灰度测试：100万用户体验，腾讯将AI种进国民级App","source":"钛媒体/雷科技","url":"https://www.tmtpost.com/8039400.html","summary":"6月下旬，微信AI助手「小微」低调开启灰度测试，约100万用户参与。入驻微信左上角、聊天工具栏等多元入口。支持语音/文字发消息、调设置、拨电话、点外卖、生成图片、甚至现场搓小程序。马化腾此前承认腾讯AI动作慢了，小微是腾讯首次把AI深深「种」进微信。同期企业微信AI Agent「大圆」内测，QQ邮箱推出Agently Mail AI专用邮箱。","category":"AI Agent","rating":4,"philosophy_insight":{"framework":"扬弃 + 语言游戏","analysis":"扬弃分析：微信小微扬弃了传统AI助手的形态——取消独立App/对话框的入口思维，保留了自然语言交互的核心能力，提升为嵌入社交层的Agent级能力。语言游戏分析：「小微」这个名字意味着轻量、陪伴式——与Siri等形成话语对比，腾讯的策略是降低预期、融入日常。关键问题：当14亿用户的AI入口是微信时，Agent的边界在哪里——是工具还是平台？","verdict":"微信小微是Agent从应用层下沉到社交层的关键实验——14亿用户池是最大优势，但克制与开放的平衡是最大考验"}},{"title":"Anthropic发布Claude Tag：AI以虚拟团队成员身份加入Slack","source":"腾讯新闻/AI产品库","url":"https://www.yeyulingfeng.com/a/806095.html","summary":"6月23日，Anthropic正式发布Claude Tag，让AI以虚拟团队成员身份直接加入Slack频道。团队在频道中@Claude派发任务，进度回写至线程。Karpathy评价这是LLM UI的第三次重大变革。同日，阿里开源Qwen-AgentWorld首个原生语言世界模型。","category":"AI Agent","rating":4,"philosophy_insight":{"framework":"目的论vs机械论","analysis":"目的论视角：Claude Tag从个人助手升级为团队异步同事，AI的驱动力从被动响应转向主动参与。当AI可以自主规划工时、管理任务进度时，正在获得弱人格。关键问题：行为多大程度是设计的(Anthropic预设的协作框架) vs 涌现的(AI自主理解团队语境)？当前答案在设计端——权限隔离+审计日志+Token预算三件套说明可控性是优先考量。","verdict":"Claude Tag是AI从工具向团队成员角色切换的里程碑，但弱人格的边界管理才是企业级落地的真正门槛"}},{"title":"阿里发布首个具身大模型Qwen-Robot系列：VLA+VLN+世界模型三件套","source":"上海证券报/量子位","url":"https://www.cnstock.com/commonDetail/730135","summary":"6月16日，阿里巴巴发布千问具身智能大模型Qwen-Robot系列。核心突破：80维统一动作表征解决跨形态适配难题，基于相对位置操作摆脱绝对坐标依赖。Qwen-RobotManip只需数步反馈即可自动适配不同硬件，无需预训练微调。这是千问大模型家族首个完整具身智能模型系列。","category":"算法突破","rating":5,"philosophy_insight":{"framework":"扬弃 + 对立与统一","analysis":"扬弃分析：Qwen-Robot系列扬弃了传统VLA「一机一模」的训练范式——取消对单一硬件形态的专有定制，保留三模态融合的框架，提升为统一动作表征的「通用底座」范式。核心矛盾对：通用底座(覆盖多形态) vs 专用优化(单形态性能最大化)。80维统一动作表征就像USB-C接口——牺牲极端性能换取广泛兼容性。大厂入局意味着具身智能模型层开始标准化。","verdict":"阿里入局具身大模型意味着行业开始标准化，统一底座+多形态适配是VLA走向成熟的关键一步"}}],"startup_board":{"companies":[{"name":"智元机器人","field":"全栈具身智能/量产交付","route":"6月28日第15000台精灵G2下线，龙旗工厂6天直播99.99%成功率，全球首个3C产线质检全覆盖","funding":"2025年3月估值150亿，三年从6台到1.5万台","verdict":"量产节奏全球领先，部署态元年已卡位，但开放场景泛化仍需验证","philosophy_tag":"否定之否定"},{"name":"银河通用","field":"具身大模型+场景落地","route":"25亿B轮融资估值破200亿创纪录，Galbot系列进驻宁德时代产线+连锁药店场景","funding":"累计融资超93亿，国家AI产业基金三期首次投资具身智能","verdict":"国家队+产业资本双重背书，万台级交付订单在手，但高估值需营收支撑","philosophy_tag":"对立统一"},{"name":"Agility Robotics","field":"双足人形机器人/RaaS","route":"通过SPAC登陆美股(估值25亿美元)，Digit累计运行6.5万小时","funding":"RoboFab工厂年产能1万台，富士康2亿美元领投","verdict":"全球首个纯人形机器人上市主体，但250倍PS需兑现增长承诺","philosophy_tag":"语言游戏"},{"name":"星海图","field":"VLA模型+双足人形","route":"6月16日发布开源VLA模型G0.5，双足人形Kengo首秀，启动百万小时真实数据计划","funding":"2026年4月完成近20亿元B+轮融资","verdict":"唯一同时拥有顶尖模型与顶尖本体的具身智能企业，但开源生态商业模式尚未验证","philosophy_tag":"扬弃"}]},"pm_board":{"insights":[{"title":"从样机展示到万台部署：PM度量衡进入量产交付纪元","content":"智元15000台+银河通用万台级订单+Agility上市，三重信号验证了人形机器人从概念阶段进入量产交付纪元。PM需要重构产品指标框架：生产端关注单台成本下降曲线，部署端关注MTBF和运维ROI，客户端关注复购率和场景拓展率。微信小微暗示Agent入口正在从App下沉到社交和操作系统层。【哲学视角：否定之否定——技术指标的统治正在被量产经济指标否定，合成为全生命周期经济模型】"},{"title":"大厂Agent矩阵化：腾讯三端同步(微信小微+企微大圆+QQ邮箱Agent)，产品分层竞争","content":"腾讯6月集中推出三层Agent产品。分层策略表明Agent正在从单一通用助手走向场景化分层——不同入口对应不同用户需求和使用频率。对PM的启示：Agent产品定位需要回答「在哪一层？」而不是「能做多少事？」。【哲学视角：扬弃——Agent从单点通用助手扬弃为场景化分层：取消大一统思维，保留AI交互核心，提升为入口-工作流-工具的完整矩阵】"},{"title":"宁德时代×银河通用：产业链融合催生「机器人的加油站和4S店」","content":"Galbot S1搭载宁德电池，双方建立全球首个具身智能后市场服务标准。PM启示：机器人产业链正在从硬件制造延伸到后市场服务（电池更换/维护保养/软件升级），这是一个全新的产品品类机会。【哲学视角：具身认知——智能在身体-电池-环境的完整回路中】"}],"focus":["建立人形机器人全生命周期经济模型（单台制造成本→部署成本→运维成本→ROI回收期→残值）","评估自身Agent产品的入口层级定位（社交层/工作流层/工具层），避免一个产品覆盖太多层","关注具身智能后市场服务标准（电池/维护/软件升级）的产品化机会"]},"algo_board":{"insights":[{"title":"三条VLA技术路线同期爆发：统一底座标准化 vs 类脑架构生物化 vs 预演交互世界模型化","content":"6月中旬密集出现三条路线：阿里Qwen-Robot用80维统一动作表征推动VLA标准化，解决跨形态迁移难题；智平方NeuroVLA仿生人类大脑三层体系（皮层-小脑-脊髓），脊髓层功耗仅0.4W；星源智ω-EVA首创「预演-验证-行动」闭环让世界模型参与动作生成。共同信号：VLA正从像素级模仿走向认知级理解。【哲学视角：对立与统一——三条路线不是互斥的，未来可能融合为分层认知架构】"},{"title":"ACE-Ego第一视角人类视频联合训练：RoboCasa 72.8%刷新SOTA，低成本数据新航线","content":"大晓机器人与港中文发布ACE-Ego，大规模首视角人类视频与多型机器人数据联合训练。仅引入人类视频联合预训练即带来4.5%提升（68.3%→72.8%），RoboTwin 2.0中90.62%成功率。VLA训练数据成本结构正在被颠覆——互联网人类视频有望成为新训练燃料。【哲学视角：扬弃——取消对高成本遥操作数据的单一依赖，保留模仿学习核心，提升为人类视频预训练+机器人数据微调的双阶段范式】"},{"title":"ω-EVA：全球首个具身交互世界模型，1.2B参数LIBERO 98.6%","content":"星源联合智源发布ω-EVA，首创「动作提议→后果预演→动作修正」闭环，让世界模型从离线预测变成在线决策引擎。1.2B参数全程特征空间推理，无需额外预训练。核心创新：引入弱目的论——机器人执行前先想象后果再行动。【哲学视角：目的论vs机械论——比纯条件反射式VLA更接近人类决策方式，行为多大程度是设计的vs涌现的】"}],"tech_radar":[{"direction":"统一VLA底座（Qwen-Robot 80维表征）","status":"成长期","advice":"关注标准化进展，评估是否基于统一底座做场景定制"},{"direction":"类脑VLA架构（NeuroVLA皮层-小脑-脊髓）","status":"突破期","advice":"持续跟踪功耗和实时性指标，关注FiS-VLA快慢系统"},{"direction":"预演交互世界模型（ω-EVA闭环决策）","status":"突破期","advice":"重点关注预演机制的泛化能力和推理延迟"},{"direction":"第一视角人类视频预训练（ACE-Ego）","status":"验证期","advice":"评估数据质量对下游性能的影响，可小规模实验验证"},{"direction":"Agent生态入口（微信小微/Claude Tag/企微大圆）","status":"成长期","advice":"选择主流生态做适配，预留多生态切换能力"}],"focus":["同时理解三条VLA架构路线（统一底座/类脑/世界模型），关注融合趋势而非选边站队","评估第一视角人类视频作为VLA训练数据源的可行性和数据质量要求","跟踪Agent生态入口竞争格局，从模型能力竞争转向入口生态竞争意味着什么"]},"projmgr_board":{"insights":[{"title":"智元万台级交付+国家队入场+工信部万台级实景实训：产业链从单点突破进入系统化推进","content":"项目KPI从样机验收切换到批量部署验收——MTBF、单位工时成本、ROI回收期成为核心指标。国网68亿采购/8500台设备、银河通用25亿融资、智元15000台下线三重信号同时到位。供应链管理上升为项目经理第一优先级。【哲学视角：否定之否定——技术可行性验证的统治正在被量产经济性验证否定，合成为全产业链系统化推进】"},{"title":"阿里/腾讯/Anthropic同期密集发布Agent产品：Agent产业链从模型驱动转向生态驱动","content":"微信小微+企微大圆+QQ邮箱Agent+Claude Tag集中发布，Agent竞争进入第三阶段（模型能力→工具生态→入口生态）。技术选型从选模型转向选生态。项目经理需关注：生态适配成本、多生态兼容性、数据闭环能力。【哲学视角：扬弃——Agent从模型能力竞争扬弃为生态入口竞争：取消单一模型依赖，保留AI交互能力，提升为入口-工作流-工具的完整生态矩阵】"}],"focus":["在项目路线图中增加供应链成熟度评估和产能爬坡规划节点","建立以MTBF和单位运维成本为核心的部署质量管理体系","选择主流生态（Slack/微信/企微）作为入口，预留多生态适配能力","关注工信部万台级实景实训政策窗口，评估参与试点场景的机会"]},"raw_articles":[{"title":"智元第15000台具身机器人精灵G2下线交付龙旗工厂，6天直播作业成功率99.99%","source":"科创板日报","url":"https://cj.sina.com.cn/articles/view/2868676035/aafc85c302001rp6q","summary":"6月28日智元第15000台下线，三年从6台到1.5万台。龙旗工厂8台精灵G2并线直播6天，累计产量17625件，成功率99.99%。","category":"量产突破"},{"title":"银河通用完成25亿元B轮融资估值破200亿，国家AI产业基金三期领投","source":"经济参考报","url":"https://www.stcn.com/article/detail/3936066.html","summary":"创国内具身智能单轮融资新纪录，Galbot系列已进驻宁德时代产线和连锁药店场景。","category":"融资"},{"title":"工信部联合国资委发布2026年度人形机器人实景实训专项行动通知","source":"新华网","url":"https://www.toutiao.com/a7656331259446870537","summary":"明确到年底前在百个以上高价值应用场景完成验证部署，带动万台级规模落地能力。","category":"政策驱动"},{"title":"Agility Robotics通过SPAC上市，富士康领投2亿美元","source":"今日头条","url":"https://www.toutiao.com/a7654929842474861090","summary":"全球首个纯人形机器人上市主体，Digit累计运行6.5万小时。RoboFab年产能1万台。","category":"资本化"},{"title":"宁德时代与银河通用签订全球战略合作协议，Galbot S1搭载宁德电池上岗","source":"凤凰科技","url":"https://tech.ifeng.com/c/8uE1Ldd4o8t","summary":"全球首款搭载宁德电池的人形机器人，双臂50公斤级载重。建立全球首个具身智能后市场服务标准。","category":"应用落地"},{"title":"微信AI助手「小微」开启灰度测试，约100万用户体验","source":"钛媒体","url":"https://www.tmtpost.com/8039400.html","summary":"覆盖微信首页左上角等多入口，支持语音指令发消息、调设置、点外卖、生成小程序。","category":"AI Agent"},{"title":"Anthropic发布Claude Tag：AI以虚拟团队成员身份加入Slack","source":"AI产品库","url":"https://www.yeyulingfeng.com/a/806095.html","summary":"团队@Claude派发任务并回写进度。Karpathy称LLM UI第三次重大变革。","category":"AI Agent"},{"title":"阿里开源Qwen-AgentWorld首个原生语言世界模型","source":"腾讯新闻","url":"https://www.yeyulingfeng.com/a/806095.html","summary":"35B-A3B与397B-A17B两种规格，让AI在脑中先模拟再行动。","category":"AI Agent"},{"title":"阿里发布首个具身大模型Qwen-Robot系列：VLA+VLN+世界模型三件套","source":"上海证券报","url":"https://www.cnstock. function esc(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML}
function stars(r){var s='';for(var i=0;i<5;i++)s='<span style="color:'+(i<r?'var(--star)':'var(--star0)')+'">\u2605</span>';return s}
function starsStr(r){var s='';for(var i=0;i<5;i++)s+=(i<r?'\u2605':'\u2606');return s}

function initDays(){
  var h='';
  days.forEach(function(d){h+='<button class="day-btn'+(d===curDay?' a':'')+'" onclick="pickDay(\''+d+'\',this)">'+d+'</button>'});
  document.getElementById('dayPicker').innerHTML=h;
}

function pickDay(d,el){
  curDay=d;
  document.querySelectorAll('.day-btn').forEach(function(b){b.classList.remove('a')});
  el.classList.add('a');
  render();
}

function initTabs(){
  document.querySelectorAll('.tab').forEach(function(t){
    t.addEventListener('click',function(){
      curTab=this.getAttribute('data-t');
      document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('a')});
      this.classList.add('a');
      render();
    });
  });
}

function render(){
  var data=W[curDay];
  if(!data){document.getElementById('content').innerHTML='<div style="text-align:center;padding:3rem;color:var(--t2)">暂无该日数据</div>';return}
  document.getElementById('ut').textContent='最后更新：'+(data.update_time||curDay);
  var fn={hot:renderHot,startup:renderStartup,pm:renderPM,algo:renderAlgo,proj:renderProj,action:renderAction,hermes:renderHermes,phil:renderPhil,all:renderAll};
  (fn[curTab]||renderHot)(data);
}

function renderHot(d){
  var h='<div class="sec">🔥 今日热点 ('+(d.hot_topics||[]).length+'条)</div>';
  (d.hot_topics||[]).forEach(function(t,i){
    h+='<div class="htcard"><div class="num">'+(i+1)+'</div><div class="body"><h4><a href="'+esc(t.url)+'" target="_blank">'+esc(t.title)+'</a></h4><p>'+esc(t.summary)+'</p><div class="meta">'+esc(t.source)+' \u00b7 '+esc(t.category)+' \u00b7 <span class="stars">'+starsStr(t.rating)+'</span></div>';
    if(t.philosophy_insight){
      var p=t.philosophy_insight;
      h+='<div class="phil"><span class="fw">'+esc(p.framework||'')+'</span><p>'+esc(p.analysis||'')+'</p>';
      if(p.verdict)h+='<div class="verdict">'+esc(p.verdict)+'</div>';
      h+='</div>';
    }
    h+='</div></div>';
  });
  document.getElementById('content').innerHTML=h;
}

function renderStartup(d){
  var s=d.startup_board;
  if(!s){document.getElementById('content').innerHTML='<div class="bcard"><h3>🚀 创业板块</h3><p>暂无新动态</p></div>';return}
  var h='<div class="sec">🚀 创业板块 — 重点企业跟踪</div>';
  h+='<table class="stable"><tr><th>企业</th><th>赛道</th><th>技术路线</th><th>融资/订单</th><th>择业判断</th></tr>';
  (s.companies||[]).forEach(function(c){
    h+='<tr><td><strong>'+esc(c.name)+'</strong></td><td>'+esc(c.field)+'</td><td>'+esc(c.route)+'</td><td>'+esc(c.funding)+'</td><td>'+esc(c.verdict)+'</td></tr>';
  });
  h+='</table>';
  if(s.trend)h+='<div class="bcard"><h3>📈 赛道趋势</h3><p>'+esc(s.trend)+'</p></div>';
  document.getElementById('content').innerHTML=h;
}

function renderPM(d){
  var b=d.pm_board;
  if(!b){document.getElementById('content').innerHTML='<div class="bcard"><p>暂无新动态</p></div>';return}
  var h='<div class="sec">📋 产品经理板块</div>';
  (b.insights||[]).forEach(function(t){
    h+='<div class="bcard"><h3>'+esc(t.title)+'</h3><p>'+esc(t.content)+'</p></div>';
  });
  if(b.focus&&b.focus.length){
    h+='<div class="sec">📌 未来关注重点</div>';
    h+='<div class="bcard"><ul>';
    b.focus.forEach(function(f){h+='<li>'+esc(f)+'</li>'});
    h+='</ul></div>';
  }
  document.getElementById('content').innerHTML=h;
}

function renderAlgo(d){
  var b=d.algo_board;
  if(!b){document.getElementById('content').innerHTML='<div class="bcard"><p>暂无新动态</p></div>';return}
  var h='<div class="sec">🧬 算法工程师板块</div>';
  (b.insights||[]).forEach(function(t){
    h+='<div class="bcard"><h3>'+esc(t.title)+'</h3><p>'+esc(t.content)+'</p></div>';
  });
  if(b.tech_radar&&b.tech_radar.length){
    h+='<div class="sec">🛰️ 技术雷达</div><div class="bcard">';
    b.tech_radar.forEach(function(r){
      var dot=r.status.indexOf('验证')!==-1?'dot-green':r.status.indexOf('成长')!==-1?'dot-blue':r.status.indexOf('观望')!==-1?'dot-yellow':'dot-red';
      h+='<div class="radar-item"><span class="radar-dot '+dot+'"></span><span class="radar-name">'+esc(r.direction)+'</span><span class="radar-status">'+esc(r.status)+'</span><span class="radar-advice">'+esc(r.advice)+'</span></div>';
    });
    h+='</div>';
  }
  if(b.focus&&b.focus.length){
    h+='<div class="sec">📌 未来关注重点</div><div class="bcard"><ul>';
    b.focus.forEach(function(f){h+='<li>'+esc(f)+'</li>'});
    h+='</ul></div>';
  }
  document.getElementById('content').innerHTML=h;
}

function renderProj(d){
  var b=d.projmgr_board;
  if(!b){document.getElementById('content').innerHTML='<div class="bcard"><p>暂无新动态</p></div>';return}
  var h='<div class="sec">📅 项目经理板块</div>';
  (b.insights||[]).forEach(function(t){
    h+='<div class="bcard"><h3>'+esc(t.title)+'</h3><p>'+esc(t.content)+'</p></div>';
  });
  if(b.focus&&b.focus.length){
    h+='<div class="sec">📌 未来关注重点</div><div class="bcard"><ul>';
    b.focus.forEach(function(f){h+='<li>'+esc(f)+'</li>'});
    h+='</ul></div>';
  }
  document.getElementById('content').innerHTML=h;
}

function renderAction(d){
  var a=d.action_items;
  if(!a){document.getElementById('content').innerHTML='<div class="bcard"><p>暂无</p></div>';return}
  var h='';
  if(a.tech_selection){
    h+='<div class="sec">🔧 技术选型</div><div class="bcard"><ul>';
    a.tech_selection.forEach(function(t){h+='<li>'+esc(t)+'</li>'});
    h+='</ul></div>';
  }
  if(a.track_judgment){
    h+='<div class="sec">🎯 赛道判断</div><div class="bcard"><ul>';
    a.track_judgment.forEach(function(t){h+='<li>'+esc(t)+'</li>'});
    h+='</ul></div>';
  }
  if(a.watch_list){
    h+='<div class="sec">👀 Watch List</div><div class="bcard"><ul>';
    a.watch_list.forEach(function(t){h+='<li>'+esc(t)+'</li>'});
    h+='</ul></div>';
  }
  document.getElementById('content').innerHTML=h;
}

function renderHermes(d){
  var hb=d.hermes_board;
  if(!hb||(!hb.insights&&!hb.tech_stack&&!hb.community)){
    document.getElementById('content').innerHTML='<div class="bcard"><h3>📣 Hermes 信使</h3><p>暂无内容</p></div>';return;
  }
  var h='<div class="sec">📣 Hermes 信使</div>';
  if(hb.insights&&hb.insights.length){
    h+='<div class="hermes-sec"><h3>💡 洞察</h3>';
    hb.insights.forEach(function(item){
      h+='<div class="bcard"><h3>'+esc(item.title)+'</h3><p>'+esc(item.content)+'</p>';
      if(item.url)h+='<div style="margin-top:.3rem"><a href="'+esc(item.url)+'" target="_blank" style="color:var(--accent);font-size:.8rem">🔗 来源</a></div>';
      h+='</div>';
    });
    h+='</div>';
  }
  if(hb.tech_stack&&hb.tech_stack.length){
    h+='<div class="hermes-sec"><h3>🔨 技术栈</h3>';
    hb.tech_stack.forEach(function(item){
      h+='<div class="bcard"><h3>'+esc(item.title)+'</h3><p>'+esc(item.content)+'</p></div>';
    });
    h+='</div>';
  }
  if(hb.community&&hb.community.length){
    h+='<div class="hermes-sec"><h3>🌐 社区资源</h3>';
    hb.community.forEach(function(item){
      h+='<div class="bcard"><h3>'+esc(item.title)+'</h3><p>'+esc(item.content)+'</p></div>';
    });
    h+='</div>';
  }
  document.getElementById('content').innerHTML=h;
}

function renderPhil(d){
  var topics=(d.hot_topics||[]).filter(function(t){return t.philosophy_insight});
  if(!topics.length){
    document.getElementById('content').innerHTML='<div class="bcard"><h3>🧠 哲学洞察</h3><p>暂无内容</p></div>';return;
  }
  var h='<div class="sec">🧠 哲学洞察 ('+topics.length+'条)</div>';
  topics.forEach(function(t){
    var p=t.philosophy_insight;
    h+='<div class="bcard" style="border-left-color:var(--accent2)"><h3>'+esc(t.title)+'</h3>';
    h+='<div class="phil"><span class="fw">'+esc(p.framework||'')+'</span><p>'+esc(p.analysis||'')+'</p>';
    if(p.verdict)h+='<div class="verdict">'+esc(p.verdict)+'</div>';
    h+='</div></div>';
  });
  document.getElementById('content').innerHTML=h;
}

function renderAll(d){
  var arts=d.raw_articles||[];
  var h='<div class="search-bar"><span class="ico">\uD83D\uDD0D</span><input id="sInput" placeholder="\u641c\u7d22\u6807\u9898\u6216\u6458\u8981..." oninput="filterAll()"></div>';
  h+='<div id="allList"></div>';
  document.getElementById('content').innerHTML=h;
  window._allArts=arts;
  filterAll();
}

function filterAll(){
  var q=(document.getElementById('sInput')||{}).value||'';
  q=q.toLowerCase().trim();
  var arts=window._allArts||[];
  if(q)arts=arts.filter(function(a){return a.title.toLowerCase().indexOf(q)!==-1||a.summary.toLowerCase().indexOf(q)!==-1});
  var h='';
  if(!arts.length){h='<div style="text-align:center;padding:2rem;color:var(--t2)">\u672a\u627e\u5230\u5339\u914d\u8d44\u8baf</div>'}
  else{arts.forEach(function(a){
    h+='<div class="ncard"><div class="left"><h4><a href="'+esc(a.url)+'" target="_blank">'+esc(a.title)+'</a></h4><div class="nm">'+esc(a.source)+' · '+a.publish_time+' · '+starsStr(a.rating)+'</div></div><div class="right"><span class="cat">'+esc(a.category)+'</span></div></div>';
  })}
  document.getElementById('allList').innerHTML=h;
}

function toggleTheme(){
  var dk=document.body.getAttribute('data-theme')==='dark';
  document.body.setAttribute('data-theme',dk?'light':'dark');
  document.querySelector('.tbtn').innerHTML=dk?'&#x1F319;':'&#x2600;&#xFE0F;';
  localStorage.setItem('ai-news-theme',dk?'light':'dark');
}

document.addEventListener('DOMContentLoaded',function(){
  var sv=localStorage.getItem('ai-news-theme');
  if(sv==='dark'||(!sv&&window.matchMedia('(prefers-color-scheme:dark)').matches)){
    document.body.setAttribute('data-theme','dark');
    document.querySelector('.tbtn').innerHTML='&#x2600;&#xFE0F;';
  }
  initDays();initTabs();render();
});
</script>
</body>
</html>
