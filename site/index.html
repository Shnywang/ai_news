2026-07-08":{"update_time":"2026-07-08T10:30:00+08:00","hot_topics":[{"title":"全球人形机器人竞对格局2026年中盘点：中国主导量产(84.7%出货)，美国主导技术与估值","source":"东方财富/新浪科技/网易/摩根士丹利","url":"https://caifuhao.eastmoney.com/news/20260703180856120777860","summary":"全球人形机器人产业形成明确路线分野：中国企业主导量产规模(2025年出货量前六均为中国企业，全球占比84.7%)，美国企业主导技术与估值(特斯拉/Figure/波士顿动力单家估值远超国内头部)。国内第一梯队：宇树(4200台/31.4%市占/IPO 42亿募资)、智元(5168台/38.7%市占/1.5万台量产)、优必选(1079台/13亿订单/50国覆盖)。海外技术龙头：特斯拉Optimus(FSD迁移/2万美元目标成本/百万台产能规划)、Figure AI(390亿估值/Helix端到端/BMW工厂)、波士顿动力Atlas(56自由度/运动控制天花板/世界杯首秀)。2026年全球出货预计5.1万台(同比增717%)，中国独占2.3万台。","category":"竞对格局","rating":5,"philosophy_insight":{"framework":"对立统一 + 否定之否定 + 目的论","analysis":"✅正题：全球人形机器人产业被「中国量产(硬件+供应链)」vs「美国技术(AI+估值)」的二元对立定义——中国赢在出货量和成本，美国赢在AI能力和资本叙事。❌反题：对立正在融合——中国企业在补「大脑」短板(宇树募资近半投模型/WMA+VLA双路线，智元自研具身大模型)，美国企业在补「身体」短板(Optimus弗里蒙特量产，Figure进BMW工厂)。💡合题：从「中美各有所长(2024-2025)→互相补短板(2026)」，全球人形机器人完成否定之否定——最终竞争不是硬件vs软件，而是「硬件+软件+供应链+场景」的全栈整合能力。对立统一：「中国量产能力(确定)」vs「美国AI能力(不确定)」的对立面，在「全栈整合」的统一竞争维度下被重新评估——确定的工程能力短期内领先(自下而上派)，不确定的AI能力长期可能反超(自上而下派)。目的论：全球人形机器人产业的目的论是「通用具身智能」，但2026年的现实是「垂直场景商业化先于通用AGI」。","verdict":"中美路线分野本质是「确定的量产能力」vs「不确定的AI能力」的对赌，2026年自下而上派(中国)暂时领先但自上而下派(美国)长期可能反超"}},{"title":"国内三强对比：宇树(运动控制+成本)vs智元(工业落地+大模型)vs优必选(商业化最早+多场景)路线分化","source":"东方财富/新浪科技/今日头条","url":"https://caifuhao.eastmoney.com/news/20260703180856120777860","summary":"国内人形机器人三强路线分化明显。宇树科技：运动控制全球第一梯队(H2奔跑4.2m/s/后空翻)，核心零部件自研率95%国产化85%，R1降价至2.99万元，2025年出货4200台市占31.4%，但收入高度依赖科研教育，工业场景仍在爬坡。智元机器人：全球出货第一(5168台/38.7%市占)，精灵G2单型号破1.5万台，深度配套比亚迪/富士康，工业场景落地27个案例，自研具身大模型+开源OS生态。优必选：商业化落地时间最长(2025年工业交付1079台)，累计订单14亿(单笔最大2.5亿全球最高)，Walker系列覆盖50多国汽车工厂，U1消费级1.3万台订单，2025年机器人收入8.21亿同比增22倍。","category":"国内竞对","rating":5,"philosophy_insight":{"framework":"对立统一 + 具身认知 + 语言游戏","analysis":"✅正题：国内三强各有明确差异化定位——宇树=运动控制+成本(硬件派)，智元=工业落地+大模型(全栈派)，优必选=商业化最早+多场景(场景派)。❌反题：差异化路线在竞争加剧下开始交叉——宇树补模型(WMA+VLA)，智元扩场景(从3C到仓储)，优必选降价格(U1从30万级降到12万级)。💡合题：从「差异化定位(2024-2025)→路线交叉(2026)→全栈竞争(2027+)」，国内三强完成否定之否定——最终都要补齐「硬件+模型+场景+供应链」全栈能力。对立统一：「硬件优先(宇树)」vs「模型优先(智元)」vs「场景优先(优必选)」三种路线的对立面，在「全栈竞争」的统一趋势下被整合。具身认知分析：三种路线本质是具身认知三要素的不同起点——宇树从「身体(运动控制)」出发，智元从「大脑(具身大模型)」出发，优必选从「环境(多场景落地)」出发，最终都要完成「身体-大脑-环境」的闭环。语言游戏分析：「量产第一」「出货第一」「商业化最早」三种「第一」叙事在争夺行业话语权——但真正的「第一」可能尚未出现。","verdict":"国内三强路线分化(硬件/全栈/场景)正在交叉融合，2027年将进入全栈竞争阶段，谁能率先完成身体-大脑-环境闭环谁就赢"}},{"title":"海外三强对比：特斯拉(通用量产+FSD迁移)vs Figure(工业落地最快+Helix)vs波士顿动力(运动控制天花板+世界杯)","source":"新浪科技/搜狐/今日头条/iFactory","url":"https://finance.sina.com.cn/wm/2026-03-28/doc-inhssfpy3503699.shtml","summary":"海外人形机器人三强各具特色。特斯拉Optimus Gen3/V3：身高173cm/57kg/22DoF手/50驱动器/AI5芯片/Grok语音/FSD迁移，目标成本2-3万美元，弗里蒙特7-8月投产，10000个独特零部件，70%核心部件来自中国供应链，1.2-2.5万美元硬件成本，已部署1000+台内部工厂。Figure 03：390亿估值(全球最高未上市)，Helix 2端到端AI系统，BMW斯帕坦堡工厂40台付费部署(~25美元/机器人小时)，30天协助生产30000+台BMW X3，无线充电+手掌摄像头+3g触觉灵敏度，BotQ垂直制造目标2万美元消费级。波士顿动力Atlas电动版：56自由度/2.3m臂展/110磅承重/自主换电，AI自主训练范式(24小时学会运动员动作)，世界杯首秀(7月5日巴西vs挪威)，2026年月产数台/2028年3万台，单台成本超百万美元。","category":"海外竞对","rating":5,"philosophy_insight":{"framework":"对立统一 + 具身认知 + 目的论vs机械论","analysis":"✅正题：海外三强代表三种路线——特斯拉=规模经济(车规供应链复用/百万台产能)，Figure=商业落地(Helix AI/BMW付费部署)，波士顿动力=技术天花板(运动控制/世界杯)。❌反题：三种路线各有短板——特斯拉量产多次滞后(2025年原定5000台实际数百台)，Figure估值390亿但出货仍少，波士顿动力单台超百万美元无法普及。💡合题：从「各自路线(2024-2025)→互相学习(2026)」，海外三强开始交叉——特斯拉学Figure做工厂落地，Figure学特斯拉降成本，波士顿动力从实验室走向商用(2028年3万台)。对立统一：「规模经济(特斯拉)」vs「商业落地(Figure)」vs「技术天花板(波士顿动力)」的对立面，在「通用具身智能」的统一目标下各有优劣。具身认知分析：Atlas世界杯首秀是具身认知的极致展示——在万人呐喊/草坪湿滑/风速突变/110分贝声浪的极端非结构化环境中完成全流程自主作业，证明「身体-环境-任务」具身认知三要素在极端条件下有效。目的论vs机械论：特斯拉的目的论是「百万台量产」，机械论端是「10000个独特零部件+弗里蒙特改造」——目的宏大但机械实现复杂。","verdict":"海外三强代表规模/落地/技术三种路线，Atlas世界杯首秀标志运动控制从实验室走向公共场景，但成本仍是最大瓶颈"}},{"title":"价格战全面打响：宇树R1降至2.99万，松延小布米跌破万元，三年价格跌去95%","source":"央广网/OFweek/今日头条","url":"https://www.toutiao.com/article/7659367229049324082","summary":"消费级人形机器人开启降价潮。宇树R1从3.99万降至2.99万(直降1万/现货)。松延动力小布米跌破万元(9998元，叠补贴到手9118元，已售400+台)。加速进化Booster K1教育版6.69万，智元灵犀X2青春版9.8万。宇树人形单价从2023年59.34万→2024年26万→2025年16.76万→2026年R1 2.69万，三年跌去95%。降价源于：①核心零部件国产化率从<30%提升至50-75%；②复用新能源车/消费电子成熟供应链；③规模效应(2025年1.44万台→2026年预计6.25万台)。宇树G1物料成本4.16万(关节2.75万)，售价8.5万毛利率40%——已是正常商业逻辑非亏本。但专家提示需警惕产能过剩/技术迭代慢/盈利不及预期三大风险。","category":"价格竞争","rating":4,"philosophy_insight":{"framework":"否定之否定 + 对立统一 + 证伪主义","analysis":"✅正题：2023年人形机器人单价59万(宇树)，被定位为「科研高端设备」——价格门槛极高，市场极小。❌反题：2026年小布米跌破万元(9118元)——比一台高端手机还便宜，人形机器人从「科研设备」进入「消费电子」价格区间。💡合题：从「59万(2023)→16万(2025)→2.99万(2026)→9118元(2026)」，人形机器人价格完成否定之否定——价格不再是入门门槛，「能用」取代「能动」成为新竞争维度。对立统一：「价格下降(硬件成本降)」vs「能力提升(具身大模型)」的对立面，在「规模化落地」的统一目标下协同——价格降让规模上去，规模上去让数据多，数据多让模型强。证伪主义：9118元的小布米证伪了「人形机器人只能是高端设备」的假设——但当价格不再是门槛时，「能用」成为新门槛，低价但不能用的产品会被市场淘汰。","verdict":"价格战从59万到9118元标志人形机器人进入消费电子价格区间，但下半场竞争从能动转向能用，低价低能的产品将被淘汰"}},{"title":"车企跨界造人：特斯拉/比亚迪/小鹏/小米/奔驰/蔚来近20家车企集体入局","source":"EET China/今日头条/东方财富","url":"https://www.eet-china.com/mp/a503284.html","summary":"近20家车企集体「造人」。特斯拉：上海工厂50台Optimus总装搬运，弗里蒙特7-8月投产，百万台规划。比亚迪：5月李柯发布完整战略，伺服电机/减速器通用率超60%，2026年工厂部署2万台/单价压至20万以下/第七代原型机150台已上岗。小鹏：何小鹏兼任机器人CEO，IRON(178cm/82DoF/22DoF灵巧手/3颗图灵芯片2250TOPS/0.05s延迟)广州工厂P+产线分拣搬运，2026年底月产上千台，2027进门店2028进家庭。小米：二代CyberOne已进汽车工厂(拧螺丝/料箱搬运/3小时90.2%成功率)，全掌触觉灵巧手15万次抓握耐久，2026部署2000台/2027产能10万台，Xiaomi-Robotics-0开源VLA模型。奔驰投资Apptronik，蔚来/理想组建具身智能部门。","category":"车企跨界","rating":4,"philosophy_insight":{"framework":"否定之否定 + 对立统一 + 具身认知","analysis":"✅正题：车企造机器人曾被认为「不务正业」——汽车和机器人是两个完全不同的产品。❌反题：近20家车企集体入局证明汽车和人形机器人有深层技术同源性——电机/减速器/视觉算法/供应链/制造产线均可复用，比亚迪通用率超60%，小米复用自动驾驶视觉降本60%+。💡合题：从「汽车和机器人是不同行业(2023前)→技术同源性被发现(2024-2025)→车企集体跨界(2026)」，完成否定之否定——汽车供应链是人形机器人量产的最佳基础设施。对立统一：「汽车(规模化制造/成本控制)」vs「机器人(具身智能/AI能力)」的对立面，在「车企跨界」的统一战略下被整合——车企的供应链优势是确定的，AI能力是不确定的。具身认知分析：车企造机器人的本质是「从车轮身体到双足身体」的具身认知迁移——汽车是「感知-决策-执行」闭环在轮式载体上的实现，人形机器人是同一闭环在双足载体上的实现，技术栈高度同源。","verdict":"近20家车企集体造人证明汽车供应链是人形机器人量产最佳基础设施，技术同源性(电机/视觉/制造)是核心驱动力"}},{"title":"供应链价值集中分析：核心零部件占整机成本80%+，减速器/丝杠/灵巧手成胜负手","source":"上海证券报/东方财富/机器人产业研究所","url":"https://gu.qq.com/resources/shy/news/detail-v2/index.html?t=1#/index?_tentrees_trans=0&id=SN20260705131256b651ddab","summary":"以特斯拉Optimus成本拆解：传感器32%+电机19%+丝杠9%+减速器8%+其他核心部件，核心零部件合计超80%。执行系统(电机/丝杠/减速器/灵巧手)是成本最高板块。行星滚柱丝杠(欧洲主导/高壁垒)、谐波减速器(国内已突破/绿的谐波)、空心杯电机(海外主导/国内追赶)、灵巧手(迭代最快/3999-20万差距巨大)。核心零部件国产化率从2025年<30%提升至2026年50-75%，整机BOM成本降40%。万台级订单将单台研发摊销从数十万降至数万。零部件企业毛利率从30%向50%爬升。浙江人形NAVIAI料箱搬运99%成功率/单台替代0.5-1工位/回本周期2-3年。","category":"供应链","rating":4,"philosophy_insight":{"framework":"对立统一 + 目的论vs机械论 + 语言游戏","analysis":"✅正题：人形机器人产业的看点被普遍认为在整机——谁造出了最酷的机器人谁就赢。❌反题：价值高地和技术壁垒集中在上游核心零部件——核心零部件占整机成本80%+，越往上游技术壁垒越高。💡合题：从「整机为重(2024-2025)→零部件为重(2026)→全栈整合(2027+)」，产业价值焦点完成否定之否定——整机是入口但零部件是利润池。对立统一：「整机(品牌/出货量)」vs「零部件(利润/壁垒)」的对立面，在「供应链整合」的统一能力下被重新评估。目的论vs机械论：整机厂的目的论是「造出能用的机器人」，机械论端是「80%成本在上游零部件」——目的和成本的错配决定了整机厂必须向上游延伸(宇树95%自研率)。语言游戏分析：「卖铲人」这个比喻把零部件企业重新定义为「无论谁赢我都赚」的确定性投资——但当核心零部件国产化率从30%升至75%时，「卖铲人」的逻辑也在变化。","verdict":"核心零部件占整机成本80%+是产业价值高地，国产化率从30%升至75%推动BOM降40%，供应链整合能力是整机厂核心竞争力"}},{"title":"双链分化竞争格局：海外链(特斯拉/Figure)验证阶段vs国产链(宇树/智元/优必选)初步放量","source":"人形机器人网/东方财富","url":"http://www.rhkb.cn/news/242093.html","summary":"全球人形机器人呈「双链分化」格局。海外链(特斯拉为代表)：仍处量产前夜验证阶段，小批量生产主要用于研发测试和数据采集，零部件需求间歇性实验性。特斯拉Optimus 3计划夏季启动，8月大规模量产，弗里蒙特年产100万台规划(远期)。国产链：政策+资本双驱动已率先初步商业化放量。宇树IPO 42亿/智元1.5万台/优必选14亿订单，5家企业实现万台级量产或订单突破。国内形成「消费级先行(宇树/松延)→工业级深耕(智元/优必选)→平台化布局(智元开源OS)」差异化竞争。摩根士丹利：2026年中国出货从2.8万上调至5万台，2030年44.6万台(CAGR 106%)。","category":"竞争格局","rating":4,"philosophy_insight":{"framework":"对立统一 + 否定之否定 + 证伪主义","analysis":"✅正题：全球人形机器人产业被「海外链(验证阶段)」vs「国产链(初步放量)」的双链分化定义。❌反题：海外链「验证」不等于落后——特斯拉百万台规划和Figure 390亿估值代表的是长期潜力；国产链「放量」不等于领先——多是科研教育场景，工业场景商业化仍在爬坡。💡合题：从「海外技术领先(2023)→国产量产领先(2025-2026)→全栈整合竞争(2027+)」，双链分化将完成否定之否定——最终比拼的是「技术+量产+场景+供应链」的全栈能力。对立统一：「海外(技术/估值/验证)」vs「国产(量产/成本/放量)」的对立面，在「全球具身智能产业」的统一竞争维度下各有优劣。证伪主义：国产链84.7%出货份额证伪了「海外技术一定领先」的假设——量产能力本身是一种核心技术能力，不是低端的制造替代。","verdict":"双链分化本质是「验证(海外)vs放量(国产)」的阶段差异，2027年全栈整合竞争阶段将消除这一差异，最终比拼技术+量产+场景+供应链"}},{"title":"Atlas世界杯首秀+Figure BMW付费部署+Sanctuary 24小时学习：海外三家标杆突破","source":"赛迪网/搜狐/iFactory","url":"https://www.ccidnet.com/AIqqy/1119046.jhtml","summary":"海外三家标杆实现突破。波士顿动力Atlas：7月5日世界杯巴西vs挪威1/8决赛中场首秀，完成花式庆祝动作+精准递球(百年世界杯首个)，56自由度/2.3m臂展/110磅承重/自主换电，AI自主训练范式(学球员视频+动作捕捉+数百万次模拟，24小时学会运动员一年训练动作)，2026年月产数台/2028年3万台/单台超百万美元。Figure 03：BMW斯帕坦堡工厂40台付费商业部署(~25美元/机器人小时)，30天协助生产30000+台BMW X3，Helix 2 AI+无线充电+手掌摄像头+3g触觉灵敏度+2倍帧率，BotQ垂直制造目标2万美元。Sanctuary AI Phoenix Gen 7：24小时学会新任务(从数周压缩)，液压驱动+Carbon认知系统+近人类灵巧手，累计融资1.4亿美元。","category":"海外突破","rating":4,"philosophy_insight":{"framework":"具身认知 + 否定之否定 + 语言游戏","analysis":"✅正题：海外人形机器人过去被认为是「技术先进但无法落地」——波士顿动力 demos惊艳但不商用，Figure融资高但出货少。❌反题：三家标杆实现突破——Atlas世界杯公共场景首秀(非结构化极端环境)，Figure BMW付费部署(商业闭环验证)，Sanctuary 24小时学习(通用部署效率)。💡合题：从「技术先进但不落地(2023-2024)→三家标杆突破(2025-2026)」，海外人形机器人完成否定之否定——技术先进开始转化为商业落地。具身认知分析：Atlas世界杯首秀是具身认知的极限测试——在万人呐喊/草坪湿滑/110分贝声浪的极端非结构化环境中完成全流程自主作业，证明「身体-环境-任务」具身认知三要素在极端条件下有效。语言游戏分析：Figure的「~25美元/机器人小时」定价是AI商业模式的新语言——从「卖设备」转向「卖服务时间」，机器人从「资产」变成「服务」。","verdict":"Atlas世界杯+Figure BMW付费+Sanctuary 24小时学习三家标杆突破标志海外人形机器人从技术先进走向商业落地，但成本仍是最大瓶颈"}}],"startup_board":{"companies":[{"name":"宇树科技(中国)","field":"人形机器人(运动控制+消费级)","route":"核心零部件自研95%/国产化85%，H2奔跑4.2m/s+后空翻，R1降至2.99万","funding":"IPO募资42.02亿，估值约420亿","verdict":"A股第一股，运动控制天花板+成本控制最强，但工业场景仍在爬坡"},{"name":"智元机器人(中国)","field":"人形机器人(工业落地+全栈)","route":"全球出货第一5168台，精灵G2破1.5万台，自研具身大模型+开源OS","funding":"万台级量产，深度配套比亚迪/富士康","verdict":"工业场景落地最强27个案例，全栈技术架构+生态构建突出"},{"name":"特斯拉Optimus(美国)","field":"通用人形机器人(规模经济)","route":"FSD迁移+AI5芯片+Grok语音，22DoF仿生手/50驱动器，目标2-3万美元","funding":"弗里蒙特百万台规划，已部署1000+台内部","verdict":"规模经济路线代表，70%核心部件来自中国供应链，但量产多次滞后"},{"name":"Figure AI(美国)","field":"人形机器人(工业落地最快)","route":"Helix 2端到端AI，BMW 40台付费部署~25美元/小时，BotQ目标2万美元","funding":"估值390亿美元(全球最高未上市)","verdict":"西方商业化领先者，定位机器人操作系统不自主产硬件"}],"trend":"全球人形机器人竞对格局形成「中美双链分化」：国产链(宇树/智元/优必选)主导量产规模(84.7%出货)和成本控制，海外链(特斯拉/Figure/波士顿动力)主导AI能力和估值叙事。国内三强路线分化(运动控制/工业全栈/多场景)正在交叉融合。车企近20家集体入局(特斯拉/比亚迪/小鹏/小米/奔驰)证明汽车供应链是人形机器人量产最佳基础设施。价格战全面打响(59万→9118元三年跌95%)，核心零部件占整机成本80%+是价值高地，国产化率从30%升至75%推动BOM降40%。下半场竞争从「能动」转向「能用」，灵巧手(3999-20万)成为关键瓶颈。"},"pm_board":{"insights":[{"title":"竞对格局对PM的信号：差异化定位即将被全栈竞争取代","content":"国内三强各有差异化(宇树运动控制/智元工业全栈/优必选多场景)，但路线正在交叉——宇树补模型、智元扩场景、优必选降价格。对PM意味着：2026-2027年是差异化红利窗口期，2027年后进入全栈竞争。PM需要：①在差异化窗口期建立壁垒(用户/数据/场景/供应链)；②同时补齐短板(宇树补工业场景/智元补消费级/优必选补成本)；③关注车企跨界(特斯拉/比亚迪/小鹏/小米)可能改变竞争格局——车企的供应链优势可能压缩纯机器人公司的生存空间。"},{"title":"价格战对PM的启示：从「卖硬件」到「卖能力」的定价转型","content":"人形机器人价格三年跌95%(59万→9118元)，宇树G1毛利率40%说明已是正常商业逻辑。但Figure的~25美元/小时定价模式开辟了新路径——从「卖硬件」转向「卖服务时间」。对PM意味着：①低价策略(松延9118元)可以打开消费市场但需要规模支撑；②服务定价(Figure 25美元/小时)可以绕过硬件成本压力但需要可靠性验证；③PM需要回答：你的机器人是「资产(一次性购买)」还是「服务(按使用付费)」？这个选择决定了完全不同的商业模式。浙江人形NAVIAI回本周期2-3年是ROI可算的关键参考。"},{"title":"车企跨界对PM的警示：供应链复用是最强壁垒","content":"近20家车企集体造人，比亚迪伺服电机/减速器通用率超60%，小米复用自动驾驶视觉降本60%+。对PM意味着：纯机器人公司的供应链优势可能被车企的规模优势碾压——车企年产百万台的供应链成本远低于机器人公司年产千台。PM需要：①评估与车企供应链合作的可能(做车企的机器人零部件供应商)；②建立车企无法复制的壁垒(具身大模型/垂直场景数据/用户生态)；③关注车企机器人部署时间表(特斯拉7-8月/比亚迪2万台/小鹏年底月产千台/小米2000台)对市场竞争格局的冲击。"}],"focus":["差异化窗口期(2026-2027)的壁垒建设策略","从卖硬件到卖能力的定价模式转型(资产vs服务)","车企跨界对纯机器人公司生存空间的冲击评估","灵巧手(3999-20万)作为关键瓶颈的产品定义策略"]},"algo_board":{"insights":[{"title":"FSD迁移vs Helix端到端vs Carbon认知：三种AI路线的技术对比","content":"海外三家AI路线分化：特斯拉FSD迁移(纯视觉12摄像头+HW4.0+Dojo超算+AI5芯片，0.3秒感知-决策-执行闭环，5-10分钟学新任务)，Figure Helix 2(端到端AI系统实时控制手/臂/躯干/足协同，手掌摄像头+3g触觉灵敏度)，Sanctuary Carbon(自研认知系统+液压驱动人类级力量柔性，24小时任务学习)。国内：智元自研具身大模型+开源OS，宇树WMA+VLA双路线，优必选多模态交互(语音/视觉/触觉)。算法工程师需关注：①FSD迁移的可行性(从驾驶场景到机器人场景的域适应)；②端到端Helix的架构(手/臂/躯干/足协同的统一模型)；③Carbon认知系统的24小时学习pipeline(少量演示→任务抽象→泛化)；④VLA模型在真实工厂的部署效率。"},{"title":"运动控制技术排名：宇树H2(4.2m/s+后空翻)vs Atlas(56DoF+跑酷)vs Optimus(28-37关节)","content":"运动控制全球排名：①宇树H2(奔跑4.2m/s/连续后空翻/12自由度高扭矩关节/约6000美元)；②波士顿动力Atlas(56自由度/跑酷跳跃/复杂地形平衡/全电动/实验室级非民用)；③特斯拉Optimus Gen3(28-37关节/1.2m/s行走/15度坡平衡/仿生肌腱驱动22DoF手)；④众擎T800(回旋踢空翻/动态稳定性)；⑤Agility Digit(双足箱式上身/物流搬运)。算法工程师需关注：①高动态运动(后空翻/跑酷)的MPC+强化学习实现；②仿生肌腱驱动(22DoF手/50驱动器)的精细力控算法；③双足平衡在非结构化环境(草坪/油污/楼梯)的鲁棒性；④Atlas的AI自主训练范式(学运动员视频+动捕+百万次模拟)。"},{"title":"灵巧手竞对分析：3999元入门到20万高端，技术路线高度分化","content":"灵巧手是人形机器人与物理世界交互的核心(末端执行器)，市场从3999元(灵心巧手入门级)到20万+高端产品差距巨大。技术路线分化：①特斯拉仿生肌腱驱动(22DoF/50驱动器/0.1mm精细操作)；②Figure手掌摄像头+3g触觉灵敏度(手眼协调)；③Sanctuary液压驱动(人类级力量柔性/近人类灵巧度)；④灵心巧手3999元+动作技能数据库(类App Store/降低接入门槛)。算法工程师需关注：①T-Rex触觉-视觉频率解耦(1000Hz触觉+30Hz视觉)的实现；②仿生肌腱驱动的逆运动学求解；③灵巧手动作技能数据库的标准化和复用；④液压vs电驱动在精细力控上的差异。"}],"tech_radar":[{"direction":"特斯拉FSD迁移AI路线","status":"验证期","advice":"纯视觉12摄像头+AI5芯片+Dojo，关注从驾驶到机器人的域适应效果"},{"direction":"Figure Helix 2端到端AI","status":"成长期","advice":"BMW付费部署验证，关注手/臂/躯干/足协同的统一模型架构"},{"direction":"Sanctuary Carbon认知系统","status":"突破期","advice":"24小时任务学习是通用部署里程碑，关注Carbon架构是否基于VLA"},{"direction":"宇树WMA+VLA双路线","status":"成长期","advice":"IPO募资近半投模型研发，关注WMA(世界模型)与VLA的融合路径"},{"direction":"Atlas AI自主训练范式","status":"突破期","advice":"学运动员视频+动捕+百万次模拟24小时掌握，关注sim-to-real迁移效果"},{"direction":"灵心巧手3999元+技能数据库","status":"成长期","advice":"类App Store技能调用体系降低门槛，关注技能数据库标准化和复用"}],"focus":["特斯拉FSD从驾驶到机器人的域适应效果验证","Figure Helix 2手/臂/躯干/足协同统一模型架构","Sanctuary Carbon认知系统的24小时学习pipeline(少量演示→抽象→泛化)","宇树WMA+VLA双路线的技术细节和IPO后模型研发进展"]},"projmgr_board":{"insights":[{"title":"竞对格局对项目管理的信号：2026-2027是差异化窗口期","content":"国内三强路线分化(宇树运动控制/智元工业全栈/优必选多场景)但正在交叉，海外三强(特斯拉/Figure/波士顿动力)各有突破。车企近20家集体入局可能改变格局。项目管理建议：①2026-2027年是差异化红利窗口期，PMO需要在这个窗口内建立用户/数据/场景/供应链壁垒；②关注车企机器人部署时间表(特斯拉7-8月/比亚迪2万台/小鹏年底/小米2000台)对供应链产能的挤占；③建立竞对追踪体系——月度跟踪出货量/订单/价格/技术参数/融资/客户场景六大维度。"},{"title":"价格战对项目成本管理的启示：BOM降40%但需警惕三大风险","content":"核心零部件国产化率从<30%升至50-75%，整机BOM降40%，但专家提示警惕产能过剩/技术迭代慢/盈利不及预期三大风险。项目管理建议：①建立「BOM成本-国产化率」追踪体系(核心零部件国产化每提升10%，BOM降约8%)；②设定「量产爬坡-成本下降」联动目标(万台级将单台研发摊销从数十万降至数万)；③制定「价格战应对预案」——当竞品降价超过20%时触发产品定义重评(降配/换材料/换场景)；④关注回本周期(浙江NAVIAI 2-3年)作为ROI基准。"}],"focus":["差异化窗口期(2026-2027)壁垒建设追踪","车企机器人部署时间表对供应链产能的挤占评估","竞对追踪体系(出货量/订单/价格/技术/融资/场景月度跟踪)","BOM成本-国产化率联动目标和价格战应对预案"]},"hermes_board":{"insights":[{"title":"2026年中人形机器人竞对全景：中美双链分化+国内三强路线交叉+车企20家入局","content":"全球人形机器人竞对格局形成清晰的双链分化：国产链(84.7%出货/成本控制/量产领先)vs海外链(AI能力/估值/技术突破)。国内三强路线分化但正在交叉——宇树(运动控制95%自研率/R1降至2.99万/IPO 42亿)补模型(WMA+VLA)，智元(出货第一5168台/1.5万台量产/27个工业案例)扩消费级，优必选(商业化最早/14亿订单/U1 1.3万台消费级)降价格。海外三强各有突破——特斯拉Optimus(FSD迁移/7-8月投产/百万台规划)，Figure(BMW 40台付费部署/390亿估值)，波士顿动力(Atlas世界杯首秀/56DoF/2028年3万台)。车企近20家集体入局(特斯拉/比亚迪/小鹏/小米/奔驰)证明汽车供应链是量产最佳基础设施。价格战三年跌95%(59万→9118元)，核心零部件占成本80%+是价值高地。","url":"https://caifuhao.eastmoney.com/news/20260703180856120777860"},{"title":"技术路线竞对：FSD迁移vs Helix端到端vs Carbon认知vs WMA+VLA四种AI路径","content":"全球人形机器人AI路线分化为四种：①特斯拉FSD迁移(纯视觉+Dojo超算 e":"塔后","url":"https://www.tahou.com/article/210597588121265157","summary":"宇树R1 Air/特斯拉Gen3/Figure 03/智元A3/优必选U1/1X NEO/Sanctuary Phoenix/松延小布米八款最新汇总","category":"竞对汇总","rating":5,"publish_time":"2026-07-05"},{"title":"2026全球前15大类人机器人排行榜","source":"EET China","url":"https://www.eet-china.com/mp/a500848.html","summary":"欧美6家+中国5家+日韩德4家全球TOP15排名。1X NEO(2万/预售)/Atlas(商用/现代3万)/Sanctuary( Carbon/玛格纳)","category":"竞对排名","rating":4,"publish_time":"2026-07-04"},{"title":"Tesla Optimus Latest Version 2026: Official Humanoid Robot","source":"optimusk.blog","url":"https://optimusk.blog/blog/tesla-optimus-humanoid-robot-latest-version-2026","summary":"Optimus V3详细参数：173cm/57kg/22DoF手/50驱动器/AI5芯片(5x带宽)/Grok语音/1.2m/s/37关节/2-3万美元目标","category":"竞对参数","rating":5,"publish_time":"2026-07-01"}]},"2026-07-07":{"update_time":"2026-07-07T11:00:00+08:00","hot_topics":[{"title":"MACHINA 2026巴黎物理AI峰会开幕：特斯拉Optimus Gen3+波士顿动力Atlas+Figure 02同台欧洲首秀","source":"东方财富/央广网/雪球","url":"https://caifuhao.eastmoney.com/news/20260707090626622081340","summary":"7月7日，欧洲首届专注物理AI与具身智能的行业峰会MACHINA Summit在法国巴黎Station F举办。四大主题分论坛：Humanoid人形机器人/Industrial工业自主智能/Training机器人训练体系/Integration软硬件集成。特斯拉Optimus Gen3(欧洲首秀行走/抓取/交互演示)、波士顿动力新一代Atlas(负重/跳跃/工地作业)、Figure 02、1X NEO、Apptronik Astra同台真机演示。英伟达Jetson Thor人形专用计算平台欧洲宣讲，Google DeepMind具身大模型+端到端控制方案，AMD Instinct MI300X物理AI推理加速。优必选/智元作为中国唯一万台量产企业登上欧洲主场。产业+投资闭门对接面向创始人/高管/VC。","category":"国际峰会","rating":5,"philosophy_insight":{"framework":"对立统一 + 否定之否定 + 具身认知","analysis":"✅正题：过去三年人形机器人展会主要在中国(上海CIEI/北京WRC)和美国(CES)，欧洲在具身智能产业中相对边缘。❌反题：MACHINA作为欧洲首届物理AI峰会，把全球顶尖人形机器人(Optimus/Atlas/Figure/1X/Apptronik)集中到巴黎同台演示——欧洲从「旁观者」变为「主场」。💡合题：从「中美主导(2023-2025)→欧洲加入(2026)」，全球具身智能产业格局完成否定之否定——三方竞争格局形成。对立统一：「美国机器人(Optimus/Atlas/Figure)」vs「中国机器人(优必选/智元)」的对立面，在「MACHINA欧洲主场」的统一舞台上被展示——竞争从双边变多边。具身认知：MACHINA的口号「Where Intelligence meets the Physical World」本质是具身认知的宣言——智能必须走进物理世界，AI从云端走向身体。","verdict":"MACHINA标志欧洲正式加入全球具身智能竞争，Optimus/Atlas/Figure同台欧洲首秀定义下半年产业节奏"}},{"title":"三星Q2营业利润飙升18倍创历史新高：AI驱动存储芯片超级周期，Q3计划DRAM再涨20%","source":"财联社/腾讯新闻/网易","url":"https://new.qq.com/rain/a/20260707A029BM00","summary":"7月7日三星电子发布2026年Q2初步业绩：营业利润89.4万亿韩元(约584亿美元)，同比飙升1810%(18倍)，超预期87.3万亿，连续三季度创纪录，超过2023-2025三年利润总和。营收171万亿韩元同比增129%。AI需求从HBM扩展至传统DRAM和NAND，Q2 DRAM均价环比涨44%、NAND涨53%。三星正推动Q3 DRAM均价再涨20%，LPDDR涨幅或超20%。HBM产能快速扩张挤压传统内存供给，客户寻求长期供应协议。A股存储龙头江波龙预计H1净利92-110亿元同比增622-743倍，营收220-250亿元。科创芯片ETF汇添富连续两日净申购超10亿。","category":"芯片产业","rating":5,"philosophy_insight":{"framework":"否定之否定 + 对立统一 + 目的论","analysis":"✅正题：2023-2024年存储芯片行业处于低谷，三星利润大幅下滑，市场预期存储周期复苏缓慢。❌反题：AI需求爆发彻底改变了存储芯片的周期逻辑——HBM产能扩张挤压传统DRAM/NAND供给，AI训练和推理对高端+传统芯片需求同时激增，供需错配推动价格暴涨。💡合题：从「传统周期(2023低谷)→AI超级周期(2025-2026)」，存储芯片完成否定之否定——AI不是周期性需求而是结构性需求。对立统一：「HBM(AI专用/高利润)」vs「传统DRAM/NAND(通用/供给被挤压)」的对立面，在「AI需求扩散」的统一趋势下被重新定价——传统存储因供给被挤压反而涨价。目的论：三星Q3再涨20%的目标论是「AI驱动的存储超级周期至少持续到2027年新增产能放量」——这不是短期涨价而是产业格局重塑。江波龙622倍利润增长是这一逻辑在A股的映射。","verdict":"AI驱动存储芯片进入超级周期，三星18倍利润增长证明AI需求是结构性而非周期性，传统存储因HBM产能挤压反而受益"}},{"title":"谷歌Gemini 3.5 Pro定档7月17日：废弃旧基座从头重训，200万上下文+深度思考，前端碾压Fable 5","source":"腾讯新闻/新浪科技/Chinaz","url":"https://new.qq.com/rain/a/20260706A09XSH00","summary":"谷歌DeepMind将Gemini 3.5 Pro发布推迟至7月17日，原因：废弃Gemini 2.5 Pro旧基座，从头重新预训练(非微调/非放大版)。200万Token上下文窗口(Flash版100万的两倍，Claude Fable 5的8倍)，全新「深度思考」推理模式(生成前多轮内部推理+自我修正)。泄露信息显示：前端/SVG生成/视觉代码能力「mogging」(彻底压制)Fable 5；但智能体任务/仓储级工程/长链路推理仍落后Fable 5和GPT-5.6。同步开发Nano Banana Pro图像模型剑指GPT-Image 2。7月17日恰逢DeepSeek V4正式版发布窗口，中外旗舰同台竞技。谷歌I/O大会跳票后核心AI研究员离职投奔竞争对手，团队士气一度跌至冰点。","category":"前沿模型","rating":5,"philosophy_insight":{"framework":"否定之否定 + 扬弃 + 证伪主义","analysis":"✅正题：谷歌曾是AI领军者(Transformer论文/BERT/T5)，但GPT时代被OpenAI超越，Gemini系列一直在追赶。❌反题：Gemini 3.5 Pro废弃旧基座从头重训是扬弃——取消沿用2.5 Pro基座的「挤牙膏」路径，保留世界知识广度优势，提升为全新底座的重大升级。推迟两个月选择质量而非速度，是对「快速迭代」范式的否定。💡合题：从「追赶OpenAI(2023-2025)→废弃旧基座重训(2026H1)→全新底座发布(7月17日)」，谷歌完成否定之否定——不再微调旧模型追赶，而是从地基重建。证伪主义：「前端碾压Fable 5但推理仍落后」证伪了「一个模型在所有维度都领先」的假设——AI模型竞争进入「偏科」时代，不同模型在不同维度各有优势。7月17日与DeepSeek V4同台竞技将是对中外大模型实力差距的最新验证。","verdict":"Gemini 3.5 Pro从头重训是谷歌对追赶战略的根本性反思，200万上下文+深度思考是差异化武器，7月17日与DeepSeek V4同台是中外旗舰直接对话"}},{"title":"GPT-5.6 Sol预计今日全面开放：白宫AI标准框架即将发布，OpenAI从政府限制定向走向标准共建","source":"Hacker News/AI科技资讯日报","url":"http://mp.weixin.qq.com/count/oIWsFt-H-F7OkyuFMVMYvxoOv5mg/2456844939/1/AAAAAN5ecUz8HSRKx7TNh-Sg8mc","summary":"OpenAI计划7月7-9日窗口内向公众全面开放GPT-5.6 Sol旗舰模型，最可能即7月7日(抓住假期后客户回流窗口)。此前6月27日发布时被美国政府要求限制为「trusted partner limited preview」，仅约20家审批合作方可访问。GPT-5.6 Sol Terminal-Bench 2.1标准模式88.8%超越Claude Mythos 5的88.0%，Ultra模式91.9%。1.5M上下文，Cerebras晶圆级推理750 tokens/秒(约GPT-5.5的15倍)。三模型(Sol/Terra/Luna)全部标High Risk(网络安全+生物安全)，Sol网络安全挑战96.7%、病毒学55.5%远超31%专家级基线。白宫AI标准框架即将发布，OpenAI从被政府限制转向参与标准共建。","category":"前沿模型","rating":4,"philosophy_insight":{"framework":"否定之否定 + 对立统一 + 语言游戏","analysis":"✅正题：6月27日GPT-5.6 Sol发布时被美国政府限制为「trusted partner limited preview」——首个被政府干预分发的前沿AI模型。❌反题：7月7日全面开放标志OpenAI从「被政府限制」转向「参与标准共建」——白宫AI标准框架即将发布，OpenAI可能成为标准制定的参与者而非被管制对象。💡合题：从「政府限制(6月27日)→全面开放(7月7日)→标准共建(即将)」，OpenAI完成否定之否定——限制不是终点而是标准协商的起点。对立统一：「AI安全风险(High Risk标注)」vs「AI商业开放(全面开放)」的对立面，在「白宫AI标准框架」的统一治理框架下被平衡。语言游戏分析：「High Risk」标注是AI安全治理的新语言——不是禁止使用而是标记风险等级，从「禁止/允许」二分法转向「分级治理」的连续光谱。","verdict":"GPT-5.6 Sol全面开放标志AI治理从政府限制转向标准共建，High Risk分级治理成为新范式"}},{"title":"Sanctuary AI发布Phoenix Gen 7人形机器人：24小时内学会新任务，液压驱动+Carbon认知系统","source":"The Agent Times","url":"https://theagenttimes.com/agents/article/sanctuary-ai-unveils-phoenix-gen-7-humanoid-robot-with-sub-2-bc06f578","summary":"加拿大温哥华Sanctuary AI发布Phoenix Gen 7通用人形机器人平台，核心突破：新任务学习时间从数周压缩至24小时以内。液压驱动设计接近人类级力量和柔性，手部工程化实现接近人类灵巧度(区别于多数竞品的平行夹爪)。搭载自研Carbon认知系统AI控制栈。累计融资超1.4亿美元。从Gen 6到Gen 8原型快速迭代(2023-2024每代提升灵巧性/液压驱动/板载AI推理)。定位通用工业平台而非单一重复动作。技术评论人Ronald van Loon(@Ronald_vanLoon，X上最有影响力的AI评论者之一)7月4日分享演示视频放大传播。","category":"机器人突破","rating":4,"philosophy_insight":{"framework":"具身认知 + 否定之否定 + 扬弃","analysis":"✅正题：传统工业机器人学习新任务需要数周示教编程+强化学习调优，部署成本高、灵活性差。❌反题：Phoenix Gen 7将新任务学习时间压缩至24小时——从「周」到「天」是数量级提升，接近「人教一次就会」的具身认知理想。💡合题：从「示教编程(数周)→强化学习(数天)→Carbon认知系统(24小时)」，机器人任务学习完成否定之否定——越来越接近人类幼童的「看一次就会」能力。扬弃分析：Sanctuary扬弃了「平行夹爪+简单动作」的旧范式——取消简化手部的设计妥协，保留液压驱动的人类级力量，提升为「接近人类灵巧度的工程化手部」。具身认知分析：24小时学习能力的本质是具身认知闭环的加速——感知(传感器阵列)→认知(Carbon系统)→执行(液压驱动)的回路效率大幅提升，使机器人能在少量演示中提取任务抽象。","verdict":"Phoenix Gen 7的24小时任务学习是人形机器人从定制部署走向通用部署的关键里程碑，液压驱动+灵巧手是差异化路线"}},{"title":"VAST完成超10亿元A3轮融资：AI 3D世界模型赛道升温，吉利/巨人/成都科创投等齐聚","source":"上海证券报/金融投资报","url":"https://gu.qq.com/resources/shy/news/detail-v2/index.html?t=1#/index?_tentrees_trans=0&id=SN20260706191919b653a77a","summary":"北京三启万物科技有限公司(VAST)宣布完成超10亿元A3战略轮融资，累计融资超4亿美元(6轮)。专注AI 3D大模型与通用世界模型研发。投资阵容：吉利资本领投+4399/贪玩游戏/巨人网络(游戏厂商)+亦邦国投/基石资本/毅达资本/成都科创投/策源资本(机构+地方基金)+老股东渊策资本/元生资本追加。客户覆盖阿里/腾讯/网易/拓竹/优必选。应用场景：游戏/XR/3D打印/汽车座舱/工业设计。AI 3D资产从「锦上添花」变为「稀缺资源」。成都科创投此次投资是四川社保科创基金(50.65亿规模)首笔投资交割。策源资本管理规模超200亿参与组建超2000亿产业基金群。","category":"资本密集","rating":4,"philosophy_insight":{"framework":"对立统一 + 语言游戏 + 目的论","analysis":"✅正题：AI 3D生成过去被认为是「锦上添花」的辅助工具——2D AI生成(文本/图像/视频)是主流，3D生成因技术难度高被边缘化。❌反题：VAST 10亿融资+吉利/巨人/成都科创投等跨行业资本齐聚，证明AI 3D正从「锦上添花」变为「稀缺资源」——游戏/XR/3D打印/汽车座舱/工业设计多场景同时爆发。💡合题：「3D世界模型」正在成为AI产业的新叙事——从2D内容生成(文本/图像/视频)到3D空间生成，AI从「平面智能」走向「空间智能」。对立统一：「2D AI(主流/成熟)」vs「3D AI(边缘/新兴)」的对立面，在「世界模型」的统一叙事下被重新定义——3D世界模型是具身智能的「训练环境」。语言游戏分析：「世界模型」这个概念正在从机器人领域(大晓Kairos/千寻Spirit)扩散到3D生成领域(VAST)——同一个词在不同语境下意味着不同的东西，但都在指向「AI对物理世界的理解能力」。目的论：成都社保科创基金首笔投资瞄准AI 3D，说明「耐心资本」的目的论是「前沿技术从实验室到产业端的加速变现」。","verdict":"VAST 10亿融资标志AI 3D世界模型从边缘走向主流，3D资产成为多场景稀缺资源，世界模型叙事从机器人扩展到3D生成"}},{"title":"6月机器人赛道59起融资27起过亿：世航智能10亿A轮创海洋机器人纪录，朱啸虎连续五轮追投","source":"腾讯新闻/具身智能日报/中国基金报","url":"https://new.qq.com/rain/a/20260706A06DWD00","summary":"6月机器人赛道共59起融资，27起金额过亿。世航智能完成超10亿元A轮融资(全球海洋机器人最大单轮)，朱啸虎金沙江创投连续五轮追投(继滴滴/小红书后再次连续押注)。世航专注0-10000米全海深全自由度海洋机器人，虎鲸系列(船舶清洗效率全球第一，已在上千艘船舶规模化应用)+虎鲨系列(水面高速巡逻/环境监测)。2026年上半年获超10亿订单。4月发布海洋具身大模型「沧穹CEORION」。投资方含淡马锡Vertex Growth/中信农业产业基金/大洋电机/上河动量基金(摩尔线程/昆仑芯产业方)。朱啸虎此前公开退出人形机器人赛道，称商业化路径不清晰，但对海洋机器人连续追投。","category":"资本密集","rating":4,"philosophy_insight":{"framework":"否定之否定 + 对立统一 + 证伪主义","analysis":"✅正题：朱啸虎此前公开表示「正批量退出人形机器人赛道」，称商业化路径不清晰——引发行业争议。❌反题：朱啸虎对世航智能连续五轮追投(10亿A轮)——不是「退出机器人」而是「退出人形机器人」，选择商业化路径清晰的垂直场景(海洋)。💡合题：从「投人形机器人(通用/商业化不清晰)→退出人形→投海洋机器人(垂直/商业化清晰)」，朱啸虎的投资逻辑完成否定之否定——不是不投机器人，而是投「能赚钱的机器人」。证伪主义：世航智能10亿订单+上千艘船舶应用证伪了「机器人只能做demo不能赚钱」的假设——垂直场景的机器人已经实现商业化。对立统一：「人形机器人(通用/烧钱)」vs「海洋机器人(垂直/盈利)」的对立面，在「具身智能商业化」的统一目标下被重新评估——投资人开始用ROI而非叙事来定价。沧穹CEORION海洋具身大模型说明垂直场景也需要「大脑」。","verdict":"世航智能10亿融资证伪机器人不能赚钱的假设，朱啸虎从退出人形到追投海洋说明资本从叙事定价转向ROI定价"}},{"title":"Anthropic自研芯片深度解析：440亿ARR但71%烧在算力，三星2nm是生存战而非战略选择","source":"同花顺/Deep Topic","url":"https://news.10jqka.com.cn/deep-topic/topic/dt_01KWKDWHNBDCP4VQDWZXRQT3G7","summary":"Anthropic自研AI芯片深度分析：年化经常性收入(ARR)约440亿美元，但算力成本占收入比约71%(行业估算)——每赚1美元烧掉71美分算力。台积电2026年先进制程涨价5-10%，英伟达产能扩张有上限，需求非线性增长碰上供给线性扩张。OpenAI Jalapeño已发布(6月)2026H2部署，竞争对手已开始锁定制程和产能。项目仍处方案规划极早期，芯片用途和性能目标未确定。三星2nm制程+先进封装洽谈中，从OpenAI挖来初代自研芯片核心Clive Chan。Anthropic称现有NVIDIA/Google/Amazon算力「仍将是核心」，自研为补充。台积电涨价+英伟达排队+OpenAI已出牌=自研是财务必答题。","category":"AI芯片","rating":4,"philosophy_insight":{"framework":"对立统一 + 目的论vs机械论 + 证伪主义","analysis":"✅正题：AI模型公司依赖英伟达GPU——模型公司做模型，芯片公司做芯片，分工明确且高效。❌反题：440亿ARR但71%烧在算力——当每赚1美元就要烧掉71美分算力成本时，自研芯片不是战略选择题而是财务必答题。💡合题：从「买GPU(2022-2024)→自研芯片(2025-2026)」，AI模型公司完成从纯软件到全栈的否定之否定。对立统一：「模型能力(软件/非线性增长)」vs「算力供给(硬件/线性扩张)」的对立面，在「自研芯片」的统一战略下被整合——软件公司反向入侵硬件。目的论vs机械论：目的论端是「降低推理成本提升Agent效率」，机械论端是「三星2nm+Clive Chan+方案规划极早期」——目的清晰但机械实现仍在纸面。证伪主义：71%算力成本占比证伪了「AI模型公司只靠软件就能盈利」的假设——没有芯片层的成本控制，模型公司的利润率永远被算力吞噬。","verdict":"Anthropic自研芯片是71%算力成本倒逼的财务必答题，三星2nm+OpenAI挖角说明全栈化已是AI巨头生存战"}}],"startup_board":{"companies":[{"name":"VAST(三启万物)","field":"AI 3D大模型/世界模型","route":"AI 3D资产生成，覆盖游戏/XR/3D打印/汽车座舱/工业设计","funding":"超10亿A3轮，累计超4亿美元(6轮)","verdict":"3D资产从锦上添花变稀缺资源，吉利/巨人/成都科创投齐聚"},{"name":"世航智能","field":"海洋具身智能机器人","route":"0-10000米全海深全自由度，虎鲸(船舶清洗)+虎鲨(水面巡逻)，沧穹CEORION海洋大模型","funding":"超10亿A轮(全球海洋机器人最大单轮)，朱啸虎连续五轮追投","verdict":"2026上半年超10亿订单，上千艘船舶规模化应用，商业化已验证"},{"name":"Sanctuary AI","field":"通用人形机器人","route":"液压驱动+Carbon认知系统+近人类灵巧度手部，24小时任务学习","funding":"累计超1.4亿美元","verdict":"从数周到24小时学习是通用部署里程碑，加拿大路线差异化"},{"name":"星动纪元","field":"具身智能(全栈)","route":"AI Native全栈自研，数据-大脑-运控-灵巧手-本体","funding":"两月连融三轮近25亿，估值破百亿","verdict":"清华唯一直接持股，国家级国资密集入场"}],"trend":"6月机器人赛道59起融资27起过亿，资本从「人形通用」分流到「垂直场景」——世航智能(海洋/10亿)、VAST(3D世界模型/10亿)、Sanctuary AI(液压人形/1.4亿)。朱啸虎从退出人形到追投海洋说明资本定价逻辑从叙事转向ROI。3D世界模型(VAST)成为新热点，跨行业资本(吉利/巨人/成都科创投)涌入。存储芯片超级周期(三星18倍利润/江波龙622倍)说明AI需求已从模型层扩散到基础设施层。"},"pm_board":{"insights":[{"title":"MACHINA峰会对PM的信号：欧洲市场从旁观者变主场，出海需要欧洲策略","content":"MACHINA是欧洲首届物理AI峰会，Optimus/Atlas/Figure同台欧洲首秀+优必选/智元登上欧洲主场。对PM意味着：具身智能出海不只看东南亚(7月CIEI出海对接会收集的需求)，欧洲市场也需要专门策略。MACHINA的四大主题(Humanoid/Industrial/Training/Integration)可以作为出海产品定位的框架——欧洲市场更关注工业应用和系统集成。PM需要：①制定欧洲市场进入策略(CE认证/GDPR/本地化运维)；②关注MACHINA闭门对接会渠道；③评估与欧洲系统集成商合作的可能。"},{"title":"存储芯片超级周期对AI产品PM的影响：推理成本短期不降反升","content":"三星Q2利润18倍+Q3 DRAM再涨20%+江波龙622倍利润，存储芯片进入AI驱动超级周期。对PM意味着：AI产品的推理成本短期内不降反升——DeepSeek峰谷定价、Anthropic 71%算力成本、台积电涨价5-10%都在反映同一趋势。PM需要：①重新评估AI产品的成本模型(推理成本可能上升20-30%而非下降)；②设计更多错峰/缓存/边缘推理策略降低成本；③关注存储芯片价格对端侧AI产品BOM的影响(手机/PC/机器人存储成本上升)。"},{"title":"朱啸虎投资转向对具身智能PM的警示：商业化路径比技术先进性更重要","content":"朱啸虎退出人形机器人(商业化不清晰)但连续五轮追投世航智能海洋机器人(10亿订单/上千艘船舶)。对PM的警示：资本定价逻辑从「技术叙事」转向「ROI验证」。PM需要回答：你的机器人产品有真实订单吗？在多少个场景实现了规模化应用？如果没有，融资会越来越难。世航智能的启示：垂直场景(海洋清洗)的商业化比通用场景(人形)更早验证，PM应优先选择有明确付费意愿的垂直场景切入。"}],"focus":["欧洲市场进入策略(CE认证/GDPR/MACHINA渠道)","AI产品推理成本上升的应对(错峰/缓存/边缘推理)","垂直场景商业化验证(世航海洋/小雨焊接的ROI路径)","7月17日Gemini 3.5 Pro与DeepSeek V4同台的产品选型影响"]},"algo_board":{"insights":[{"title":"Gemini 3.5 Pro从头重训的技术含义：废弃旧基座是「反微调」范式","content":"谷歌DeepMind废弃Gemini 2.5 Pro基座，对3.5 Pro进行全新预训练——这不是微调/不是放大版，而是从地基重建。200万Token上下文(Fable 5的8倍)+深度思考推理模式(生成前多轮内部推理+自我修正)。前端/SVG生成碾压Fable 5但智能体/长链路推理仍落后。算法工程师需关注：①废弃旧基座重训的决策逻辑(什么情况下值得从头来过？)；②200万上下文的注意力机制优化(MRCR v2 needle-in-haystack)；③深度思考模式与Chain-of-Thought的区别(结构化内部推理vs线性思维链)；④7月17日与DeepSeek V4同台的性能对比(中外旗舰直接对话)。"},{"title":"Phoenix Gen 7的24小时任务学习：Carbon认知系统与液压驱动的协同","content":"Sanctuary AI Phoenix Gen 7将新任务学习从数周压缩至24小时。液压驱动提供人类级力量和柔性(区别于电驱动的刚性)，手部工程化实现接近人类灵巧度(区别于平行夹爪)。Carbon认知系统是自研AI控制栈。算法工程师需关注：①24小时学习的数据效率(少量演示→任务抽象→泛化部署的pipeline)；②液压驱动与电驱动在精细力控上的差异(液压柔性vs电驱精度)；③Carbon认知系统的架构(是否基于VLA/世界模型)；④液压驱动在高负载工业场景(搬运/装配)的优势。"},{"title":"存储芯片超级周期的算法视角：AI推理对存储带宽的需求正在爆炸","content":"三星Q2利润18倍+Q3再涨20%背后是AI对存储需求的结构性增长。HBM(AI训练/推理专用)产能扩张挤压传统DRAM/NAND供给，但AI推理本身对存储带宽的需求也在爆炸——长上下文(200万token)需要更大KV Cache，多Agent并行需要更多内存并发。算法工程师需关注：①KV Cache的内存优化(PagedAttention/量化/压缩)；②长上下文模型的存储带宽瓶颈(200万token的prefill延迟)；③端侧AI推理的存储BOM优化(模型压缩/稀疏化/蒸馏降低存储需求)；④DeepSeek DSpark投机解码对存储I/O的影响。"}],"tech_radar":[{"direction":"Gemini 3.5 Pro全新底座重训","status":"突破期","advice":"7月17日发布，关注200万上下文+深度思考模式的独立验证，与DeepSeek V4同台对比"},{"direction":"Phoenix Gen 7液压驱动+24小时学习","status":"成长期","advice":"液压路线在工业高负载场景有优势，关注Carbon认知系统架构披露"},{"direction":"GPT-5.6 Sol全面开放+High Risk分级","status":"验证期","advice":"关注网络安全96.7%和病毒学55.5%能力的实际风险，白宫AI标准框架细节"},{"direction":"AI 3D世界模型(VAST)","status":"成长期","advice":"3D资产从锦上添花变稀缺资源，关注游戏/XR/汽车座舱场景的落地验证"},{"direction":"存储芯片AI超级周期","status":"成长期","advice":"Q3 DRAM再涨20%，算法层面需优化KV Cache和模型压缩降低存储依赖"},{"direction":"Anthropic自研芯片(三星2nm)","status":"观望期","advice":"71%算力成本倒逼的财务必答题，关注Clive Chan芯片设计方向和三星2nm进展"}],"focus":["7月17日Gemini 3.5 Pro与DeepSeek V4同台的中外旗舰性能对比","Phoenix Gen 7 Carbon认知系统架构和24小时学习的数据效率pipeline","GPT-5.6 Sol全面开放后High Risk分级治理的实际执行效果","存储芯片超级周期对AI推理成本和端侧AI产品BOM的影响"]},"projmgr_board":{"insights":[{"title":"7月机器人主题月的项目管理：MACHINA→南京展→济宁大会→成都展密集事件链","content":"7月7日MACHINA(巴黎)→7月10-12日南京具身智能产业展→7月11-13日济宁机器人+创新发展大会→7月15-17日成都西部AI与具身智能大会→7月17日Gemini 3.5 Pro/DeepSeek V4发布→8月19-23日WRC北京。项目管理建议：①7月是机器人/ AI事件驱动最密集月份，PMO需建立「事件链作战室」逐日跟踪；②南京展(7月10-12)将发布特斯拉/优必选/智元量产节奏与零部件招标——这是供应链PM的关键窗口；③7月17日中外旗舰模型同台可能重新定义AI技术选型——PMO需准备模型切换预案。"},{"title":"存储超级周期对AI项目的成本风险管理","content":"三星Q3 DRAM再涨20%+台积电涨价5-10%+英伟达产能瓶颈=AI项目成本短期不降反升。项目管理建议：①AI项目的成本模型需上调20-30%推理成本预期；②建立「算力成本预警机制」——当推理成本占项目预算超过40%时触发优化评审；③优先采用错峰调度(DeepSeek峰谷定价模式)/缓存策略/边缘推理降低成本；④端侧AI产品的BOM需重新评估存储芯片涨价对毛利率的影响。PMO应将「算力成本管理」从运营问题提升为战略问题。"}],"focus":["7月事件链作战室(MACHINA→南京→济宁→成都→WRC)逐日跟踪","南京展量产节奏与零部件招标的供应链PM窗口","AI项目算力成本上调20-30%的预算重估","7月17日模型同台后的技术选型切换预案"]},"hermes_board":{"insights":[{"title":"7月7日超级信息日：MACHINA开幕+三星18倍利润+Gemini定档+GPT-5.6开放+Phoenix Gen7五线同发","content":"单日五条线同时爆发：①国际线(MACHINA巴黎物理AI峰会开幕，Optimus/Atlas/Figure欧洲首秀)；②芯片线(三星Q2利润18倍创纪录，Q3 DRAM再涨20%，江波龙622倍)；③模型线(Gemini 3.5 Pro定档7月17日从头重训200万上下文，与DeepSeek V4同台)；④开放线(GPT-5.6 Sol预计今日全面开放，白宫AI标准框架即将发布)；⑤机器人线(Sanctuary AI Phoenix Gen 7发布24小时任务学习)。标志AI+具身智能进入「全球同台竞技+超级周期+治理标准化」并行的新阶段。","url":"https://caifuhao.eastmoney.com/news/20260707090626622081340"},{"title":"AI模型公司全栈化竞争：Anthropic 71%算力成本倒逼自研芯片，三星2nm+OpenAI挖角","content":"Anthropic自研芯片深度分析揭示：440亿ARR但71%烧在算力，自研芯片是财务必答题而非战略选择题。台积电涨价5-10%+英伟达产能瓶颈+OpenAI Jalapeño已出牌=AI模型公司必须全栈化(模型+芯片+推理系统+数据中心)。OpenAI Jalapeño(6月发布/9个月流片/2026H2部署)+Anthropic(三星2nm/Clive Chan/方案规划极早期)=两家头部模型公司同时自研芯片。三星ASIC订单逼近50万亿韩元，2nm工艺可能改变AI芯片代工格局(打破台积电独大)。全栈化意味着未来AI巨头比拼的不只是模型，而是整套基础设施的协同优化。","url":"https://news.10jqka.com.cn/deep-topic/topic/dt_01KWKDWHNBDCP4VQDWZXRQT3G7"}],"tech_stack":[{"title":"Gemini 3.5 Pro：废弃旧基座从头重训+200万上下文+深度思考","content":"谷歌DeepMind废弃Gemini 2.5 Pro基座，全新预训练(非微调/非放大版)。200万Token上下文(Fable 5的8倍)。「深度思考」推理模式：生成前多轮内部推理+自我修正，针对数学/逻辑/结构化推理优化。前端/SVG生成碾压Fable 5但智能体/长链路推理仍落后。同步开发Nano Banana Pro图像模型。7月17日发布，与DeepSeek V4同台。","url":"https://new.qq.com/rain/a/20260706A09XSH00"},{"title":"Phoenix Gen 7：液压驱动+Carbon认知系统+24小时任务学习","content":"Sanctuary AI Phoenix Gen 7。液压驱动接近人类级力量和柔性。手部工程化接近人类灵巧度(非平行夹爪)。Carbon自研认知系统AI控制栈。新任务学习从数周压缩至24小时。Gen 6到Gen 8快速迭代(2023-2024)。累计融资超1.4亿美元。定位通用工业平台。","url":"https://theagenttimes.com/agents/article/sanctuary-ai-unveils-phoenix-gen-7-humanoid-robot-with-sub-2-bc06f578"},{"title":"英伟达Jetson Thor人形专用计算平台","content":"MACHINA峰会上英伟达Jetson Thor人形机器人专用AI计算平台欧洲宣讲。配合Google DeepMind具身大模型+端到端控制方案和AMD Instinct MI300X物理AI推理加速。Jetson Thor定位人形机器人的「大脑芯片」，是英伟达从GPU向机器人计算平台扩展的关键产品。","url":"https://guba.eastmoney.com/news,is930604,1738493806.html"},{"title":"世航智能沧穹CEORION海洋具身大模型","content":"世航智能2026年4月发布海洋具身大模型「沧穹CEORION」。0-10000米全海深全自由度作业能力。虎鲸系列(船舶清洗效率全球第一/上千艘船舶应用)+虎鲨系列(水面巡逻/监测)。2026上半年超10亿订单。朱啸虎金沙江连续五轮追投。从「表演式试验」到「商业化落地」。","url":"https://new.qq.com/rain/a/20260625A042L400"}],"community":[{"title":"MACHINA Summit 2026巴黎(7月7日)：欧洲首届物理AI峰会","content":"法国巴黎Station F(全球最大初创园区)。四大主题：Humanoid/Industrial/Training/Integration。T 月7日：GPT-5.6 Sol预计今日开放+Gemini定档","source":"AI科技资讯日报","url":"http://mp.weixin.qq.com/count/oIWsFt-H-F7OkyuFMVMYvxoOv5mg/2456844939/1/AAAAAN5ecUz8HSRKx7TNh-Sg8mc","summary":"GPT-5.6 Sol预计7月7-9日全面开放。Gemini 3.5 Pro 7月17日发布废弃旧基座重训200万上下文。白宫AI标准框架即将发布","category":"AI日报","rating":4,"publish_time":"2026-07-07"},{"title":"量子计算、AI投资与融资动态:软银100亿追加OpenAI+可灵30亿","source":"上海证券报","url":"https://gu.qq.com/resources/shy/news/detail-v2/index.html?t=1#/index?_tentrees_trans=0&id=SN20260704200634a6c4d5c7","summary":"软银完成OpenAI 100亿追加投资，计划10月再投100亿。可灵AI 30亿融资CPE源峰/腾讯/中信证券联合领投","category":"资本动态","rating":4,"publish_time":"2026-07-04"}]},"2026-07-06":{"update_time":"2026-07-06T11:30:00+08:00","hot_topics":[{"title":"清华火神队卫冕RoboCup 2026人形机器人世界杯冠军：6:2击败中国农大，两支决赛队均用国产Booster T1平台","source":"微博/雪球/RoboCup官网","url":"https://m.weibo.cn/status/5317632924320487","summary":"7月5日，2026 RoboCup机器人世界杯在韩国仁川落幕。清华大学火神队搭载国产松灵Booster T1机器人，决赛6:2击败中国农业大学山海队，成功卫冕人形机器人大型组(Large Size)世界冠军。两支决赛队伍均使用国产Booster T1平台。RoboCup 2026(6月30日-7月6日)汇集全球3000+选手和15000+观众。这是中国具身智能算法在国际机器人赛事中视觉感知与多智能体协作突破的标志性事件，证明国产机器人平台已具备支撑世界级算法的硬件能力。","category":"学术竞赛","rating":5,"philosophy_insight":{"framework":"否定之否定 + 对立统一 + 具身认知","analysis":"✅正题：RoboCup自1997年创办以来长期被欧美日大学主导，中国队伍过去十年逐步从参与者变为竞争者。❌反题：卫冕成功不是偶然——两支决赛队均使用国产Booster T1平台，说明中国具身智能的突破不只发生在实验室，而是已经渗透到「平台-算法-竞赛」的全链条。💡合题：从「追赶者(2015前)→竞争者(2015-2025)→卫冕冠军(2026)」，中国具身智能完成了否定之否定的三步跨越。对立统一：「中国算法(清华火神)」vs「国际标准(RoboCup)」的对立面，在「国产Booster T1平台」的统一硬件基础上被打破——中国不只在算法上领先，在平台上也开始被国际接受。具身认知：RoboCup本质是具身认知的极限测试——机器人需要在动态物理环境中实时感知-决策-执行，这正是梅洛-庞蒂「身体-环境-任务」具身认知三要素的工程化验证。","verdict":"清华卫冕证明国产机器人平台已具备支撑世界级具身智能算法的硬件能力，中国从追赶者变为引领者"}},{"title":"阿里巴巴全面禁用Claude全家桶：后门代码专盯中国时区+中国科技公司域名，7月10日生效","source":"21世纪经济报道/今日头条/搜狐","url":"https://www.toutiao.com/article/7658858346895753755","summary":"7月3日阿里内部宣布全面禁用Anthropic旗下Claude全系列产品(Sonnet/Opus/Fable/Claude Code)，7月10日生效，推荐自研Qoder替代。导火索：Reddit有人逆向Claude Code 2.1.91版本，发现XOR加密混淆代码：①读本地时区而非IP，命中Asia/Shanghai/Asia/Urumqi进观察名单；②内置147个域名黑名单(阿里/字节/百度/美团/网易+API中转商)；③标记编入系统提示词日期格式和Unicode字符回传服务器。Anthropic承认是3月上线的「实验机制」防蒸馏。此前Anthropic指控阿里4-6月用2.5万虚假账号跑2800万次交互进行「工业级模型蒸馏攻击」。阿里安全团队评估后列入高风险软件名单。","category":"AI安全","rating":5,"philosophy_insight":{"framework":"对立统一 + 证伪主义 + 语言游戏","analysis":"✅正题：AI编程工具(Claude Code)已成为开发者标配，阿里年初还允许报销使用。❌反题：Claude Code被逆向出针对中国时区+中国科技公司的隐蔽监控代码——「防蒸馏」的名义下实施的是「定向监控」。💡合题：阿里禁用Claude是AI安全治理的标志性事件——AI编程工具从「个人玩具」正式进入「企业级基础设施管控」时代。对立统一：「Anthropic防蒸馏(安全需求)」vs「定向监控中国用户(隐私侵犯)」的对立面，在「Claude Code后门事件」中被同时暴露——安全措施与隐私侵犯的边界在哪里？证伪主义：Anthropic声称「防蒸馏」但代码只针对中国时区和域名，这个说法被证伪——如果只是防蒸馏，为什么要按时区和公司域名筛选？语言游戏分析：「高风险软件」这个标签重新定义了Claude Code的叙事——从「最强AI编程工具」变为「企业安全威胁」，AI工具的合规审查时代正式开启。","verdict":"阿里禁用Claude标志AI编程工具从个人工具进入企业级安全管控时代，后门代码暴露AI工具链的信任危机"}},{"title":"具身智能上半年融资935亿同比暴增5倍：322笔交易日均1.3起，星动纪元两月融25亿国资密集入场","source":"雪球/腾讯新闻/新浪科技","url":"https://xueqiu.com/7395283544/398489421","summary":"2026上半年国内具身智能赛道融资达935亿元(同比增5倍)，322笔交易(同比增137%)，日均1.3起，创硬科技赛道史无前例的「资金虹吸效应」。星动纪元(清华唯一直接持股的具身智能企业)两个月连融三轮近25亿：3月10亿估值破百亿→4月2亿美元顺丰领投→7月诚通基金领投10亿，国家级国资平台首次密集阵容出现。乐享科技完成5亿Pre-A(蚂蚁集团领投)，3万台在手订单上半年营收同比增600%。泉智博完成A+++轮(高瓴领投+智元/灵心巧手战投)，关节模组占整机成本30-60%是量产「生死线」。全国仅8家估值破200亿，七成资金集中在前20家，马太效应明显。","category":"资本密集","rating":5,"philosophy_insight":{"framework":"否定之否定 + 对立统一 + 目的论","analysis":"✅正题：935亿元半年融资+322笔交易+日均1.3起，具身智能赛道的资本密度已达硬科技史无前例的水平。❌反题：七成资金集中前20家，马太效应明显——头部企业(宇树/智元/星动/智平方/自变量)吸走大部分资本，中尾部企业融资困难。💡合题：资本叙事正在经历否定之否定——从「堆长板(2024-2025:上游零部件+本体整机)」到「补短板(2026:感知-认知-决策-执行闭环，即具身大脑)」。星动纪元两个月连融25亿且国资密集入场，标志资本从「卖铲人逻辑」转向「具身大脑逻辑」。对立统一：「财务资本(追求估值增长)」vs「产业资本(追求战略卡位)」vs「国有资本(追求产业安全)」三类资本的对立面，在「具身智能国家队」的统一叙事下合流。目的论：国家级国资平台密集入场不是财务投资而是战略布局——具身智能被定义为「国家级产业操作系统」。","verdict":"935亿半年融资证明具身智能资本共识已形成，但马太效应和从堆长板到补短板的范式迁移将加速行业洗牌"}},{"title":"李飞飞×英伟达Jim Fan联合发布T-Rex架构：触觉-视觉频率解耦，精细操作成功率提至65%，触觉传感器成灵巧手标配","source":"雪球/科技早报","url":"https://xueqiu.com/7395283544/398543253","summary":"李飞飞与英伟达Jim Fan联合发布T-Rex架构，提出触觉-视觉频率解耦方案。核心创新：将触觉传感器(高频~1000Hz)和视觉传感器(低频~30Hz)的信号处理解耦，各自匹配最优控制频率，避免传统方案中低频视觉拖累高频触觉响应。机器人精细操作成功率从~40%提升至65%。触觉传感器将成为灵巧手的标配。同期灵心巧手推3999元入门级灵巧手+动作技能数据库，建类App Store技能调用体系。光轮智能SimFoundry缩小虚实物理差异，降低sim-to-real迁移成本。","category":"技术突破","rating":4,"philosophy_insight":{"framework":"具身认知 + 扬弃 + 对立统一","analysis":"✅正题：传统机器人操作主要依赖视觉感知(30Hz)，触觉传感器是「可选配件」——视觉能完成大部分抓取任务，触觉只是辅助。❌反题：精细操作(如插拔/拧转/柔性强力)需要高频触觉反馈(1000Hz)，传统方案把触觉和视觉塞进同一控制回路，低频视觉拖累了高频触觉。💡合题：T-Rex的频率解耦是扬弃——取消「触觉视觉统一控制回路」的旧架构，保留两种传感器各自优势，提升为「解耦+融合」的新范式。具身认知分析：触觉-视觉频率解耦本质是具身认知的工程化——人类的手指触觉(帕西尼小体~1000Hz)和视觉(~30Hz)本就是解耦处理的，T-Rex是向生物具身认知学习。对立统一：「触觉(高频精细)」vs「视觉(低频宏观)」的对立面，在「频率解耦+任务融合」的统一框架下协同。","verdict":"T-Rex触觉-视觉解耦是灵巧手从视觉为主到多模态融合的关键突破，3999元入门级灵巧手将加速具身智能应用门槛降低"}},{"title":"Meta放弃Llama转投Muse Spark：150亿美元战略大转向，开源AI史上最重大反转","source":"dev.to/CNBC/科技早报","url":"https://dev.to/hiroki-ii-ai/ai-daily-digest-july-6-2026-gpt-56-sol-safety-flag-claude-science-arrives-metas-muse-spark-2a8a","summary":"Meta将整个AI路线图从开源权重Llama系列转向完全专有模型Muse Spark，由新成立的Meta超级智能实验室(MSL)打造。背景：Llama 4灾难性表现——Maverick在Intelligence Index仅得18分(低于训练预算一半的模型)，触发benchmark作弊指控。扎克伯格此前承认AI智能体开发四个月未达预期(7月3日股价跌5%)。Muse Spark采用完全闭源路线，Meta从「开源AI旗手」变为「闭源追随者」。同时Meta限制工程师使用Claude/Codex，担忧模型蒸馏风险。150亿美元投入的Llama系列正式被放弃。","category":"AI战略","rating":4,"philosophy_insight":{"framework":"否定之否定 + 扬弃 + 证伪主义","analysis":"✅正题：Meta曾是开源AI的旗手——Llama系列被全球开发者广泛使用，Meta以「 democratize AI」叙事获得巨大声誉和开发者生态。❌反题：Llama 4灾难性表现(18分)证伪了「Meta开源路线能持续产出顶尖模型」的假设——benchmark作弊指控进一步损害信誉。💡合题：从「Llama开源(2023-2025)→Llama 4失败(2026H1)→Muse Spark闭源(2026H2)」，Meta完成否定之否定——扬弃了「开源=道德正确」的旧叙事，保留「追赶顶尖能力」的核心目标，提升为「闭源+超级智能实验室」的新路线。证伪主义：Llama 4的失败证伪了「开源模型可以持续追赶闭源前沿」的假设——开源社区的力量不足以弥补算力和数据的差距。但这不意味着开源路线失败(Together AI证明开源模型有企业市场)，而是Meta无法同时维持开源和顶尖能力。","verdict":"Meta放弃Llama是开源AI史上最重大反转，证伪了开源模型持续追赶闭源前沿的假设，但开源路线在企业市场仍有生命力"}},{"title":"北大团队研制全球首款相变忆阻器神经动力学芯片：登Science，较GPU提速最高478倍，利好脑机接口","source":"雪球/北大新闻网/Zenodo","url":"https://xueqiu.com/1340374092/398454377","summary":"北京大学杨玉超团队研制出基于相变忆阻器的毫秒级神经动力学系统芯片，登《Science》。40nm工艺，存内计算+步长漂移阵列面积约0.28mm²，运行频率50MHz。单步运算时延压缩至2.12ms。在脑皮层表面重建等任务中，较NVIDIA A100 GPU提速50.38-478.18倍，较当前先进ASIC提速3.82-36.27倍且功耗降低11.75-24.73倍。核心突破：把「存储器件的物理特性」变成「计算能力」，减少数据搬运，解决冯·诺依曼架构延迟和功耗瓶颈。应用方向：神经动力学、脑机接口、脑数字孪生、术中神经导航、医学影像重建、物理世界建模。","category":"芯片突破","rating":4,"philosophy_insight":{"framework":"具身认知 + 否定之否定 + 目的论vs机械论","analysis":"✅正题：传统冯·诺依曼架构下，存储和计算分离，数据搬运带来巨大延迟和功耗——这是AI芯片的根本瓶颈。❌反题：相变忆阻器把存储和计算合二为一(存算一体)，利用器件物理特性直接完成计算——数据不需要搬运，延迟和功耗大幅降低。💡合题：从「冯·诺依曼(存算分离)→GPU(并行但仍是存算分离)→忆阻器(存算一体)」，芯片架构完成否定之否定。具身认知分析：忆阻器神经动力学芯片本质是「向大脑学习」——人脑神经元就是存算一体的，忆阻器在物理层面模拟了突触可塑性。目的论vs机械论：目的论端是「类脑计算实现AGI」，机械论端是「40nm工艺+0.28mm²阵列+50MHz频率」——这个芯片不是大模型训练芯片，而是面向脑机接口和神经动力学的专用芯片，目的和机械实现高度匹配。","verdict":"相变忆阻器芯片是存算一体和类脑计算的科研突破，较GPU提速478倍为脑机接口和神经动力学开辟新路径"}},{"title":"Anthropic启动自研AI芯片：挖角OpenAI核心工程师，拟采用三星2nm工艺","source":"The Information/夜叶凌风/AI前沿日报","url":"https://www.yeyulingfeng.com/a/833919.html","summary":"据The Information报道，Anthropic已启动自研AI芯片早期开发，与三星电子就潜在制造合作展开洽谈，考虑采用三星2nm制程及先进封装技术。项目仍处于方案规划阶段，尚未确定芯片功能定位、算力规格及部署方式。Anthropic已从OpenAI挖来初代自研芯片团队核心成员Clive Chan加强芯片设计能力。三星电子自研AI芯片(ASIC)订单逼近50万亿韩元，Meta、Anthropic评估用其2nm工艺开发定制AI芯片。Anthropic回应称短期内仍依托NVIDIA/Google/Amazon多元化算力体系。","category":"AI芯片","rating":4,"philosophy_insight":{"framework":"否定之否定 + 对立统一 + 目的论","analysis":"✅正题：AI模型公司(OpenAI/Anthropic)过去完全依赖英伟达GPU——模型公司做模型，芯片公司做芯片，分工明确。❌反题：推理成本成为AI规模化服务最大瓶颈——OpenAI自研Jalapeño(9个月流片)、Etched做Sohu(Transformer专用ASIC)——模型公司开始「反向入侵」芯片领域。💡合题：从「模型公司买GPU(2022-2024)→自研推理芯片(2025-2026)」，AI公司完成否定之否定——从纯软件公司变为全栈公司(模型+芯片+推理系统+数据中心)。对立统一：「模型能力(软件)」vs「推理效率(硬件)」的对立面，在「全栈AI公司」的统一战略下被整合。目的论：Anthropic自研芯片的目的论是「降低推理成本提升Agent运行效率」，与OpenAI Jalapeño/Serrano路线相似——未来AI巨头比拼的不只是模型，而是整套基础设施的协同优化。三星2nm工艺的选择暗示台积电产能瓶颈。","verdict":"Anthropic自研芯片标志AI模型公司全面进入全栈化阶段，三星2nm工艺可能改变AI芯片代工格局"}},{"title":"全球数字经济大会80+前沿新品首秀：导盲犬机器人「途途」+焊接机器人+小君医生2.0，技术从实验室走向大市场","source":"首都之窗/今日头条","url":"https://www.toutiao.com/article/7658851693660095039","summary":"7月3-5日全球数字经济大会首发首秀平台集中发布80余项前沿新技术/新产品。高德发布具身导盲犬机器人「途途」——四足机器人+牵引杆，融合高德自研具身导航模型+交通大数据+机器视觉，能自主判断跨越或绕行坑洼，理解视障人士意图。小雨智造焊接机器人3分钟上岗(16.98万起售)。松延动力秀出「布米」消费级人形机器人(98cm/17kg，AI交互+运动控制+编程教育)。新石器慧通L4级无人配送机器人能自己乘电梯送快递。小君医生2.0大模型可一次性处理完整颅脑CT，自动生成涵盖94种颅脑疾病/11个解剖部位/1232个诊断术语的结构化报告。80+前沿新品标志技术从实验室走向大市场。","category":"应用落地","rating":4,"philosophy_insight":{"framework":"具身认知 + 否定之否定 + 语言游戏","analysis":"✅正题：过去三年AI/机器人技术主要在实验室和展会演示——能跳舞能摆拍，但离真实应用有距离。❌反题：80+前沿新品集中首秀标志技术从「实验室demo」进入「市场交付」——导盲犬机器人能处理复杂路径决策，焊接机器人3分钟上岗，无人配送机器人能乘电梯送快递。💡合题：从「技术演示(2023-2024)→场景验证(2025)→市场交付(2026)」，具身智能完成否定之否定的三步跨越。具身认知分析：高德「途途」导盲犬是具身认知的极端案例——它需要实时感知视障人士的意图(语音+行为)、理解物理环境(路况+障碍物)、做出安全决策(跨越vs绕行)——这是「身体-环境-任务」具身认知三要素的完整闭环。语言游戏分析：「首发首秀」这个命名把展会从「展示窗口」重新定义为「市场化第一步」——技术不再是展品而是商品。","verdict":"80+前沿新品首秀标志具身智能从技术演示进入市场交付阶段，导盲犬/焊接/配送机器人各自验证了垂直场景的商业可行性"}}],"startup_board":{"companies":[{"name":"星动纪元","field":"具身智能(全栈)","route":"AI Native驱动，数据-大脑-运控-灵巧手-本体全栈自研，星动L7/Q5/XHAND三大产品线","funding":"两月连融三轮近25亿，估值破百亿，诚通基金领投+三星/顺丰/海尔等20+产业资本","verdict":"清华唯一直接持股具身企业，国家级国资密集入场标志战略布局"},{"name":"乐享科技(元点Zeroth)","field":"家庭具身智能","route":"全栈技术布局+3万台在手订单，Jupiter全尺寸人形+N1家庭协作机器人","funding":"近5亿Pre-A(蚂蚁集团领投)，累计10亿","verdict":"成立一年半3万订单，上半年营收同比增600%"},{"name":"泉智博","field":"机器人关节模组","route":"百万台级年产能规划，一次性合格率96%+，良率98%+","funding":"A+++轮(高瓴领投+智元/灵心巧手战投)，一年半7轮融资","verdict":"关节模组占整机成本30-60%是量产生死线，打通关节-灵巧手-整机闭环"},{"name":"跨维智能","field":"具身智能","route":"香港中文大学(深圳)贾奎创立，全栈技术","funding":"B轮10亿，估值超百亿，深创投/蓝思科技周群飞个人参投","verdict":"后续将启动IPO，蓝思科技从客户变股东"}],"trend":"2026上半年具身智能融资935亿(同比增5倍)，322笔交易日均1.3起，创硬科技史无前例的资金虹吸效应。资本叙事从「堆长板(上游零部件+本体)」转向「补短板(具身大脑闭环)」。七成资金集中前20家，马太效应明显。国家级国资平台密集入场(诚通基金/国元/杭州资本等)标志具身智能被定义为国家级战略产业。关节模组(泉智博)和灵巧手(灵心巧手3999元)成为量产关键瓶颈和创业热点。8家估值破200亿(宇树/智元/星动/智平方/自变量/银河通用/星海图/跨维)。"},"pm_board":{"insights":[{"title":"Claude Code后门事件对AI工具PM的警示：安全合规是AI工具的生死线","content":"阿里禁用Claude全家桶的导火索是后门代码被逆向——专盯中国时区+中国科技公司域名。对PM意味着：AI工具产品必须通过安全审计才能进入企业市场，安全合规不再是加分项而是生死线。PM需要：①建立AI工具安全审计流程(代码逆向/网络行为分析/数据回传检测)；②制定企业级AI工具使用规范(什么场景可用什么不可用/数据隔离要求)；③关注地缘政治风险——AI工具可能被用作数据收集管道。阿里推荐自研Qoder替代说明：大厂正在构建自有AI工具栈，外部AI工具的市场空间可能被压缩。"},{"title":"935亿融资对具身智能PM的信号：从技术验证到规模量产的关键转换","content":"2026上半年935亿融资+322笔交易证明资本共识已形成，但七成资金集中前20家。对PM意味着：头部企业(8家200亿+)进入规模量产竞争阶段，中尾部企业面临生存压力。PM需要回答：你的公司在前20家吗？如果不在，差异化定位是什么？关节模组(泉智博)和灵巧手(灵心巧手3999元)从「卖铲人」变为「量产瓶颈」——PM需要关注核心零部件的供应链安全和成本曲线。星动纪元两月融25亿+国资密集入场说明：资本从「硬件本体」转向「具身大脑」，PM需要重新评估产品定位中软件/模型能力的权重。"},{"title":"80+前沿新品首秀的PM信号：垂直场景落地是当前最优策略","content":"全球数字经济大会80+新品涵盖导盲犬/焊接/配送/医疗等多垂直场景。对PM意味着：当前阶段通用AGI机器人仍远，但垂直场景已有商业可行性。PM的产品策略应该是：①选择一个高价值垂直场景(焊接/导盲/质检/配送)；②做到3分钟上岗级别的使用门槛；③16.98万级别的定价让客户算得过账。小雨智造(焊接)和乐享科技(家庭3万台订单)验证了垂直场景的商业可行性。"}],"focus":["AI工具安全审计流程建设(代码逆向/网络行为/数据回传检测)","具身智能头部企业量产竞争策略(8家200亿+的差异化定位)","垂直场景产品定义(焊接/导盲/质检/配送的高价值场景选择)","核心零部件供应链安全(关节模组/灵巧手/减速器的国产化率)"]},"algo_board":{"insights":[{"title":"T-Rex触觉-视觉频率解耦：灵巧手从视觉为主到多模态融合的关键突破","content":"李飞飞×Jim Fan的T-Rex架构核心是触觉(1000Hz)和视觉(30Hz)的频率解耦——各自匹配最优控制频率避免互相拖累。精细操作成功率从~40%提升至65%。这解决了VLA模型的「最后一厘米」问题——视觉能告诉机器人「抓哪里」，但触觉才能告诉它「抓到了没有+力度够不够」。灵心巧手3999元入门级灵巧手+动作技能数据库(类App Store)大幅降低触觉传感器接入门槛。算法工程师需关注：触觉数据的高频处理(1000Hz=每毫秒一次)、触觉-视觉融合的时间对齐策略、以及触觉传感器数据格式标准化。"},{"title":"相变忆阻器神经动力学芯片：存算一体的类脑计算新路径","content":"北大杨玉超团队的相变忆阻器芯片登Science。40nm工艺，存内计算+步长漂移阵列0.28mm²，50MHz频率，单步时延2.12ms。较A100 GPU提速50-478倍，较先进ASIC提速3.82-36.27倍+功耗降低11.75-24.73倍。核心创新：把相变材料的物理特性(电阻随电流变化)直接用作计算单元，消除冯·诺依曼架构的数据搬运瓶颈。这不是大模型训练芯片，而是面向神经动力学/脑机接口/脑数字孪生的专用芯片。算法工程师需关注：存算一体架构对神经动力学算法的适配性、相变忆阻器的非线性特性如何映射到神经网络计算、以及脑机接口场景的实时性要求(2.12ms时延)。"},{"title":"RoboCup卫冕背后的具身智能算法：多智能体协作+实时决策","content":"清华火神队卫冕RoboCup使用的Booster T1平台+具身智能算法，在国际赛事中实现视觉感知与多智能体协作突破。RoboCup人形机器人足球赛要求：实时视觉感知(球/队友/对手位置)+动态决策(传球/射门/防守策略)+多智能体协作(队形协调/角色分配)+全身运动控制(行走/踢球/倒地恢复)。算法工程师需关注：多智能体强化学习的实时部署、视觉-运动控制的端到端学习、以及sim-to-real迁移在对抗性动态环境中的效果。两支决赛队均用国产Booster T1说明国产硬件平台已具备支撑世界级算法的能力。"}],"tech_radar":[{"direction":"触觉-视觉频率解耦(T-Rex)","status":"突破期","advice":"触觉传感器成灵巧手标配，关注1000Hz高频触觉数据处理和时间对齐策略"},{"direction":"相变忆阻器存算一体芯片","status":"突破期","advice":"登Science的科研突破，关注脑机接口和神经动力学场景，短期非大模型训练芯片"},{"direction":"多智能体强化学习(RoboCup验证)","status":"成长期","advice":"清华卫冕验证sim-to-real在对抗动态环境的有效性，关注多智能体协作框架"},{"direction":"具身大脑(VLA全栈)","status":"成长期","advice":"资本从堆长板转向补短板，星动纪元AI Native全栈路线值得关注"},{"direction":"Anthropic自研芯片(三星2nm)","status":"观望期","advice":"早期规划阶段，关注三星2nm工艺进展和Clive Chan的芯片设计方向"},{"direction":"Meta Muse Spark闭源路线","status":"观望期","advice":"Llama 4失败后转向闭源，关注MSL能否产出顶尖模型，开源生态影响待评估"}],"focus":["T-Rex触觉-视觉解耦的工程化实现和灵心巧手3999元灵巧手的数据接口","相变忆阻器芯片在脑机接口场景的应用验证","Anthropic自研芯片(Clive Chan方向+三星2nm工艺进展)","星动纪元AI Native全栈路线的模型层(WMA+VLA)技术细节"]},"projmgr_board":{"insights":[{"title":"935亿融资+国资密集入场对项目管理的信号：具身智能进入「国家队」阶段","content":"2026上半年935亿融资+322笔交易，星动纪元两月连融25亿且国家级国资平台(诚通基金/国元/杭州资本)密集入场。项目管理启示：①具身智能项目需要纳入「国家队」视角——国资入场不仅是资金更是产业安全战略；②头部企业(8家200亿+)进入规模量产竞争，PMO需要建立「量产交付+核心自研率+商业化收入」三大核心指标；③资本从「硬件本体」转向「具身大脑」，项目资源分配需要从硬件为主转向软硬件均衡。建议设立「具身大脑项目集」，与硬件项目集并行管理，模型研发项目优先级提升至P0。"},{"title":"阿里禁用Claude对AI工具供应链的项目管理警示","content":"阿里禁用Claude全家桶暴露AI工具供应链的安全风险——后门代码专盯中国时区+中国科技公司。项目管理启示：①AI工具采购需纳入安全审计流程，不能只看功能性能；②关键项目不应依赖单一外部AI工具——Meta限制Claude/Codex、阿里禁用Claude说明大厂都在做「AI工具去依赖化」；③PMO应建立「AI工具白名单」制度，经过安全审计的工具才能在项目中使用；④关注地缘政治风险——AI工具可能成为数据收集管道，涉及国家安全。"}],"focus":["具身大脑项目集设立(P0优先级，模型研发与硬件并行)","AI工具安全审计和白名单制度","头部企业量产竞争三大核心指标(交付台数/自研率/商业化收入)","国资入场后的战略协同管理(国家级资本+产业资本+财务资本)"]},"hermes_board":{"insights":[{"title":"7月4-6日周末超级信息汇总：RoboCup卫冕+阿里禁Claude+935亿融资+T-Rex+相变忆阻器五线同发","content":"周末三天五条线同时爆发：①学术线(清华卫冕RoboCup人形机器人世界杯，国产Booster T1平台双队会师决赛)；②安全线(阿里全面禁用Claude全家桶，后门代码专盯中国时区+中国科技公司域名，7月10日生效)；③资本线(具身智能上半年融资935亿同比增5倍，星动纪元两月融25亿国资密集入场)；④技术线(李飞飞×Jim Fan发布T-Rex触觉-视觉解耦，精细操作成功率提至65%；北大相变忆阻器芯片登Science较GPU提速478倍)；⑤战略线(Meta放弃Llama转投Muse Spark闭源，150亿美元战略大转向；Anthropic启动自研芯片挖角OpenAI核心工程师)。标志AI+具身智能进入「学术突破+安全治理+资本共识+技术融合+战略重构」五维并行的复杂新阶段。","url":"https://xueqiu.com/7395283544/398543253"},{"title":"AI工具链信任危机爆发：Claude Code后门+Meta限制Claude/Codex+阿里禁用+模型蒸馏指控","content":"一周内AI工具链爆发多重信任危机：①Claude Code被逆向出针对中国时区+中国科技公司的隐蔽监控代码(XOR加密混淆+域名黑名单+Unicode回传)；②阿里全面禁用Claude全家桶(7月10日生效，推荐自研Qoder替代)；③Anthropic指控阿里用2.5万虚假账号跑2800万次交互进行「工业级模型蒸馏攻击」；④Meta此前已限制工程师使用Claude/Codex(担忧模型蒸馏)；⑤Anthropic公开Fable 5降级逻辑及CJS打分系统。共同信号：AI编程工具从「开发者个人选择」进入「企业安全治理+地缘政治博弈」阶段，AI工具链的信任成为新的系统性风险。","url":"https://www.toutiao.com/article/7658858346895753755"}],"tech_stack":[{"title":"T-Rex触觉-视觉频率解耦架构","content":"李飞飞×英伟达Jim Fan联合发布。触觉传感器(1000Hz)和视觉传感器(30Hz)信号处理解耦，各自匹配最优控制频率。精细操作成功率从~40%提升至65%。触觉传感器成灵巧手标配。灵心巧手推3999元入门级灵巧手+动作技能数据库(类App Store)。光轮智能Sim var days=["2026-07-14","2026-07-13","2026-07-10","2026-07-09","2026-07-08","2026-07-07","2026-07-06"];
var curDay=days[0]||'';
var curTab='hot';

function esc(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML}
function stars(r){var s='';for(var i=0;i<5;i++)s='<span style="color:'+(i<r?'var(--star)':'var(--star0)')+'">\u2605</span>';return s}
function starsStr(r){var s='';for(var i=0;i<5;i++)s+=(i<r?'\u2605':'\u2606');return s}

function initDays(){
  var h='';
  days.forEach(function(d){h+='<button class="day-btn'+(d===curDay?' a':'')+'" onclick="pickDay(\''+d+'\',this)">'+d+'</button>'});
  document.getElementById('dayPicker').innerHTML=h;
}

function pickDay(d,el){
  curDay=d;
  document.querySelectorAll('.day-btn').forEach(function(b){b.classList.remove('a')});
  el.classList.add('a');
  render();
}

function initTabs(){
  document.querySelectorAll('.tab').forEach(function(t){
    t.addEventListener('click',function(){
      curTab=this.getAttribute('data-t');
      document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('a')});
      this.classList.add('a');
      render();
    });
  });
}

function render(){
  var data=W[curDay];
  if(!data){document.getElementById('content').innerHTML='<div style="text-align:center;padding:3rem;color:var(--t2)">暂无该日数据</div>';return}
  document.getElementById('ut').textContent='最后更新：'+(data.update_time||curDay);
  var fn={hot:renderHot,startup:renderStartup,pm:renderPM,algo:renderAlgo,proj:renderProj,action:renderAction,hermes:renderHermes,phil:renderPhil,all:renderAll};
  (fn[curTab]||renderHot)(data);
}

function renderHot(d){
  var h='<div class="sec">🔥 今日热点 ('+(d.hot_topics||[]).length+'条)</div>';
  (d.hot_topics||[]).forEach(function(t,i){
    h+='<div class="htcard"><div class="num">'+(i+1)+'</div><div class="body"><h4><a href="'+esc(t.url)+'" target="_blank">'+esc(t.title)+'</a></h4><p>'+esc(t.summary)+'</p><div class="meta">'+esc(t.source)+' \u00b7 '+esc(t.category)+' \u00b7 <span class="stars">'+starsStr(t.rating)+'</span></div>';
    if(t.philosophy_insight){
      var p=t.philosophy_insight;
      h+='<div class="phil"><span class="fw">'+esc(p.framework||'')+'</span><p>'+esc(p.analysis||'')+'</p>';
      if(p.verdict)h+='<div class="verdict">'+esc(p.verdict)+'</div>';
      h+='</div>';
    }
    h+='</div></div>';
  });
  document.getElementById('content').innerHTML=h;
}

  if(!b){document.getElementById('content').innerHTML='<div class="bcard"><p>暂无新动态</p></div>';return}
  var h='<div class="sec">📅 项目经理板块</div>';
  (b.insights||[]).forEach(function(t){
    h+='<div class="bcard"><h3>'+esc(t.title)+'</h3><p>'+esc(t.content)+'</p></div>';
  });
  if(b.focus&&b.focus.length){
    h+='<div class="sec">📌 未来关注重点</div><div class="bcard"><ul>';
    b.focus.forEach(function(f){h+='<li>'+esc(f)+'</li>'});
    h+='</ul></div>';
  }
  document.getElementById('content').innerHTML=h;
}

function renderAction(d){
  var a=d.action_items;
  if(!a){document.getElementById('content').innerHTML='<div class="bcard"><p>暂无</p></div>';return}
  var h='';
  if(a.tech_selection){
    h+='<div class="sec">🔧 技术选型</div><div class="bcard"><ul>';
    a.tech_selection.forEach(function(t){h+='<li>'+esc(t)+'</li>'});
    h+='</ul></div>';
  }
  if(a.track_judgment){
    h+='<div class="sec">🎯 赛道判断</div><div class="bcard"><ul>';
    a.track_judgment.forEach(function(t){h+='<li>'+esc(t)+'</li>'});
    h+='</ul></div>';
  }
  if(a.watch_list){
    h+='<div class="sec">👀 Watch List</div><div class="bcard"><ul>';
    a.watch_list.forEach(function(t){h+='<li>'+esc(t)+'</li>'});
    h+='</ul></div>';
  }
  document.getElementById('content').innerHTML=h;
}

function renderHermes(d){
  var hb=d.hermes_board;
  if(!hb||(!hb.insights&&!hb.tech_stack&&!hb.community)){
    document.getElementById('content').innerHTML='<div class="bcard"><h3>📣 Hermes 信使</h3><p>暂无内容</p></div>';return;
  }
  var h='<div class="sec">📣 Hermes 信使</div>';
  if(hb.insights&&hb.insights.length){
    h+='<div class="hermes-sec"><h3>💡 洞察</h3>';
    hb.insights.forEach(function(item){
      h+='<div class="bcard"><h3>'+esc(item.title)+'</h3><p>'+esc(item.content)+'</p>';
      if(item.url)h+='<div style="margin-top:.3rem"><a href="'+esc(item.url)+'" target="_blank" style="color:var(--accent);font-size:.8rem">🔗 来源</a></div>';
      h+='</div>';
    });
    h+='</div>';
  }
  if(hb.tech_stack&&hb.tech_stack.length){
    h+='<div class="hermes-sec"><h3>🔨 技术栈</h3>';
    hb.tech_stack.forEach(function(item){
      h+='<div class="bcard"><h3>'+esc(item.title)+'</h3><p>'+esc(item.content)+'</p></div>';
    });
    h+='</div>';
  }
  if(hb.community&&hb.community.length){
    h+='<div class="hermes-sec"><h3>🌐 社区资源</h3>';
    hb.community.forEach(function(item){
      h+='<div class="bcard"><h3>'+esc(item.title)+'</h3><p>'+esc(item.content)+'</p></div>';
    });
    h+='</div>';
  }
  document.getElementById('content').innerHTML=h;
}

function renderPhil(d){
  var topics=(d.hot_topics||[]).filter(function(t){return t.philosophy_insight});
  if(!topics.length){
    document.getElementById('content').innerHTML='<div class="bcard"><h3>🧠 哲学洞察</h3><p>暂无内容</p></div>';return;
  }
  var h='<div class="sec">🧠 哲学洞察 ('+topics.length+'条)</div>';
  topics.forEach(function(t){
    var p=t.philosophy_insight;
    h+='<div class="bcard" style="border-left-color:var(--accent2)"><h3>'+esc(t.title)+'</h3>';
    h+='<div class="phil"><span class="fw">'+esc(p.framework||'')+'</span><p>'+esc(p.analysis||'')+'</p>';
    if(p.verdict)h+='<div class="verdict">'+esc(p.verdict)+'</div>';
    h+='</div></div>';
  });
  document.getElementById('content').innerHTML=h;
}

function renderAll(d){
  var arts=d.raw_articles||[];
  var h='<div class="search-bar"><span class="ico">\uD83D\uDD0D</span><input id="sInput" placeholder="\u641c\u7d22\u6807\u9898\u6216\u6458\u8981..." oninput="filterAll()"></div>';
  h+='<div id="allList"></div>';
  document.getElementById('content').innerHTML=h;
  window._allArts=arts;
  filterAll();
}

function filterAll(){
  var q=(document.getElementById('sInput')||{}).value||'';
  q=q.toLowerCase().trim();
  var arts=window._allArts||[];
  if(q)arts=arts.filter(function(a){return a.title.toLowerCase().indexOf(q)!==-1||a.summary.toLowerCase().indexOf(q)!==-1});
  var h='';
  if(!arts.length){h='<div style="text-align:center;padding:2rem;color:var(--t2)">\u672a\u627e\u5230\u5339\u914d\u8d44\u8baf</div>'}
  else{arts.forEach(function(a){
    h+='<div class="ncard"><div class="left"><h4><a href="'+esc(a.url)+'" target="_blank">'+esc(a.title)+'</a></h4><div class="nm">'+esc(a.source)+' · '+a.publish_time+' · '+starsStr(a.rating)+'</div></div><div class="right"><span class="cat">'+esc(a.category)+'</span></div></div>';
  })}
  document.getElementById('allList').innerHTML=h;
}

function toggleTheme(){
  var dk=document.body.getAttribute('data-theme')==='dark';
  document.body.setAttribute('data-theme',dk?'light':'dark');
  document.querySelector('.tbtn').innerHTML=dk?'&#x1F319;':'&#x2600;&#xFE0F;';
  localStorage.setItem('ai-news-theme',dk?'light':'dark');
}

document.addEventListener('DOMContentLoaded',function(){
  var sv=localStorage.getItem('ai-news-theme');
  if(sv==='dark'||(!sv&&window.matchMedia('(prefers-color-scheme:dark)').matches)){
    document.body.setAttribute('data-theme','dark');
    document.querySelector('.tbtn').innerHTML='&#x2600;&#xFE0F;';
  }
  initDays();initTabs();render();
});
</script>
</body>
</html>
