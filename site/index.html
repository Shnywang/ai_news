/codex/o-series 到 Responses API。关键解决企业痛点：1) Azure Anthropic 端点专用处理，避免 OAuth token 与 Azure API key 冲突；2) API version 参数标准化，SDK 不再生成畸形 URL；3) 自定义端点凭据持久化。配合多提供商路由策略，Azure Foundry 成为企业私有化部署的首选路径。","url":"https://github.com/NousResearch/hermes-agent"},{"title":"从个人工具到企业 Agent OS：Hermes 架构成熟度分析","content":"近期 Hermes Agent 的 300+ commits 反映其架构成熟度跃升：1) 多平台 Gateway 完善（Slack 原生 slash 命令注册、Telegram bot menu 命令、Yuanbao 平台适配、WhatsApp 安全加固）；2) Cron 定时任务支持 job 链式调用（context_from 字段）、项目级工作目录（workdir）；3) 安全体系分层——browser SSRF 防护、命令审批黑名单、终端输出泄漏修复；4) Session 生命周期管理——自动清理过期 shadow repo、FIFO /queue 排队系统、session-scoped reasoning。Hermes 从'个人 AI 助手'正式迈入'企业级 Agent 操作系统'阶段。","url":"https://hermes-agent.nousresearch.com/docs/"}],"tech_stack":[{"title":"Hermes Skills 系统重大更新：URL 安装 + 技能生态扩展","content":"Skills 系统新增三项能力：1) HTTP(S) URL 直装（hermes skills install https://...），无需先 clone 仓库；2) claude-design HTML 产物生成技能加入内置生态，与 popular-web-designs、design-md 形成设计三件套；3) Airtable 生产力技能作为 bundled skill 内置，支持 .env 凭据模式；4) 74 个内置技能描述压缩至 <=60 字符，优化技能列表可读性；5) trigger 内容从 frontmatter 迁移至 skill body，修复内容丢失问题。当前内置技能已超过 150 个，社区贡献者 500+。","url":"https://github.com/NousResearch/hermes-agent/pull/16323"},{"title":"模型路由与推理引擎增强","content":"底层推理能力同步升级：1) DeepSeek V4 上下文窗口扩展至 1M tokens，支持超长代码库分析；2) DeepSeek/Kimi thinking 模式修复——所有 assistant 消息强制注入 reasoning_content，工具调用不再中断推理链；3) 跨提供商推理隔离——复制 reasoning_content 时严格区分 Anthropic vs 非 Anthropic 格式；4) /model 切换时自动重算 token 预算和上下文压缩阈值；5) Codex Responses API 消息格式修复（output_text 替代 content）；6) 远程模型目录清单（OpenRouter + Nous Portal）热更新。","url":"https://hermes-agent.nousresearch.com/docs/user-guide/model-routing"},{"title":"Dashboard 插件系统：页面级插件插槽","content":"Hermes Dashboard 新增页面级插件插槽（page-scoped plugin slots），内置页面可嵌入自定义 React 组件。配合 PTY 桥接技术，Dashboard 中的 /chat 页面直接运行 hermes --tui（完整 Ink + xterm.js + WebGL 渲染器），而非 React 重写。这意味着：1) TUI 的任何更新自动同步到 Dashboard；2) 插件只负责侧边栏/仪表盘/辅助面板，不重复实现聊天界面；3) 前端与后端通过 WebSocket + PTY 分离，架构清晰。","url":"https://hermes-agent.nousresearch.com/docs/"}],"community":[{"title":"Slack 平台深度集成：原生命令 + 频道技能绑定","content":"Slack 适配层重大更新：1) 每个 Gateway 命令注册为 Slack 原生 slash command，与 Discord/Telegram 对齐；2) channel_skill_bindings 支持——按频道绑定不同技能集，实现'#dev 频道自动加载 devops 技能，#design 频道加载设计技能'；3) 严格 @mention 门控（slack.strict_mention），避免非定向消息触发 Agent；4) 富文本解析增强（quotes/lists）、attachment 诊断、Slack Connect 跨组织频道文件下载。企业 Slack 部署体验显著提升。","url":"https://github.com/NousResearch/hermes-agent"},{"title":"Cron 定时任务增强：Job 链式调用 + 项目上下文","content":"Cron 系统新增两项企业级能力：1) context_from 字段——Job B 可将 Job A 的最新输出注入 prompt，实现'数据采集→分析→报告'链式流水线；2) workdir 参数——Job 在指定项目目录运行，自动加载 AGENTS.md/CLAUDE.md/.cursorrules 项目上下文。配合已有的 enabled_toolsets 限制（web/terminal/file/delegation），Cron 成为真正的自主 Agent 调度器。","url":"https://github.com/NousResearch/hermes-agent"},{"title":"安全加固：三层终端命令审批 + SSRF 防护","content":"安全体系持续完善：1) 不可恢复命令硬编码黑名单（rm -rf、格式化等）自动拦截；2) Browser SSRF 防护增强——引用形式的 'false' 严格解析为布尔值，防止绕过；3) WhatsApp 身份标识 ASCII 锁定 + 路径遍历防护；4) key_env 解析的凭据不持久化到 providers 配置；5) Terminal 输出泄漏修复——macOS declare-x 环境变量转储、bracketed-paste 包装器自动剥离。企业安全合规基线进一步提升。","url":"https://hermes-agent.nousresearch.com/docs/user-guide/features/security-privacy-toggles"},{"title":"Hermes CLI 新特性：一键执行 + 编辑器集成","content":"CLI 体验优化：1) 新增 hermes -z <prompt> 一键执行模式——无需进入交互界面，单条命令完成推理并返回结果，适合 CI/CD 集成；2) Ctrl+G 编辑器接管（$EDITOR 优先 vim > nvim > nano），支持 Alt+G 作为 VSCode/Cursor 终端的备用快捷键；3) hermes update --check 仅检查不执行；4) /stop 立即中断流式重试循环；5) 剪贴板三重方案（OSC52 / native / tmux），解决 WSL/Docker 远程环境复制问题。","url":"https://github.com/NousResearch/hermes-agent/releases"}],"update_time":"2026-04-28T18:00:00+08:00"}},"2026-04-27":{"update_time":"2026-04-27T18:00:00+08:00","hot_topics":[{"title":"广东首办AI应用对接大会：近200家企业参展，发布23个典型案例及AI赋能科研五年方案","source":"中新网/21世纪经济报道","url":"https://www.chinanews.com.cn/cj/2026/04-27/10611698.shtml","summary":"4月27日广东省人工智能应用对接大会在深圳福田会展中心启幕，近200家AI企业携300余件展品参展，覆盖具身智能机器人、鸿蒙生态、国产算力等方向。大会集中发布23个\"AI+\"典型案例覆盖9大行业，同时披露《广东省加快推动人工智能赋能科学研究行动方案2026-2030》，标志广东从制造大省向AI应用第一省跃迁。","category":"政策信号","rating":5},{"title":"Kimi K2.6登顶 议","funding":"估值超150亿美元","verdict":"国产开源旗舰，API调用量超越GPT系列登顶全球第一"},{"name":"深度求索(DeepSeek)","field":"大模型","route":"V4-Pro(1.6T)+V4-Flash(285B)预览版开源，百万Token标配","funding":"首轮融资估值超100亿美元","verdict":"开源路线标杆，国产算力全面适配，\"去CUDA化\"里程碑"},{"name":"灵光(世界模型)","field":"具身智能/3D生成","route":"移动端世界模型，图片即时生成3D世界","funding":"未披露","verdict":"世界模型消费级落地先行者，具身智能底层技术C端突破"},{"name":"自变量机器人","field":"人形机器人","route":"B轮近20亿元融资，集齐小米/美团/阿里/字节四大巨头","funding":"B轮近20亿元","verdict":"资本阵容史上最豪华的人形机器人企业之一"},{"name":"智元机器人","field":"具身智能","route":"精灵G2进驻龙旗3C产线正式作业，7x24连续生产","funding":"估值超200亿元","verdict":"具身智能首次规模化切入消费电子核心制造，量产元年标志性事件"}],"trend":"国产大模型调用量反超海外、具身智能从实验室进厂到量产，中国AI进入\"应用为王\"的产业化深水区。"},"pm_board":{"insights":[{"title":"百万Token上下文成标配，产品架构需重新设计","content":"DeepSeek V4和GPT-5.5同步将上下文窗口推至百万级别，意味着文档处理、代码分析、对话记忆等场景的产品形态将发生根本变化。PM需评估现有产品中\"上下文受限\"的workaround是否该拆除，长文本能力如何转化为用户可感知的功能差异。"},{"title":"开源vs闭源的定价博弈影响产品选型","content":"GPT-5.5定价翻倍至30美元/百万Token输出，而V4-Pro性能接近但成本仅为1/8。对于需要大规模调用的产品（AI客服、内容生成），模型成本已成为产品利润的关键变量。建议建立多模型路由策略，根据任务复杂度动态切换。"},{"title":"广东200家企业AI应用案例提供产品灵感库","content":"广东AI大会发布23个典型案例覆盖制造、医疗、政务、农业等9大行业，每个案例都是经过验证的AI落地方向。PM应关注其中与自身业务相关的场景，尤其是具身智能+制造、AI+政务服务等高确定性赛道。"}],"focus":["关注Kimi K2.6的Agent集群调度能力（300子Agent并发）对复杂任务产品化的启示","跟踪DeepSeek V4 API正式版定价与配额政策","评估世界模型移动端落地对AR/VR产品链的影响"]},"algo_board":{"insights":[{"title":"DeepSeek V4稀疏注意力+Token压缩：百万上下文的工程实现路径","content":"V4通过自研KV Cache滑窗和压缩算法，在1M上下文下显存需求显著降低。技术报告显示token维度压缩与稀疏注意力机制是核心创新，使得长文本推理在昇腾950等非CUDA硬件上也能高效运行。这标志着\"长上下文\"从实验性功能变为生产级标配。"},{"title":"VLA空间引导范式：ICLR 2026具身智能前沿","content":"上海AI Lab等团队提出的空间引导VLA新范式在ICLR 2026获关注，核心思路是将3D空间理解显式注入视觉-语言-动作模型，解决传统VLA在精细操作中\"看得懂但做不准\"的问题。斯坦福REAL Lab的Robot-Trains-Robot框架则探索了零样本策略迁移路径。"},{"title":"Kimi K2.6的Agent架构突破：300并发子Agent与13小时连续编码","content":"K2.6采用1T参数MoE架构，SWE-Bench Pro 58.6%领先所有闭源模型。其Agent集群调度支持300个子Agent并发协同，连续编码13小时处理4000+行代码。DeepSearchQA双项第一，MIT开源协议。技术上标志着\"大模型即Agent操作系统\"的范式正在形成。"}],"tech_radar":[{"direction":"百万级上下文工程化","status":"已落地","advice":"V4/GPT-5.5/Kimi均已支持256K-1M上下文，建议立即评估长文本场景的产 一省跃迁，大会展示具身智能机器人、鸿蒙生态、国产算力生态等方向成果，5场专题对接会覆盖科技创新、制造业、商贸、公共服务、算电协同。","category":"行业分析","rating":3}],"hermes_board":{"insights":[{"title":"AI 编程工具链对比：Hermes Agent vs Cursor vs Claude Code 深度评测","content":"最新横评显示：Claude Code 在复杂 PR 级任务表现最优（SWE-bench 52%），Cursor 胜在 IDE 原生集成与低延迟体验，Hermes Agent 则以多平台网关+技能生态独树一帜——唯一支持 Telegram/Discord/微信/Slack 同时接入、cron 定时任务、持久记忆的通用 AI Agent 框架。三者定位差异化明显：Cursor 适合日常编码加速，Claude Code 适合专业开发工作流，Hermes 适合构建自动化运维与跨平台信息聚合管道。","url":"https://github.com/NousResearch/hermes-agent"},{"title":"AI Agent 安全治理新进展：Hermes 引入命令审批与 PII 脱敏","content":"随着企业级 AI Agent 部署加速，安全问题日益凸显。Hermes Agent 最新发布安全增强：terminal 命令分级审批（危险命令需用户确认）、敏感数据自动脱敏（PII 检测与替换）、API 凭据隔离存储（.env 加密）。同时支持 'hermes approval' 配置策略，可按项目维度细粒度控制 Agent 权限边界，为企业私有化部署提供安全基线。","url":"https://hermes-agent.nousresearch.com/docs/user-guide/features/security-privacy-toggles"},{"title":"从个人工具到企业平台：AI Agent 架构演进趋势","content":"2026 Q2 AI Agent 技术栈呈现三大趋势：1）从单轮对话转向多 Agent 协作（orchestrator-worker 模式）；2）从临时会话转向持久记忆（跨 session 知识积累）；3）从单一渠道转向全平台覆盖（Gateway 架构）。Hermes Agent 的 plugin 系统（memory/context-engine/dashboard）和 skill 生态（500+ 社区技能）使其成为最接近'企业级 Agent 操作系统'的开源方案。","url":"https://hermes-agent.nousresearch.com/docs/"}],"tech_stack":[{"title":"Kimi K2.6 开源：SWE-Bench Pro 58.6% 刷新纪录","content":"月之暗面发布 Kimi K2.6 并 MIT 开源，1T 参数 MoE 架构，SWE-Bench Pro 达成 58.6% 超越所有闭源模型。支持 300 子 Agent 并发协同，连续编码 13 小时处理 4000+ 行代码。作为 Hermes Agent 的底层推理引擎之一，K2.6 通过 openrouter 或本地 vLLM 部署可显著提升代码生成与调试能力。","url":"https://blog.csdn.net/m0_74837192/article/details/160418227"},{"title":"Hermes Agent 技能系统架构解析：插件化 + 热加载 + 版本管理","content":"Hermes 技能系统采用 YAML frontmatter + SKILL.md 标准化格式，支持版本控制（v1.0.0-v3.0.0）、依赖声明（toolsets）、触发条件（trigger）。技能可按类别组织（devops/data-science/creative），通过 'hermes skills list/install/remove' 管理。v2.0 引入 skill_manage patch 机制，支持运行时热更新技能内容，无需重启 Agent。","url":"https://hermes-agent.nousresearch.com/docs/user-guide/skills/"},{"title":"GPT-5.5 API 定价分析：成本飙升下的替代方案","content":"GPT-5.5 API 定价飙至每百万 Token 输出 30 美元（前代 3 倍），中小企业难以承受。Hermes Agent 支持多提供商路由（20+ providers），可自动 fallback 到性价比更高的模型（Qwen3.6-35B / DeepSeek-V4-Flash），同时保持输出质量。配置 'model_routing' 策略后，日常任务自动使用经济模型，复杂推理自动升级，成本可降低 70-90%。","url":"https://hermes-agent.nousresearch.com/docs/user-guide/model-routing"}],"community":[{"title":"Hermes Agent v2.1.0 发布：新增飞书文档插件与 ACP 适配器","content":"v2.1.0 更新亮点：1）飞书文档插件（feishu_doc）支持读写飞书文档和表格；2）ACP 适配器支持 VS Code/Zed/JetBrains IDE 原生集成；3）Cron 任务新增 workdir 参数，支持项目级上下文注入；4）Gateway 消息去重与 rate limit 优化。本次更新由社区贡献者 wyfrest 提交 co-author。","url":"https://github.com/NousResearch/hermes-agent/releases"},{"title":"社区案例：用 Hermes + Skill 系统构建自动化差旅管理 Pipeline","content":"某制造企业质控团队使用 Hermes Agent 构建了 5 技能链式工作流（fetcher → filter → checker → supervisor → report），实现出差信息自动获取、回执单跟踪、逾期督办、统计报表一键生成。Skill 脚本化重构后执行时间从 15 分钟缩短至 3 分钟，误报率降至零。该方案已开源至 ai_news 项目供参考。","url":"https://github.com/Shnywang/ai_news"},{"title":"Hermes TUI 终端界面更新：支持暗黑主题与实时工具调用流","content":"基于 Ink (React) 的 TUI 界面新增：1）实时 message streaming（token-by-token 渲染）；2）工具调用可视化（tool.start/progress/complete 三阶段动画）；3）approval 弹窗（危险命令交互式确认）；4）clarify 多选问答支持。TUI 通过 JSON-RPC over stdio 与 Python 后端通信，支持 Dashboard 嵌入式 PTY 终端。","url":"https://github.com/NousResearch/hermes-agent/discussions"}],"update_time":"2026-04-27T18:00:00+08:00"}},"2026-04-26":{"update_time":"2026-04-26T18:00:00+08:00","hot_topics":[{"title":"DeepSeek-V4 vs GPT-5.5首波实测对决：开源与闭源差距缩至个位数","source":"新智元/知乎","url":"https://zhuanlan.zhihu.com/p/2031315666775619044","summary":"多家机构发布DeepSeek-V4与GPT-5.5同日发布后的首轮横评。V4-Pro在长文本理解和Agent任务上与5.5不相上下，编码方面5.5的SWE-Bench Pro 58.6%仍领先，但V4成本仅为5.5的1/150。招银国际报告指出中美顶尖模型智能差距从20分收窄至个位数，大模型竞争重心转向推理效率与Agent落地。","category":"算法突破","rating":5},{"title":"央视聚焦人形机器人：万亿级风口，智元G2进厂干活成标杆案例","source":"央视新闻/CCTV","url":"https://news.cctv.com/2026/04/26/ARTIiyAxB2I6pmaQZylkuvFx260426.shtml","summary":"央视以\"万亿级大风口\"为题专题报道人形机器人产业。重点呈现智元G2在南昌龙旗科技工厂4台机器人并线生产的实况，单道工序仅需18-20秒，十五五规划将具身智能列为未来产业。报道指出从半马赛场到生产车间，人形机器人正从\"会跳舞\"走向\"能干活\"。","category":"政策信号","rating":5},{"title":"2026北京车展：物理AI成核心关键词，小鹏IRON机器人2026年底量产","s +具身智能，Z01人形机器人","funding":"已上市(000157.SZ)，汉诺威工博会全球首秀","verdict":"传统工程机械巨头跨界，工业场景理解深厚，但机器人业务尚处早期展示阶段"}],"trend":"北京车展和汉诺威工博会双展同期，车企(小鹏、荣耀)和工程机械企业(中联重科)跨界入局机器人成为新趋势。AI编程赛道估值飙升至500-600亿美元量级，SpaceX/xAI等科技巨头通过收购加速布局。"},"pm_board":{"insights":[{"title":"物理AI时代：产品从屏幕走向真实世界","content":"北京车展和汉诺威工博会释放明确信号：AI产品正从屏幕交互走向物理世界交互。小鹏IRON先切入门店销售场景(2027年承担10%销售辅助)、荣耀Robot Phone概念、中联重科Z01工业应用，三条路径并行。产品经理需要思考：如何定义\"物理世界产品\"的交互范式——不再是点击和滑动，而是语音、手势、力反馈的多模态融合。"},{"title":"大模型性价比飞跃改写产品成本模型","content":"DeepSeek-V4成本仅为GPT-5.5的1/150，且Agent能力接近。这意味着此前因成本受限的AI功能(如长文档全文分析、多步骤Agent自动化)现在可以规模化部署。产品经理应重新评估产品中AI功能的成本结构：哪些之前被砍掉的AI特性现在可以回归产品路线图。"}],"focus":["跟踪小鹏IRON门店销售场景的用户反馈和商业化数据","研究DeepSeek-V4极低成本下Agent功能的新产品可能性","关注北京车展后物理AI概念在消费者端的认知度变化","留意荣耀Robot Phone后续产品定义和目标人群"]},"algo_board":{"insights":[{"title":"四强横评格局形成：V4-Pro / GPT-5.5 / GLM-5.1 / Opus 4.7","content":"2026年4月成为大模型密集发布月。腾讯云开发者社区发布四强横评：DeepSeek-V4-Pro(1.6T MoE，开源)、GPT-5.5(闭源Agent强)、GLM-5.1(智谱4月初发布)、Claude Opus 4.7(编程逻辑推理强)。V4-Pro在长文本和性价比上碾压，5.5在Agent编码领先，Opus 4.7编程测试表现突出。选型建议：按场景混合部署成为最优解。"},{"title":"国产算力生态闭环：DeepSeek-V4首次官方支持昇腾NPU","content":"V4是首个在官方技术报告中同时写入华为昇腾NPU和英伟达GPU的万亿级开源模型。昇腾950PR的mxFP4低精度推理、寒武纪的Torch-MLU-Ops适配层，为国产算力推理奠定基础。算法工程师需关注：下半年昇腾950批量上市后的推理成本进一步下降空间，以及在CUDA之外的部署方案成熟度。"},{"title":"汉诺威工博会技术观察：人形机器人从展示到实用的关键差距","content":"新华社记者深度观察指出，当前人形机器人在结构化环境(如固定工位)已达实用水平(智元G2 99.5%成功率)，但非结构化环境的自主性仍有较大差距。具身智能企业普遍认为\"产线部署的实践经验\"是缩短差距的关键路径，sim-to-real迁移效率成为核心瓶颈。"}],"tech_radar":[{"direction":"多模型混合部署(MoE of Models)","status":"成长期","advice":"四强模型各有长处，建议构建路由层按任务类型分发至最优模型，兼顾能力和成本"},{"direction":"国产算力推理栈(昇腾NPU/寒武纪)","status":"验证期","advice":"V4官方支持是重大里程碑，但生产环境稳定性和生态工具链仍需验证，建议小规模试点"},{"direction":"物理AI/具身智能通用模型","status":"验证期","advice":"从展示到实用的关键在于结构化到非结构化场景迁移，关注sim-to-real新方法论"},{"direction":"AI编程工具(Cursor/Codex/Grok Code)","status":"成长期","advice":"SpaceX收购Cursor标志赛道进入巨头时代，关注开源替代方案和多模型切换能力"}],"focus":["深入测试V4-Pro在自有业务场景下的Agent能力表现","评估华为昇腾950部署方案的可行性和成本模型","关注四强模型在RAG、Agent、代码生成等垂直场景的细分差异","跟踪Cursor底层模型切换策略对AI编程生态的影响"]},"projmgr_board":{" 节、美团、阿里、小米四大巨头","verdict":"国内唯一集齐四大互联网巨头投资的具身智能企业，资源整合能力极强，技术路线覆盖全栈，择业价值极高"},{"name":"它石智航(TARS AI)","field":"具身智能/全栈整机","route":"全栈具身智能，从感知到决策到执行","funding":"4.55亿美元Pre-A轮(约33亿元)，中国具身智能史上最大单轮融资，估值180亿","verdict":"成立仅一年估值从50亿跳到180亿，刷新多项纪录，但Pre-A即超高估值需关注后续商业化兑现能力"},{"name":"千寻智能","field":"具身智能机器人","route":"具身智能机器人研发","funding":"10亿元A+轮，顺为资本、云锋基金、达晨财智等领投","verdict":"头部机构扎堆，赛道热度持续，但需观察产品落地节奏和差异化竞争力"},{"name":"领益智造(具身智能制造)","field":"人形机器人制造/供应链","route":"全链条代工制造，从零部件到整机组装测试","funding":"已上市(002600.SZ)，北京超级工厂投产，2026年规划产能1万台套","verdict":"制造侧龙头，类似\"人形机器人的富士康\"定位，供应链整合能力强，制造岗位需求将快速增长"}],"trend":"2026年Q1具身智能赛道融资超200亿元同比增60%创历史新高，百亿估值企业持续扩容，宇树+智元占国内出货量近80%形成双寡头格局，制造侧超级工厂密集投产标志着产业从实验室走向规模化量产。"},"pm_board":{"insights":[{"title":"从Demo到产线：具身智能产品的场景验证进入深水区","content":"智元G2进入龙旗3C产线实现99.5%作业成功率和310件/小时稳定产能，这是具身智能从\"展示型Demo\"到\"生产型工具\"的关键转折。产品经理需要关注：1)工业场景的标准化作业流程设计；2)人机协作的安全边界定义；3)从单工位到多工位的产品扩展路径。消费电子产线的高节拍、高精度要求是最佳试金石。"},{"title":"大模型Agent能力跃升重塑产品形态","content":"DeepSeek-V4和GPT-5.5同日发布，Agent能力成为核心卖点。V4的100万Token上下文+极致性价比使得长流程自动化任务(如代码审查、文档生成、数据分析全链路)变得经济可行。产品经理应思考：如何将Agent能力嵌入现有产品线，从\"用户驱动\"转向\"AI主动完成\"的产品范式。"},{"title":"人形机器人的C端场景探索加速","content":"荣耀携机器人天团亮相北京车展，Robot Phone概念落地，意味着手机厂商正将机器人视为消费电子的新品类。半马赛事从去年20支队伍增至今年规模翻倍，完赛率显著提升。产品经理需关注：家庭服务、陪伴、轻量级运动等C端场景的产品定义机会。"}],"focus":["关注具身智能从单一3C场景向汽车制造、物流仓储等多场景扩展节奏","跟踪DeepSeek-V4/GPT-5.5的Agent API在产品中的集成方案和成本核算","留意杭州具身智能法规5月1日实施后的产品合规要求变化","观察荣耀Robot Phone等新物种的市场反馈和用户接受度"]},"algo_board":{"insights":[{"title":"DeepSeek-V4 vs GPT-5.5：开源与闭源的技术路线分化","content":"DeepSeek-V4采用混合注意力架构+mHC超连接技术，1.6T参数MoE架构，Apache 2.0开源。GPT-5.5在Terminal-Bench 2.0达82.7%、SWE-Bench Pro 58.6%。关键差异：V4以极致性价比(0.2元/百万Token)走量，5.5以Agent编码能力(30美元/百万Token)走质。算法工程师选型建议：对成本敏感的长上下文任务选V4，对编码质量和自主性要求极高选5.5。"},{"title":"具身智能模型走向通用化：智元大脑3.0和UniT论文","content":"智元发布具身智能通用模型\"智元大脑3.0\"，ArXiv上UniT论文提出人类到人形机器人策略学习的统一物理语言框架。核心趋势：从单任务专用模型走向跨场景通用具身大模型。关节电机刚柔耦合设计峰值扭矩密度12Nm/kg，核心零部件国产化率超90%，硬件瓶颈正在消除。"},{"title":"宇树轮足机器人展示高难度动作：运动控制算法持续突破","content":"宇树科技展示轮足人形机器人完成滑冰、轮滑、360度转身、单足转圈、前空翻等高难度动作。H1在半马赛事中4分13秒完成1.9公里弯道赛程，平均配速超越人类中长跑世界纪录。运动控制算法从步态稳定走向极限运动能力，但也暴露了姿态失控摔倒的鲁棒性挑战。"}],"tech_radar":[{"direction":"百万Token长上下文架构(混合注意力/mHC)","status":"成长期","advice":"DeepSeek-V4验证了百万上下文的工程可行性和商业可行性，建议深入研究混合注意力机制，在长文档处理和Agent场景中优先应用"},{"direction":"Agent自主编码与任务执行","status":"成长期","advice":"GPT-5.5的SWE-Bench Pro 58.6%标志着AI编码进入实用区间，建议探索Agent CI/CD集成，但需注意与人类审查的协作流程"},{"direction":"通用具身大模型(跨场景迁移)","status":"验证期","advice":"智元大脑3.0和UniT方向前沿但尚未大规模落地，建议跟踪论文和开源进展，为场景定制留出技术储备"},{"direction":"轮足混合运动控制","status":"验证期","advice":"宇树轮足机器人展示了极限运动能力，但鲁棒性仍是挑战，适合在物流和特种场景先行验证"},{"direction":"MoE稀疏架构大规模部署","status":"成长期","advice":"DeepSeek-V4的1.6T参数MoE验证了稀疏架构在超大规模下的可行性，建议关注推理效率优化方案"}],"focus":["深入对比DeepSeek-V4和GPT-5.5的Agent能力在实际编码任务中的表现差异","关注智元大脑3.0开源计划和具身智能通用模型的benchmark建立","跟踪ArXiv上人形机器人sim-to-real迁移和策略学习的最新进展","留意百万上下文模型在RAG替代和超长文档处理中的新范式"]},"projmgr_board":{"insights":[{"title":"具身智能项目从实验期进入量产交付期：节奏管理成关键","content":"领益智造超级工厂从开工到投产仅用2个多月(13天冲刺期)，智元G2从副产线实习到主产线转正历时4个月。这说明具身智能项目正进入快节奏的量产交付阶段。项目经理需要：1)建立硬件量产的里程碑节奏(POC-小批量-规模化)；2)预留充足的产线调试和良率爬坡时间；3)协调软件迭代与硬件交付的版本节奏。"},{"title":"多方协作复杂度急剧上升","content":"自变量机器人同时获得四大互联网巨头投资，智元与龙旗科技深度合作，领益智造在亦庄小米产业园建厂。跨组织协作成为常态：机器人公司+制造商+下游客户+投资方的四方协同。项目经理需建立清晰的RACI矩阵，特别是在技术标准、数据安全、知识产权等敏感领域明确权责边界。"},{"title":"政策法规带来合规新要求","content":"杭州发布全国首部具身智能地方法规5月1日实施，具身智能纳入十五五规划。项目经理需提前梳理合规清单：安全测试标准、数据隐私保护、作业场景安全认证等。建议在项目计划中增加政策合规审查节点，避免产品上线后被动整改。"}],"focus":["制定具身智能产品从POC到量产的标准化项目管理模板","关注杭州法规实施后的合规要求，提前准备安全测试和认证文档","建立跨组织协作的沟通机制和决策流程(尤其是涉及多投资方场景)","规划2026下半年量产爬坡期的资源调配和风险预案"]},"action_items":{"tech_selection":["Agent应用优先评估DeepSeek-V4(性价比)vs GPT-5.5(编码能力)，根据场景做AB测试","具身智能项目关注智元大脑3.0开源进展，评估通用具身模型对现有方案的替代可能","长上下文任务可直接切换至V4-Flash(0.2元/百万Token)，显著降低推理成本"],"track_judgment":["具身智能赛道进入规模化量产阶段，宇树+智元双寡头格局基本成型，新进入者窗口收窄","制造侧(超级工厂/代工)成为新增长极，领益智造模式值得关注，类似消费电子EMS的发展路径","大模型竞争从参数规模转向Agent能力+性价比，开源(DeepSeek)与闭源(OpenAI)的差距在个位数以内"],"watch_list":["5月1日杭州具身智能法规实施后的行业影响和其他城市跟进政策","DeepSeek-V4正式版(非预览版)发布时间和性能改进","智元2026合作伙伴大会后续：4个新本体+4个大模型的产品化节奏","宇树科技专利诉讼进展(最高法明确将尽快判决)","2026下半年人形机器人商业化关键期：Tr var days=["2026-04-29","2026-04-28","2026-04-27","2026-04-26","2026-04-25","2026-04-24","2026-04-23"];
var curDay=days[0]||'';
var curTab='hot';

function esc(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML}
function stars(r){var s='';for(var i=0;i<5;i++)s='<span style="color:'+(i<r?'var(--star)':'var(--star0)')+'">\u2605</span>';return s}
function starsStr(r){var s='';for(var i=0;i<5;i++)s+=(i<r?'\u2605':'\u2606');return s}

function initDays(){
  var h='';
  days.forEach(function(d){h+='<button class="day-btn'+(d===curDay?' a':'')+'" onclick="pickDay(\''+d+'\',this)">'+d+'</button>'});
  document.getElementById('dayPicker').innerHTML=h;
}

function pickDay(d,el){
  curDay=d;
  document.querySelectorAll('.day-btn').forEach(function(b){b.classList.remove('a')});
  el.classList.add('a');
  render();
}

function initTabs(){
  document.querySelectorAll('.tab').forEach(function(t){
    t.addEventListener('click',function(){
      curTab=this.getAttribute('data-t');
      document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('a')});
      this.classList.add('a');
      render();
    });
  });
}

function render(){
  var data=W[curDay];
  if(!data){document.getElementById('content').innerHTML='<div style="text-align:center;padding:3rem;color:var(--t2)">暂无该日数据</div>';return}
  document.getElementById('ut').textContent='最后更新：'+(data.update_time||curDay);
  var fn={hot:renderHot,startup:renderStartup,pm:renderPM,algo:renderAlgo,proj:renderProj,action:renderAction,hermes:renderHermes,all:renderAll};
  (fn[curTab]||renderHot)(data);
}

function renderHot(d){

}

function renderPM(d){
  var b=d.pm_board;
  if(!b){document.getElementById('content').innerHTML='<div class="bcard"><p>暂无新动态</p></div>';return}
  var h='<div class="sec">📋 产品经理板块</div>';
  (b.insights||[]).forEach(function(t){
    h+='<div class="bcard"><h3>'+esc(t.title)+'</h3><p>'+esc(t.content)+'</p></div>';
  });
  if(b.focus&&b.focus.length){
    h+='<div class="sec">📌 未来关注重点</div>';
    h+='<div class="bcard"><ul>';
    b.focus.forEach(function(f){h+='<li>'+esc(f)+'</li>'});
    h+='</ul></div>';
  }
  document.getElementById('content').innerHTML=h;
}

    h+='<div class="sec">📌 未来关注重点</div><div class="bcard"><ul>';

    h+='</ul></div>';
  }
  document.getElementById('content').innerHTML=h;

function renderHermes(d){
  var hb=d.hermes_board;
  if(!hb){document.getElementById('content').innerHTML='<div class="bcard"><p>暂无 Hermes 资讯</p></div>';return}
  var h='<div class="sec">🤖 Hermes Agent — AI 代理工作流与资讯</div>';
  // Insights
  (hb.insights||[]).forEach(function(t){
    var link=t.url?'<a href="'+esc(t.url)+'" target="_blank">'+esc(t.title)+'</a>':esc(t.title);
    h+='<div class="bcard"><h3>'+link+'</h3><p>'+esc(t.content)+'</p></div>';
  });
  // Tech stack
  if(hb.tech_stack&&hb.tech_stack.length){
    h+='<div class="sec">🛠️ 技术栈与工具</div>';
    hb.tech_stack.forEach(function(t){
      var link=t.url?'<a href="'+esc(t.url)+'" target="_blank">'+esc(t.title)+'</a>':esc(t.title);
      h+='<div class="bcard"><h3>'+link+'</h3><p>'+esc(t.content)+'</p></div>';
    });
  }
  // Community
  if(hb.community&&hb.community.length){
    h+='<div class="sec">🌐 社区动态</div>';
    hb.community.forEach(function(c){
      var link=c.url?'<a href="'+esc(c.url)+'" target="_blank">'+esc(c.title)+'</a>':esc(c.title);
      h+='<div class="bcard"><h3>'+link+'</h3><p>'+esc(c.content)+'</p></div>';
    });
  }
  document.getElementById('content').innerHTML=h;
}

function renderAll(d){
  var arts=d.raw_articles||[];
  var h='<div class="search-bar"><span class="ico">\uD83D\uDD0D</span><input id="sInput" placeholder="\u641c\u7d22\u6807\u9898\u6216\u6458\u8981..." oninput="filterAll()"></div>';
  h+='<div id="allList"></div>';
  document.getElementById('content').innerHTML=h;
  window._allArts=arts;
  filterAll();
}

function filterAll(){
  var q=(document.getElementById('sInput')||{}).value||'';
  q=q.toLowerCase().trim();
  var arts=window._allArts||[];
  if(q)arts=arts.filter(function(a){return a.title.toLowerCase().indexOf(q)!==-1||a.summary.toLowerCase().indexOf(q)!==-1});
  var h='';
  if(!arts.length){h='<div style="text-align:center;padding:2rem;color:var(--t2)">\u672a\u627e\u5230\u5339\u914d\u8d44\u8baf</div>'}
  else{arts.forEach(function(a){
    h+='<div class="ncard"><div class="left"><h4><a href="'+esc(a.url)+'" target="_blank">'+esc(a.title)+'</a></h4><div class="nm">'+esc(a.source)+' · '+a.publish_time+' · '+starsStr(a.rating)+'</div></div><div class="right"><span class="cat">'+esc(a.category)+'</span></div></div>';
  })}
  document.getElementById('allList').innerHTML=h;
}

function toggleTheme(){
  var dk=document.body.getAttribute('data-theme')==='dark';
  document.body.setAttribute('data-theme',dk?'light':'dark');
  document.querySelector('.tbtn').innerHTML=dk?'&#x1F319;':'&#x2600;&#xFE0F;';
  localStorage.setItem('ai-news-theme',dk?'light':'dark');
}

document.addEventListener('DOMContentLoaded',function(){
  var sv=localStorage.getItem('ai-news-theme');
  if(sv==='dark'||(!sv&&window.matchMedia('(prefers-color-scheme:dark)').matches)){
    document.body.setAttribute('data-theme','dark');
    document.querySelector('.tbtn').innerHTML='&#x2600;&#xFE0F;';
  }
  initDays();initTabs();render();
});
</script>
