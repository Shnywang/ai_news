形机器人出货超5500台","source":"上海证券报","url":"https://gu.qq.com/resources/shy/news/detail-v2/index.html?t=1#/index?_tentrees_trans=0&id=SN20260703084927979430b2","summary":"IPO用时104天创纪录。估值约420亿。2025年出货5500台。WMA+VLA双路线。2026年目标1-2万台","category":"IPO里程碑","rating":5,"publish_time":"2026-07-03"}]},"2026-07-02":{"update_time":"2026-07-02T14:00:00+08:00","hot_topics":[{"title":"首届上海国际具身智能产业博览会(CIEI 2026)开幕：宇树/智元/优必选等60+企业全阵容亮相，产业链从「单点展示」进入「全链协作出海」","source":"21世纪经济报道/腾讯新闻/OFweek机器人网","url":"https://new.qq.com/rain/a/20260702A03IGG00","summary":"7月2日-4日，首届上海国际具身智能产业博览会(CIEI 2026)在国家会展中心(上海)举行。宇树、智元、加速进化、乐聚、中科新松、七腾、珞石、云深处等60余家企业全阵容亮相，集中展示人形整机、灵巧手、关节模组及具身大模型。商务部外贸发展事务局主办「全球具身智能产业链协作出海对接会」，已收集欧洲和东南亚地区电力、物流、康养、城市管理等多领域采购需求。叠加8月19-23日北京世界机器人大会(WRC 2026)预热，6-8月形成「超级催化窗口」。","category":"产业博览会","rating":5,"philosophy_insight":{"framework":"否定之否定 + 对立统一 + 目的论","analysis":"✅正题：过去三年，中国具身智能企业在各自展位上「单点展示」——各家独自亮相自家机器人，产业链协同主要靠媒体拼接。❌反题：CIEI 2026首次以「全链协作出海」为主题，不再是各家各做，而是感知-决策-执行全链路企业同台对接，商务部主导出海采购对接意味着产业从「内卷竞争」升级为「国家组团出海」。💡合题：从「散点展示(2023-2025)」到「全链协同+出海对接(2026)」，中国具身智能完成了否定之否定的跃升——展会本身成为产业链协同的「产业操作系统」载体。对立统一：「单点展示(各家竞争)」vs「全链协同(行业协同)」的对立面，在「CIEI出海对接」的统一目标下被打破。","verdict":"CIEI 2026标志中国具身智能从散点展示进入全链协作出海阶段，6-8月超级催化窗口将定义下半年产业节奏"}},{"title":"Anthropic发布Claude Sonnet 5：性能逼近旗舰Opus 4.8，SWE-bench Pro超越GPT-5.5，价格仅Opus的40%","source":"东方财富/搜狐科技/腾讯云开发者社区","url":"https://caifuhao.eastmoney.com/news/20260702080345754042880","summary":"7月1日Anthropic发布Claude Sonnet 5(代号Fennec)，SWE-bench Pro得分63.2%超越GPT-5.5的58.6%，Terminal-Bench 2.1得分80.4%，OSWorld-Verified 81.2%。「人类最后的考试」57.4%仅落后Opus 4.8的0.5个百分点。GDPval-AA v2知识工作1618分反超Opus 4.8的1615分。浏览器注入防御攻击成功率仅0.93%反超全家族旗舰。推广期(至8月31日)定价输入2美元/输出10美元，恢复后3美元/15美元，为Opus 4.8(5/25美元)的40-60%。成为Free和Pro用户默认模型。同日美国商务部解除对Claude Fable 5和Mythos 5的出口管制。","category":"前沿模型","rating":5,"philosophy_insight":{"framework":"否定之否定 + 扬弃 + 语言游戏","analysis":"✅正题：AI模型市场长期被「旗舰贵但强」vs「中端便宜但弱」的二分法主导——Opus 4.8性能顶尖但5/25美元，Gemini Flash便宜但能力有限。❌反题：Sonnet 5以Opus 40%的价格提供90-100%区间性能，在知识工作(GDPval)甚至反超Opus——「旗舰 vs 中端」的旧二分法被打破。💡合题：Anthropic扬弃了「旗舰高端 vs 中端低端」的定价叙事——取消价格分层对应能力分层的旧逻辑，保留旗舰在极端场景的优势(网络安全等)，提升中端到「准旗舰」定位。语言游戏分析：「更便宜的智能体运行方案」这个定位本身就在重写AI模型市场的价值语言——从「能力定价」转向「Agent运行成本定价」。注意：Sonnet 5采用新tokenizer，相同输入token膨胀1.0-1.35倍，实际成本比表面价格更高。","verdict":"Sonnet 5打破旗舰与中端的价格壁垒，多Agent架构成本门槛大幅降低，但tokenizer膨胀暗藏实际成本陷阱"}},{"title":"马斯克晒Optimus V3产线大合照：弗里蒙特改造完成，7月底-8月启动量产，野村上调年化产能至7万台","source":"IT之家/新浪科技/东方财富","url":"https://k.sina.com.cn/article_1826017320_6cd6d02802001neky.html","summary":"7月1日马斯克在X平台发布与近30位员工的大合照，配文「在弗里蒙特工厂参观Optimus机器人生产线」。原Model S/X装配线已改造成Optimus V3专用产线，第一条产线已运抵并进行验收测试最后阶段，2-3天可安装一条生产线。野村证券研报将Optimus V3弗里蒙特产线年化产能目标从5万台上调至7万台，计划2028年奥斯汀新增7万台，长期合计产能指向150万台。得州超级工厂规划年产1000万台。马斯克确认7月下旬或8月投产但初期产量「相当缓慢」，10000个独特零部件，今年产量「根本不可能预测」。9月单周产量目标有望跃升至约1000台。","category":"量产突破","rating":5,"philosophy_insight":{"framework":"否定之否定 + 具身认知 + 目的论vs机械论","analysis":"✅正题：弗里蒙特曾是特斯拉Model S/X的旗舰汽车产线，如今被彻底改造为机器人产线——汽车工厂变机器人工厂，这是制造业范式转移的物理象征。❌反题：马斯克同时强调「初期产量相当缓慢」「10000个独特零部件」「根本不可能预测」——量产目标与量产现实之间存在巨大张力。💡合题：Optimus V3的量产是「目的论vs机械论」的经典演绎——目的论端是马斯克150万台/年的宏大愿景，机械论端是10000个零部件的工程现实。否定之否定：从「PPT机器人(2021)」到「 demos机器人(2022-2025)」到「产线机器人(2026H2)」，Optimus完成了从概念到物理实体的三步跨越。具身认知：弗里蒙特从「造车」到「造机器人」的产线改造，本质是制造业从「车轮身体」到「双足身体」的具身认知升级。","verdict":"Optimus V3产线改造完成是物理AI元年标志性事件，但10000个零部件意味着量产爬坡比想象更慢"}},{"title":"ChatGPT全球市场份额首次跌破50%至46.4%：Gemini(27.7%)+Claude(10.3%)快速追赶，AI助手市场从垄断进入三国杀","source":"新华社/钛媒体/搜狐","url":"https://gu.qq.com/resources/shy/news/detail-v2/index.html?t=1#/index?_tentrees_trans=0&id=SN2026070203554297922d29","summary":"Sensor Tower 2026年《State of AI》报告显示，ChatGPT全球AI助手市场份额首次跌破50%至46.4%(2024年3月曾达81%)。Gemini以27.7%快速追赶，Claude从一年前默默无闻到10.3%(同比增长640%)，Meta AI暴涨973%。ChatGPT月活超11亿同比增62%，绝对体量仍在扩张但市场膨胀速度更快。2026上半年全球AI应用下载量23亿次，用户时间从172亿小时翻倍到360亿小时，消费支出从18.3亿美元跃升至42亿美元。微软推出7款MAI系列模型(含MAI-Code-1-Flash)减少对OpenAI依赖。微软CEO呼吁打破巨头垄断，考虑采用DeepSeek V4等开源模型降低成本。","category":"市场格局","rating":5,"philosophy_insight":{"framework":"否定之否定 + 对立统一 + 证伪主义","analysis":"✅正题：ChatGPT从2022年11月发布以来独占AI助手市场，2024年3月份额高达81%，「一家独大」似乎是不可撼动的格局。❌反题：46.4%不是ChatGPT的衰退(月活11亿+62%增长)，而是市场蛋糕膨胀速度超过了老大扩张速度——Gemini 6.62亿月活、Claude 2.45亿月活、Meta AI暴涨973%。💡合题：AI助手市场完成否定之否定——从「单一巨头垄断(2022-2024)」到「多方竞争三国杀(2025-2026)」，下一阶段竞争焦点从「跑得快(用户增长)」转向「活得久(商业模式+生态绑定)」。证伪主义：46.4%这个数字证伪了「ChatGPT不可超越」的假设——当市场从单一工具变成多入口生态时，份额必然分散。对立统一：「ChatGPT(先发优势)」vs「Gemini(谷歌生态)+Claude(Agent能力)+Meta AI(社交入口)」的对立面，在「AI助手从工具变成平台」的统一趋势下重新洗牌。","verdict":"ChatGPT跌破50%不是危机而是市场成熟的信号，下半场竞争从用户增长转向商业模式和生态绑定"}},{"title":"可灵AI完成30亿美元融资估值180亿：腾讯参投，快手计划12个月内港股IPO，AI视频最大单笔融资","source":"南华早报/科技Web/独角兽早知道","url":"https://stock.10jqka.com.cn/hks/20260702/c677891221.shtml","summary":"7月2日，快手旗下AI视频生成业务「可灵AI」即将完成30亿美元(约204亿人民币)融资，投后估值180亿美元(约1223亿人民币)，腾讯参投。较4月200亿美元目标缩水20亿美元，但融资额从20亿提高至30亿美元。2026年Q1营收超6.5亿元同比增300%+，ARR接近5亿美元(同比4倍增长)，约七成收入来自海外。全球用户突破1亿，累计生成超6亿个视频。可灵3.0支持全模态输入输出、15秒视频生成，已参与《太平年》《大卫王朝》等影视制作。快手预计12个月内启动港股IPO，募资用于算力和数据中心建设。","category":"资本密集","rating":4,"philosophy_insight":{"framework":"扬弃 + 语言游戏 + 对立统一","analysis":"✅正题：30亿美元是AI视频领域最大单笔融资，180亿美元估值接近快手母公司市值七成——可灵从快手的「功能模块」变成「独立估值实体」。❌反题：估值从200亿缩水至180亿，「钱更多了(20亿→30亿)，价格反而更谨慎了」——市场对AI视频叙事的定价开始回归理性。💡合题：可灵扬弃了「母公司功能模块」的旧定位——取消对快手母体资源的依赖，保留DiT架构技术壁垒，提升为独立IPO候选人。语言游戏分析：「第二增长曲线」是程一笑给可灵的定位叙事——这个命名把「AI视频生成」从「技术工具」升维为「公司增长战略」，从「卖功能」升级为「卖增长故事」。对立统一：「国内母体(快手流量)」vs「海外市场(七成收入来自海外)」的对立面，在「可灵独立IPO」的统一资本叙事下被重新定义。","verdict":"30亿美元融资证明AI视频赛道价值，但180亿较200亿缩水反映市场从叙事定价向收入定价回归"}},{"title":"Etched发布首份进展报告：融资8亿美元估值50亿，Sohu芯片流片成功，声称吞吐量达H100的160倍","source":"智东西/电子工程专辑/腾讯新闻","url":"https://www.esmchina.com/news/14318.html","summary":"6月30日AI芯片初创Etched「出隐身」：三位哈佛辍生创立，累计融资8亿美元(投后估值50亿美元)，Sohu芯片采用台积电N4P 4nm工艺，首次投片即成功(A0 spin)。搭载144GB HBM3E，将Transformer注意力机制直接固化在芯片电路层面。官方声称单台8芯片Sohu服务器Llama 70B推理吞吐量超50万token/秒，是H100的20倍(每美元性能140倍)，运行1T稀疏MoE模型算力效率超80%。已签署超10亿美元预售合同，今夏出货。投资方含辛顿、李飞飞、Karpathy、Peter Thiel、台积电关联基金、Jane Street等。团队超400人主要来自NVIDIA/Broadcom/Google TPU。","category":"AI芯片突破","rating":4,"philosophy_insight":{"framework":"扬弃 + 证伪主义 + 目的论vs机械论","analysis":"✅正题：英伟达GPU是通用芯片，能跑Transformer也能跑CNN/RNN——通用性带来生态优势但牺牲效率(FLOPS利用率约30%)。❌反题：Etched的Sohu是ASIC专用芯片，把Transformer架构「刻」进硬件——极端效率(声称吞吐量160倍于H100)但极端风险(如果Transformer架构变了就是废硅)。💡合题：Etched扬弃了「通用 vs 专用」的二分法——不要求开发者重写代码(PyTorch模型直接跑)，但用ASIC固化Transformer获得极致效率。证伪主义：Sohu的核心赌注是「Transformer架构不会变」——如果下一代模型架构(如Mamba/SSM)取代Transformer，Sohu的专用设计就是可证伪失败的。目的论vs机械论：Etched的目的论是「推理基础设施决定AI经济价值」，机械论端是「400人团队+N4P工艺+10亿美元订单」的工程落地——两者在「Sohu流片成功」这个节点交汇。","verdict":"Sohu的ASIC路线是对英伟达通用GPU霸权的最激进挑战，但成败取决于Transformer架构能统治多久"}},{"title":"中国具身智能产业发展报告：2026年市场规模1.09万亿，CAGR 22-23%，制造成本较国外低30-50%","source":"财联社/上海证券报","url":"https://www.cls.cn/detail/2415154","summary":"7月2日《中国具身智能产业发展报告(2026)》在上海发布。中国从2018年约2133亿元增长至2026年预计1.09万亿元，年均复合增长率22-23%。中国拥有全球唯一且最完整的全链条产业配套，从核心传感器、伺服电机、谐波减速器到整机组装、算法适配形成高度集聚产业集群。长三角、珠三角零部件配套集聚效应使新品迭代速度大幅领先欧美。中国制造成本较国外低30-50%。2025年中国人形机器人出货量占全球84.7%，宇树(5500台)、智元(5168台)分列全球前二。摩根士丹利年内二次上调预测：2026年中国出货量从2.8万台上调至5万台(同比增247%)，2030年达44.6万台(CAGR 106%)。IDC预计2026年全球智能机器人硬件市场接近300亿美元，中国突破110亿美元。","category":"产业报告","rating":4,"philosophy_insight":{"framework":"对立统一 + 具身认知 + 目的论","analysis":"✅正题：1.09万亿市场规模和22-23% CAGR证明具身智能已从概念变为可量化的经济实体。❌反题：84.7%全球出货份额和30-50%成本优势是中国制造的「量」优势，但「质」(核心算法/高端芯片/世界模型基座)与北美仍有差距。💡合题：「万亿市场+全链条配套+低成本」是中国的量优势，「世界模型基座+核心芯片+算法范式」是北美质优势——两者在「具身智能产业化」的统一目标下形成对立统一。具身认知分析：中国的成本优势本质上来自「身体-环境」的具身认知闭环——长三角珠三角的零部件配套产业集聚，就是「产业链的身体」与「制造环境」之间的具身认知回路，迭代速度=感知-决策-执行回路效率。目的论：1.09万亿不是终点而是「国家级产业操作系统」的形成信号。","verdict":"万亿市场和84.7%出货份额是量的胜利，但质的优势(基座模型/芯片)仍需突破"}},{"title":"全球数字经济大会北京开幕+人形机器人板块暴涨：三瑞智能/宏昌科技20%涨停，7-8月「机器人主题月」催化密集","source":"北青网/证券时报/东方财富","url":"https://www.toutiao.com/article/7657775390378705423","summary":"7月2日，2026全球数字经济大会在北京国家会议中心开幕(至7月5日)，近20项数字经济行业规则标准出炉，涵盖数据跨境流动、AI治理等方向。同日A股人形机器人概念强势拉升：三瑞智能、宏昌科技20%涨停，集智股份、三协电机、步科股份涨超10%。机器人ETF(560770)涨超1.76%。交银国际认为下半年催化剂密集：特斯拉Optimus V3量产概率大、本土机器人企业(乐聚/云深处/宇树)IPO提速。万联证券指出人形机器人正从技术突破迈向规模化商业化的「破晓时刻」。宇树R1降价至2.99万元，优必选发布Walker C1商用服务机器人。","category":"市场催化","rating":4,"philosophy_insight":{"framework":"否定之否定 + 对立统一","analysis":"✅正题：7-8月密集事件(CIEI展会+WRC大会+Optimus投产+IPO提速)形成「超级催化窗口」，资本市场提前反应。❌反题：板块暴涨背后仍有基本面脆弱性——量产规模仍小、商业化路径仍窄、估值仍高。💡合题：「超级催化窗口」是资本市场对具身智能从「技术验证」到「商业落地」转折点的预期定价——如果下半年量产和订单兑现，预期被确认；如果不达预期，则板块回调。否定之否定：从「概念炒作(2023-2024)」到「量产验证(2025-2026H1)」到「商业落地定价(2026H2)」，具身智能的资本叙事完成三步跨越。对立统一：「事件驱动(短期催化)」vs「基本面驱动(长期价值)」的对立面，在「7-8月主题月」的统一时间窗口内博弈。","verdict":"7-8月机器人主题月是具身智能资本定价的关键验证窗口，量产兑现决定板块能否持续"}}],"startup_board":{"companies":[{"name":"Etched","field":"AI推理芯片(ASIC)","route":"Transformer专用芯片Sohu，台积电4nm，吞吐量声称H100的160倍","funding":"累计8亿美元，估值50亿美元，10亿美元订单","verdict":"最激进的英伟达挑战者，成败取决于Transformer统治期"},{"name":"可灵AI(快手)","field":"AI视频生成","route":"DiT架构，全模态输入输出，3.0支持15秒视频","funding":"30亿美元，估值180亿美元，腾讯参投","verdict":"AI视频最大单笔融资，12个月内港股IPO"},{"name":"Oxmiq","field":"AI芯片架构","route":"GPU+CPU+张量引擎三合一IP模块授权","funding":"3500万美元，总融资6000万美元","verdict":"定位AI新时代的Arm，三星/联发科参投"},{"name":"Venice AI","field":"隐私优先AI平台","route":"200+开源/闭源模型接入，端侧加密无留存","funding":"6500万美元A轮，估值10亿美元","verdict":"月活300万+年化营收7000万+已盈利，隐私赛道独角兽"}],"trend":"AI芯片赛道资本集中爆发：Etched(8亿)+Oxmiq(3500万)+Ayar Labs(传2亿)同期融资，推理基础设施成资本最热赛道。AI视频赛道可灵30亿刷新纪录。隐私AI(Venice)和芯片架构IP(Oxmiq)是新晋独角兽。大厂AI高管创业估值飙升(阿里千问前负责人20亿/字节前高管20亿+)，人才流动加速。"},"pm_board":{"insights":[{"title":"CIEI 2026首展的PM信号：具身智能从「技术驱动」进入「出海驱动」阶段","content":"CIEI 2026首次以「全链协作出海」为主题，商务部主导出海采购对接，已收集欧洲和东南亚实际采购需求。对PM意味着：产品定位必须从「国内 demo」转向「海外可交付」，需求采集从「技术参数」转向「采购方场景」。出海产品需要解决认证(CE/UL)、数据合规(GDPR)、本地化运维三重门槛。建议设立出海产品线PM，与国内产品线分离考核。"},{"title":"Claude Sonnet 5定价策略对AI产品PM的启示：从「能力定价」转向「Agent运行成本定价」","content":"Anthropic将Sonnet 5定位为「更便宜的智能体运行方案」而非「更强的模型」——这个定价叙事正在改写AI产品定价逻辑。对PM意味着：用户不再为「模型能力」付费，而是为「Agent完成任务的成本」付费。多Agent架构(2-3个Sonnet并行替代1个Opus)成为成本最优解。PM需要从「API调用量」转向「任务完成率+单位任务成本」的指标体系。注意tokenizer膨胀陷阱：表面价格下降但实际token数量增加1.0-1.35倍。"},{"title":"ChatGPT份额跌破50%的市场信号：AI助手从「工具竞争」进入「平台竞争」","content":"ChatGPT从81%降至46.4%不是衰退而是市场成熟——Gemini靠谷歌生态(27.7%)、Claude靠Agent能力(10.3%)、Meta AI靠社交入口(暴涨973%)。对PM意味着：AI助手产品的核心竞争力从「模型能力」转向「生态绑定+入口控制」。微软推出7款MAI模型减少对OpenAI依赖，说明大厂正在构建自有模型栈。PM需要回答：你的AI产品绑定了什么生态？如果没有生态绑定，份额必然被蚕食。"}],"focus":["出海产品线PM体系建设（认证/合规/本地化运维）","Agent运行成本定价模型设计（任务完成率+单位任务成本）","AI助手产品的生态绑定策略（入口控制 vs 模型能力）","7-8月机器人主题月的产品发布窗口管理"]},"algo_board":{"insights":[{"title":"Etched Sohu芯片的架构取舍：把Transformer「刻」进硬件的极端效率与极端风险","content":"Sohu采用ASIC专用集成电路，将Transformer注意力机制直接固化在芯片电路层面。FLOPS利用率超90%(GPU约30%)，单台8芯片服务器Llama 70B吞吐量超50万token/秒。核心创新：不要求开发者重写代码，PyTorch模型直接运行——这打破了ASIC历史上需要新编程模型的魔咒。低电压设计使数学模块电压比竞品低50%以上，片上SRAM+片外HBM组合兼顾低延迟和大容量。但核心赌注是Transformer架构不变——如果Mamba/SSM等新架构取代Transformer，Sohu就是废硅。"},{"title":"Claude Sonnet 5的Agent能力跃升：从「会思考」到「能持久干活+自我纠错」","content":"Sonnet 5在Terminal-Bench 2.1得分80.4%(较Sonnet 4.6提升13个百分点)，OSWorld-Verified 81.2%超越GPT-5.5。核心进步：精细任务规划+长时间代理任务执行+海量代码库稳定运行+主动自我纠错(self-correction)。浏览器注入防御攻击成功率仅0.93%(Mythos 5为29.7%)，恶意代码注入从45.26%降至0.29%(改善150倍)。但运行成本增加约2倍(token使用量增加)，算法工程师需在性能与成本间权衡。新tokenizer导致token膨胀1.0-1.35倍，实际成本比表面价格更高。"},{"title":"中国具身智能全链条产业配套的算法视角：从模型基座到硬件闭环","content":"中国拥有从传感器/伺服电机/谐波减速器到整机组装/算法适配的全链条配套，但核心算法基座(世界模型/VLA)仍与北美有差距。制造成本低30-50%使硬件迭代速度快于欧美，但模型层(大晓Kairos/千寻Spirit/阿里Qwen-Robot)仍需持续突破。算法工程师的机遇：全链条配套意味着算法可以快速在物理实体上验证和迭代，形成「算法→硬件→数据→算法」的闭环。建议关注长三角/珠三角产业集群的「感知-决策-执行」全链路协同机会。"}],"tech_radar":[{"direction":"Transformer专用ASIC推理芯片","status":"突破期","advice":"关注Etched Sohu交付后独立验证数据，评估ASIC vs GPU的TCO"},{"direction":"Claude Sonnet 5多Agent架构","status":"成长期","advice":"2-3个Sonnet并行替代1个Opus已成本最优，注意tokenizer膨胀"},{"direction":"Optimus V3量产工程","status":"验证期","advice":"10000个独特零部件，9月单周1000台是关键爬坡指标"},{"direction":"全链协作出海(CIEI模式)","status":"成长期","advice":"出海产品需CE/UL认证+GDPR合规，建议提前布局"},{"direction":"AI视频生成(DiT架构)","status":"成长期","advice":"可灵3.0全模态+15秒视频，关注影视制作工业化应用"},{"direction":"光互联芯片(Ayar Labs)","status":"突破期","advice":"铜线→激光光互联转型，关注数据中心AI芯片间高速传输"}],"focus":["Etched Sohu芯片今夏交付后的独立性能验证数据","Claude Sonnet 5新tokenizer对实际推理成本的影响(1.0-1.35倍膨胀)","Optimus V3量产爬坡曲线(7月底-8月投产，9月单周1000台目标)","中国全链条产业配套中算法层的补短板机会(世界模型/VLA基座)"]},"projmgr_board":{"insights":[{"title":"7-8月「机器人主题月」的项目管理：三重催化窗口的节奏控制","content":"CIEI(7月2-4日)+WRC(8月19-23日)+Optimus投产(7月底-8月)形成三重催化窗口。项目管理建议：7月聚焦CIEI展会产品发布和客户对接，8月聚焦WRC新品发布和量产交付验证。关键路径：CIEI展出→客户意向→POC验证→订单签订→交付部署。风险点：展会热度转化为实际订单的转化率、量产爬坡慢于预期、供应链瓶颈。建议设立「主题月作战室」，每日跟踪展会线索和量产进度。"},{"title":"具身智能出海项目管理的三重门槛：认证/合规/本地化","content":"CIEI 2026出海对接会已收集欧洲和东南亚实际采购需求，出海成为新增长极。项目管理需要新增三个工作流：①认证流(CE/UL/当地标准)——预计3-6个月周期；②合规流(GDPR数据合规/当地劳动法规)——需要法务支持；③本地化运维流(远程运维/备件供应/培训体系)——需要海外服务团队。建议设立出海项目集(Portfolio)，与国内项目分离管理，出海项目优先级在2026H2提升至P0。"}],"focus":["CIEI→WRC展会线索转化率跟踪体系","Optimus V3量产爬坡风险管理(9月单周1000台里程碑)","出海项目集认证/合规/本地化三流并行管理","7-8月主题月作战室机制(每日线索+量产双线跟踪)"]},"hermes_board":{"insights":[{"title":"7月2日超级信息日：CIEI开幕+Claude Sonnet 5发布+Optimus产线亮相+ChatGPT跌破50%四线同发","content":"单日四条线同时爆发：①产业线(CIEI 2026首届具身智能博览会开幕，60+企业全阵容+出海对接)；②模型线(Anthropic发布Claude Sonnet 5，性能逼近Opus 4.8且价格仅40%)；③量产线(马斯克晒Optimus V3产线大合照，弗里蒙特改造完成7月底投产)；④市场线(ChatGPT全球份额首次跌破50%至46.4%，AI助手三国杀格局形成)。叠加可灵AI 30亿美元融资和中国具身智能万亿市场报告，标志AI+具身智能从「渐进发展」进入「加速冲刺」阶段。","url":"https://new.qq.com/rain/a/20260702A03IGG00"},{"title":"AI芯片推理基础设施资本爆发：Etched 8亿+Oxmiq 3500万+Ayar Labs传2亿，推理成AI规模化瓶颈","content":"三起AI芯片融资同期爆发：Etched(Transformer专用ASIC，8亿美元估值50亿+10亿订单)、Oxmiq(GPU+CPU+张量三合一IP，3500万美元)、Ayar Labs(光互联芯片，传2亿美元估值500亿)。共同信号：推理正成为AI规模化服务的最大瓶颈和成本中心。英伟达200亿收购Grok(推理)、Cerebras 560亿IPO、亚马逊/谷歌/微软自研AI芯片、OpenAI与Broadcom合作定制芯片——推理基础设施竞赛全面升级。长程AI Agent显著放大推理需求，尤其Decode阶段并发能力。","url":"https://www.esmchina.com/news/14318.html"}],"tech_stack":[{"title":"Etched Sohu：Transformer注意力机制固化到芯片电路","content":"台积电N4P 4nm工艺，144GB HBM3E，首次投片即成功(A0 spin)。数学模块电压比竞品低50%+，片上SRAM+片外HBM组合，FLOPS利用率超90%(GPU约30%)。单台8芯片服务器Llama 70B吞吐量超50万token/秒。PyTorch模型直接运行无需改代码——打破ASIC需新编程模型的历史魔咒。今夏交付，10亿美元订单。","url":"https://www.esmchina.com/news/14318.html"},{"title":"Claude Sonnet 5 Agent能力：自我纠错+长时间任务执行+浏览器工具调用","content":"Terminal-Bench 2.1得分80.4%(+13pp)，OSWorld-Verified 81.2%超GPT-5.5。浏览器注入防御攻击成功率0.93%反超全家族旗舰。恶意代码注入从45.26%降至0.29%(改善150倍)。Firefox 147漏洞利用测试得分0.0%(Mythos 5为88.4%)。可编写顶级业务代码但无法写出可用漏洞利用——安全护栏达到新高度。","url":"https://caifuhao.eastmoney.com/news/20260702080345754042880"},{"title":"Optimus V3产线工程：弗里蒙特改造+模块化产线+10000个独特零部件","content":"原Model S/X产线改造为Optimus V3专用线，第一条产线已运抵验收。模块化设计：2-3天安装一条产线，一周可运转。后续40条子生产线(执行器/躯干/电池/四肢)。野村上调年化产能5万→7万台，2028年奥斯汀新增7万台，长期150万台。得州工厂规 订单标志人形机器人正式进入消费市场，9月交付质量将决定这一新品类能否站稳脚跟"}},{"title":"自变量机器人两个月四轮融资估值破200亿：四大互联网巨头齐聚，小米连续三轮加注","source":"中国证券报/中国日报/南方都市报","url":"https://finance.eastmoney.com/a/202606303788424882.html","summary":"6月30日，自变量机器人宣布连续完成B轮至C轮合计四轮融资，全部交割完毕，投后估值突破200亿元，成为粤港澳大湾区首家估值破200亿的具身智能企业。投资方超30家，涵盖红杉中国、IDG、源码资本、深投控、中金资本等头部VC，以及中国移动、国投创新等国家级基金。最罕见的是自变量是国内唯一一家获得美团、阿里、字节跳动、小米四大互联网巨头分别领投一轮的企业。6月29日行业同日还披露视比特B++轮、擎羽科技Pre-A轮、源策未来种子轮等多起融资。","category":"资本密集","rating":5,"philosophy_insight":{"framework":"语言游戏 + 对立与统一","analysis":"语言游戏分析：「估值200亿」在资本市场语境中是「注意力信号」而非「价值确认」——四大互联网巨头分别领投的罕见阵容本身就是最强叙事。自变量获得美团/阿里/字节/小米四家分别领投，意味着它成为各家在具身智能赛道的「标准配置」——投自变量不是投技术，是投赛道入场券。对立统一分析：财务资本(追求估值增长) vs 产业资本(追求战略卡位)形成合力——但当所有巨头都在投同一家公司时，也暗示各家对具身智能技术路线尚无共识，自变量成为了「分散押注」的公共选择。","verdict":"四巨头齐聚投一家是罕见信号，但200亿估值需要从「资本共识」转化为「商业共识」"}},{"title":"美团发布LongCat-2.0：全球首个国产算力万亿参数大模型，OpenRouter调用量全球前三","source":"新华网/腾讯新闻/PChome","url":"https://new.qq.com/rain/a/20260630A04M2B00","summary":"6月30日，美团发布新一代万亿参数大模型LongCat-2.0，MoE架构总参数1.6万亿，单Token激活约480亿，原生支持1M超长上下文。业界首个在五万卡国产算力集群上完成从预训练到推理全流程的万亿参数模型，稳态日吞吐超1T tokens/day。首创零计算专家机制实现token级动态算力分配，MOPD架构融合Agent/Reasoning/Interaction三组专家。SWE-bench Pro 59.5分超越Gemini 3.1 Pro和Claude Opus 4.6。匿名预览版在OpenRouter跻身全球调用量前三，Hermes月调用量全球第一、Claude Code全球第二。","category":"国产大模型突破","rating":5,"philosophy_insight":{"framework":"否定之否定 + 扬弃","analysis":"✅正题：LongCat-2.0证明了国产算力（五万卡集群）已具备支撑万亿参数模型稳定训练的工程能力，「国模+国芯」全栈协同迈出实质性一步。零计算专家和MOPD架构是原创性技术创新。❌反题：SWE-bench Pro 59.5分距离GPT-5.6 Sol的91.9%仍有显著差距；「国产算力全流程」的代价是研发周期和成本远高于用H100集群；调用量全球前三但在Agent核心能力上仍落后于Claude Opus 4.8。💡合题：LongCat-2.0的价值不在于当前性能是否最顶尖，而在于证明了中国AI发展的「去依赖化」路径可行——即使不依赖英伟达芯片，也能训练出国际二线水平的万亿参数模型。扬弃分析：美团扬弃了「依赖海外芯片做模型」的行业默认路径——取消对H100/A100的硬件依赖，保留MoE稀疏激活的效率优势，提升为国产算力全栈闭环的新范式。","verdict":"LongCat-2.0证明国产算力可支撑万亿模型，意义在于打破芯片依赖而非追求性能天花板"}},{"title":"GPT-5.6 Sol发布：美国政府首次干预前沿模型分发，Agentic-First训练范式改写竞争规则","source":"腾讯云开发者社区/SegmentFault/dev.to","url":"https://cloud.tencent.com/developer/article/2700578","summary":"6月26日OpenAI发布GPT-5.6系列（Sol/Terra/Luna三档），核心创新是Agentic-First训练范式——优化目标从「答案正确率」变为「每1000 tokens的正确操作数」。Sol Ultra模式Terminal-Bench 2.1得分91.9%超越Claude Mythos 5，1.5M上下文窗口，Ultra模式通过子智能体并行架构实现42%延迟降低。最重大变化：美国政府首次公开干预前沿AI模型分发，仅约20家经安全审批的合作伙伴获得预览权限，每家客户需政府「逐个审批」。6月30日GPT-5.5和Claude 4.x同日登陆AWS Bedrock和Azure，闭源模型独占时代终结。","category":"前沿模型","rating":5,"philosophy_insight":{"framework":"目的论vs机械论 + 语言游戏","analysis":"目的论vs机械论：美国政府对GPT-5.6的干预是典型的目的论管控——政府预设「安全」目标并主动塑造模型分发路径，而非让市场机制自然涌现。Agentic-First训练范式本身也是目的论转向——从「正确回答问题」(机械论)到「完成整个任务」(目的论)。语言游戏分析：「Agentic-First」「step function」等术语构建了新叙事框架——GPT-5.6不再是「更聪明的ChatGPT」而是「更会干活的AI Agent」。但20家客户审批制的现实是：美国政府认为AI能力已达到需要管控的临界点。","verdict":"Agentic-First是从聊天到Agent的范式切换，但政府管控意味着前沿模型正在从技术产品转变为战略资产"}},{"title":"英伟达机器人团队在京沪深开放招聘：打造下一代通用机器人系统，聚焦灵巧操作与全身控制","source":"科创板日报/每日经济新闻","url":"https://new.qq.com/rain/a/20260630A045R600","summary":"6月29日英伟达发文，机器人团队围绕具身智能、仿真、部署及解决方案架构四大核心方向开放招聘，北京/上海/深圳三地设岗。具身智能团队致力于打造下一代通用机器人系统，聚焦灵巧操作、配戴传感器的人体、全身移动操作与全身控制。依托Isaac机器人平台与Omniverse仿真技术，融合物理AI。仿真方向围绕IsaacSim/IsaacLab打造下一代训练基础设施。部署方向聚焦算法优化与真机部署，探索LLM与策略模型在量产机器人中的协同。人形机器人概念股午后爆发，多股20CM涨停。","category":"产业布局","rating":4,"philosophy_insight":{"framework":"具身认知 + 对立与统一","analysis":"具身认知视角：英伟达从芯片供应商转向「物理AI基础设施提供商」——灵巧操作+全身控制+仿真训练构成具身认知的完整技术栈。当GPU巨头亲自下场做机器人，意味着具身智能被认定是AI的下一个核心载体。对立统一分析：仿真(AI虚拟世界) vs 部署(机器人真实世界)的统一——英伟达的Sim-to-Real路径试图打通两个世界的壁垒。","verdict":"英伟达入局具身智能是赛道确认信号，GPU巨头从算力供应商向物理AI基础设施商转型"}},{"title":"马斯克抽调星链星舰工程师攻坚Grok 4.5：SpaceX 600亿美元收购Cursor，年内每月发布全新大模型","source":"IT之家/财联社/AI TOP100","url":"https://www.toutiao.com/article/7657122195373572644/","summary":"6月30日马斯克宣布SpaceX抽调数十名星链和星舰核心工程师全力迭代Grok大模型。SpaceX以600亿美元全股票交易收购Cursor（年收入超40亿美元），Cursor工程师加入Grok训练。Grok 4.5已在特斯拉和SpaceX内部测试，计划年内每月发布一款从零全新训练的基础大模型，彻底改写行业迭代节奏。xAI创始团队已全部离职，进行第三次重组。","category":"AI军备竞赛","rating":4,"philosophy_insight":{"framework":"扬弃 + 目的论vs机械论","analysis":"扬弃分析：SpaceX扬弃了「AI公司做AI模型」的行业惯例——取消对AI专业团队的依赖，保留航天级系统工程方法论，提升为「火箭工程师做AI」的跨界降维打法。600亿美元收购Cursor是扬弃「自建训练数据」——取消从零积累数据的路径，直接获取40亿美元收入的代码场景数据。目的论vs机械论：每月全新模型的目标是极端目的论——预设「快速迭代必胜」的目标，而不顾模型能否在一个月内真正从零训练到可靠。","verdict":"SpaceX每月出新模型是极端激进的迭代策略，成功将改写行业节奏，失败将证明AI研发有物理极限"}},{"title":"华为开源openPangu-2.0-Flash模型：920亿参数昇腾原生训练，为Agent时代打造智能底座","source":"华为官方/搜狐","url":"https://so.html5.qq.com/page/real/search_news?docid=70000021_5356a43450229752","summary":"6月30日，华为宣布开源盘古920亿参数的openPangu-2.0-Flash模型，致力于通过昇腾原生训练与推理技术，为业界用好昇腾提供最佳实践参考，助力打造Agent时代强大的智能底座。模型权重、基础推理代码、训推算子6月30日上线，Pro版本7月上线。开源平台为gitcode.com/ascend-tribe。","category":"国产开源","rating":4,"philosophy_insight":{"framework":"扬弃 + 对立与统一","analysis":"扬弃分析：华为扬弃了「闭源绑定芯片」的传统模式——取消通过封闭生态锁定客户的方式，转为开源策略吸引开发者构建昇腾生态。920亿参数Flash模型是轻量级Agent底座，定位不是追求SOTA而是追求昇腾生态的可用性和普及性。对立统一分析：开源（降低门槛）vs 昇腾绑定（锁定硬件）的统一——开源模型但必须在昇腾芯片上运行，本质是「开源换生态」。","verdict":"华为开源盘古是昇腾生态化战略的关键一步，用开源降低使用门槛换取开发者生态"}},{"title":"OpenAI推迟IPO至2027年：死咬万亿估值不松口，SpaceX上市后股价暴跌32%敲响警钟","source":"腾讯新闻/纽约时报/Yahoo Finance","url":"https://new.qq.com/rain/a/20260630A03SUC00","summary":"6月30日据纽时报导，OpenAI倾向将IPO推迟至2027年。CEO奥特曼明确拒绝接受低于1万亿美元的估值，称为「非谈判项」。顾问给出两个选项：降价上市或等到2027年冲万亿，奥特曼选择后者。SpaceX本月上市后市值从1.77万亿峰值跌至约1.03万亿，跌幅约32%，成为OpenAI决策的关键参照。软银股价单日暴跌超13%。CFO Sarah Friar已在内部推动2027年上市时间表。","category":"资本市场","rating":4,"philosophy_insight":{"framework":"证伪主义 + 语言游戏","analysis":"证伪主义分析：「1万亿美元估值」是高度可证伪的——到2027年市场会给或不会给出这个定价。SpaceX上市后32%的跌幅已经证伪了「超大规模科技IPO必然上涨」的市场共识，OpenAI选择推迟本身就是对「万亿估值是否合理」的间接承认。语言游戏分析：「万亿估值」在OpenAI叙事中是「身份标签」而非「财务判断」——接受降价会被解读为「信心不足」，维持高价即使推迟上市也不会损害品牌稀缺性。但推迟本身也是一种风险信号。","verdict":"OpenAI推迟IPO+SpaceX暴跌32%是AI资本泡沫的第一个实质性裂缝，万亿估值需要营收支撑而非叙事"}}],"startup_board":{"companies":[{"name":"优必选","field":"消费级超仿生人形机器人","route":"6月30日发布优世界U1系列（Lite/Pro/Ultra三款），11.98万起售，订单13361台，9月交付","funding":"港股上市公司，「人形机器人第一股」","verdict":"全球首个大规模量产C端仿生人形机器人，1.3万台订单是B端全年销量12倍，9月交付质量是关键考验","philosophy_tag":"否定之否定"},{"name":"自变量机器人","field":"具身智能大模型自研","route":"两个月连续完成B至C轮四轮融资，投后估值破200亿，大湾区首家","funding":"30+投资方，美团/阿里/字节/小米四巨头分别领投一轮，国家级基金加持","verdict":"资本阵容国内罕见，四巨头共识押注但200亿估值需从资本共识转向商业共识","philosophy_tag":"语言游戏"},{"name":"SpaceXAI","field":"基础大模型+代码Agent","route":"600亿美元收购Cursor，抽调星链星舰工程师攻坚Grok 4.5，计划每月发布全新模型","funding":"原xAI 200亿美元E轮融资+SpaceX上市现金流反哺","verdict":"极端激进的每月出新策略，Cursor收购补齐代码数据短板，但创始团队全离职+用户流失是隐忧","philosophy_tag":"扬弃"},{"name":"擎羽科技","field":"柔性具身智能","route":"半年内完成三轮融资（Pre-A轮由顺为资本+五源资本联合投资），2025年3月成立","funding":"累计融资数亿元，德迅投资/东方富海/顺为资本/五源资本","verdict":"柔性具身智能是新细分赛道，半年三轮融资证明市场认可，但成立仅一年技术成熟度待验证","philosophy_tag":"对立统一"}]},"pm_board":{"insights":[{"title":"人形机器人C端品类诞生：优必选U1定义了「超仿生陪伴机器人」的市场定位和定价锚点","content":"13361台C端订单（B端去年全年销量12倍）首次验证了消费级全尺寸仿生人形机器人的市场真实需求。11.98万Lite版创造可购买门槛，99万Ultra版展示品牌天花板。PM启示：新品类的成功不取决于产品是否完美，而取决于是否在用户心智中建立了清晰的品类认知。「超仿生陪伴机器人」这一定位从第一天起就与工业机器人/教育机器人/扫地机器人划清了界限。9月交付后的用户口碑将决定品类是站稳还是塌房。【哲学视角：扬弃——优必选扬弃了工业机器人的技术指标导向，保留全栈自研能力，提升为情感陪伴+品牌符号的消费级产品定位】"},{"title":"Agentic-First训练范式改写模型产品定义：从「多聪明」到「多能干」","content":"GPT-5.6的Agentic-First训练把优化目标从「答案正确率」切换到「每1000 tokens的正确操作数」，LongCat-2.0的MOPD架构融合Agent/Reasoning/Interaction三组专家。共同信号：模型产品定义从「多聪明」（benchmark得分）转向「多能干」（任务完成率）。Claude Code、Cursor、OpenClaw等Agent平台月调用量激增（非开发者用户增长189倍）。PM启示：下一代AI产品的核心竞争力不是模型能力，而是Agent在具体工作流中的任务完成可靠性。【哲学视角：否定之否定——纯对话式AI的统治正在被任务执行式Agent否定，合成为「智能+执行」的完整工作流产品】"},{"title":"OpenAI推迟IPO+GPT-5.6被管制：AI从技术产品转变为战略资产的信号","content":"同一天OpenAI被政府要求审批分发、IPO推迟到2027年，两条消息叠加传递清晰信号：前沿AI模型正在从技术产品转变为受政府管控的战略资产。Claude Fable 5曾被要求全球下线，GPT-5.6仅20家审批客户。PM启示：对依赖闭源模型API的产品来说，需要建立多模型多供应商架构，避免单一模型被政策中断。【哲学视角：目的论vs机械论——政府开始主动塑造AI发展路径（目的论），而非让市场自然涌现（机械论）】"}],"focus":["跟踪优必选U1系列9月交付质量和用户口碑，评估C端仿生机器人品类是否站稳","将Agent任务完成率（而非benchmark得分）作为AI产品核心指标","建立多模型多供应商架构，避免单一模型被政策或供应中断","关注消费级人形机器人的商业模式——硬件销售 vs 服务订阅 vs 情感陪伴增值"]},"algo_board":{"insights":[{"title":"Agentic-First训练范式：从「答案正确」到「任务完成」，模型优化目标的根本性切换","content":"GPT-5.6系列的Agentic-First训练范式是6月最重要的算法级创新——优化目标从传统的「答案正确率」变为「每1000 tokens的正确操作数」。这意味着模型从训练阶段就被优化为Agent而非聊天机器人。Ultra模式的子智能体并行架构允许模型自主拆解任务、分配子agent、并行处理、汇总结果。LongCat-2.0的MOPD架构也是类似思路——Agent/Reasoning/Interaction三组专家动态调度。共同趋势：模型训练正在从「通用对话能力」转向「任务执行效率」。【哲学视角：目的论——训练目标从「回答正确」（机械论式指标匹配）转向「完成任务」（目的论式目标达成），模型行为从被动响应变为主动规划】"},{"title":"LongCat-2.0零计算专家：token级动态算力分配的原创技术突破","content":"美团LongCat-2.0首创零计算专家机制——简单token不消耗算力，复杂token自动激活更多专家（动态范围33B~56B）。配合稀疏注意力机制(LSA)，在1M超长上下文中保持线性级计算量而非平方级。五万卡国产算力集群实现稳态日吞吐超1T tokens/day。SWE-bench Pro 59.5分超越Gemini 3.1 Pro和Claude Opus 4.6。核心意义：证明了国产算力可以支撑万亿参数模型的稳定训练和推理全流程。【哲学视角：扬弃——取消「所有token等量计算」的均匀分配思维，保留MoE稀疏激活效率，提升为token级动态算力预算的新范式】"},{"title":"AI Coding Agent三架构并立：Claude Code(终端原生)/Codex(模型原生)/Cursor(IDE原生)定义竞争格局","content":"6月标志着AI辅助软件开发进入范式分化的关键节点。Claude Code走终端原生路线（直接操作文件系统、Git工作流、理解代码库拓扑），Codex走模型原生路线（为Claude Code和Cursor提供底层引擎），Cursor走IDE原生+生态路线（开源插件库支持GitHub/Docker/AWS）。三家定位清晰、路径互补，但核心竞争正在从模型能力转向工具链深度和开发者生态绑定。【哲学视角：对立统一——三种架构不是互斥的，未来可能融合为「模型+终端+IDE」的统一开发者平台，当前各自的核心壁垒在于数据闭环而非模型能力】"}],"tech_radar":[{"direction":"Agentic-First训练范式（GPT-5.6）","status":"突破期","advice":"关注子智能体并行架构的开源复现，评估在自身Agent场景中的适用性"},{"direction":"国产算力万亿模型训练（LongCat-2.0五万卡集群）","status":"验证期","advice":"关注国产算力训练的工程实践细节，评估是否可作为备选方案"},{"direction":"零计算专家/MOPD多专家架构","status":"突破期","advice":"跟踪美团后续开源细节，token级动态算力分配是MoE架构的重要演进方向"},{"direction":"华为openPangu-2.0-Flash开源模型","status":"成长期","advice":"评估作为Agent底座的可行性，关注昇腾生态的开发体验"},{"direction":"SpaceX每月全新训练模型（Grok迭代策略）","status":"观望期","advice":"观察Grok 4.5实测表现，每月从零训练的可行性存疑"},{"direction":"AI Coding Agent三架构（Claude Code/Codex/Cursor）","status":"成长期","advice":"选择主力开发工具建立深度工作流，避免在三个平台间频繁切换"}],"focus":["理解Agentic-First训练范式的核心思想，从benchmark导向转向任务完成率导向","评估多模型多供应商架构的落地成本（API成本、切换成本、质量差异）","关注AI Coding Agent三架构的融合趋势，建立适合自身的技术栈","跟踪SpaceX每月出新模型的策略是否能持续，评估对行业迭代节奏的影响"]},"projmgr_board":{"insights":[{"title":"AI资本化周期出现裂缝：OpenAI推迟IPO+SpaceX暴跌32%+自变量四轮密集融资","content":"6月30日同日出现三重资本信号：OpenAI万亿估值IPO推迟到2027年、SpaceX上市后市值从1.77万亿跌至1.03万亿（-32%）、自变量两个月四轮融资估值破200亿。表面矛盾：一边是一级市场疯狂押注（自变量30+机构/四巨头齐聚），一边是二级市场用脚投票（SpaceX暴跌/软银股价暴跌13%）。项目经理启示：AI项目的融资窗口可能正在收窄，需要加速商业化验证，用真实营收替代估值叙事。【哲学视角：否定之否定——AI估值泡沫期的统治正在被二级市场修正否定，合成为「营收为王」的新规则】"},{"title":"从模型竞赛到生态竞赛：GPT-5.5登陆AWS+Claude 4.x登陆Azure标志闭源独占时代终结","content":"6月30日OpenAI GPT-5.5/Codex/托管Agent三件套登陆AWS Bedrock，Anthropic Claude 4.x登陆Azure AI Foundry。闭源模型独占时代正式终结——OpenAI首次在微软Azure之外直接可用，Anthropic首次在AWS上运行。对项目经理的启示：技术选型从选模型转向选云平台+模型组合，多云架构成为企业级 function renderHermes(d){

    document.getElementById('content').innerHTML='<div class="bcard"><h3>📣 Hermes 信使</h3><p>暂无内容</p></div>';return;
  }
  var h='<div class="sec">📣 Hermes 信使</div>';
  if(hb.insights&&hb.insights.length){
    h+='<div class="hermes-sec"><h3>💡 洞察</h3>';
    hb.insights.forEach(function(item){
      h+='<div class="bcard"><h3>'+esc(item.title)+'</h3><p>'+esc(item.content)+'</p>';
      if(item.url)h+='<div style="margin-top:.3rem"><a href="'+esc(item.url)+'" target="_blank" style="color:var(--accent);font-size:.8rem">🔗 来源</a></div>';

    });

    h+='<div class="hermes-sec"><h3>🌐 社区资源</h3>';

function renderPhil(d){
  var topics=(d.hot_topics||[]).filter(function(t){return t.philosophy_insight});
  if(!topics.length){
    document.getElementById('content').innerHTML='<div class="bcard"><h3>🧠 哲学洞察</h3><p>暂无内容</p></div>';return;
  }
  var h='<div class="sec">🧠 哲学洞察 ('+topics.length+'条)</div>';
  topics.forEach(function(t){
    var p=t.philosophy_insight;
    h+='<div class="bcard" style="border-left-color:var(--accent2)"><h3>'+esc(t.title)+'</h3>';
    h+='<div class="phil"><span class="fw">'+esc(p.framework||'')+'</span><p>'+esc(p.analysis||'')+'</p>';
    if(p.verdict)h+='<div class="verdict">'+esc(p.verdict)+'</div>';
    h+='</div></div>';
  });
  document.getElementById('content').innerHTML=h;
}

function renderAll(d){
  var arts=d.raw_articles||[];
  var h='<div class="search-bar"><span class="ico">\uD83D\uDD0D</span><input id="sInput" placeholder="\u641c\u7d22\u6807\u9898\u6216\u6458\u8981..." oninput="filterAll()"></div>';
  h+='<div id="allList"></div>';
  document.getElementById('content').innerHTML=h;
  window._allArts=arts;
  filterAll();
}

function filterAll(){
  var q=(document.getElementById('sInput')||{}).value||'';
  q=q.toLowerCase().trim();
  var arts=window._allArts||[];
  if(q)arts=arts.filter(function(a){return a.title.toLowerCase().indexOf(q)!==-1||a.summary.toLowerCase().indexOf(q)!==-1});
  var h='';
  if(!arts.length){h='<div style="text-align:center;padding:2rem;color:var(--t2)">\u672a\u627e\u5230\u5339\u914d\u8d44\u8baf</div>'}
  else{arts.forEach(function(a){
    h+='<div class="ncard"><div class="left"><h4><a href="'+esc(a.url)+'" target="_blank">'+esc(a.title)+'</a></h4><div class="nm">'+esc(a.source)+' · '+a.publish_time+' · '+starsStr(a.rating)+'</div></div><div class="right"><span class="cat">'+esc(a.category)+'</span></div></div>';
  })}
  document.getElementById('allList').innerHTML=h;
}

function toggleTheme(){
  var dk=document.body.getAttribute('data-theme')==='dark';
  document.body.setAttribute('data-theme',dk?'light':'dark');
  document.querySelector('.tbtn').innerHTML=dk?'&#x1F319;':'&#x2600;&#xFE0F;';
  localStorage.setItem('ai-news-theme',dk?'light':'dark');
}

document.addEventListener('DOMContentLoaded',function(){
  var sv=localStorage.getItem('ai-news-theme');
  if(sv==='dark'||(!sv&&window.matchMedia('(prefers-color-scheme:dark)').matches)){
    document.body.setAttribute('data-theme','dark');
    document.querySelector('.tbtn').innerHTML='&#x2600;&#xFE0F;';
  }
  initDays();initTabs();render();
});
</script>
