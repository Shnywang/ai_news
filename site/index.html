[data-theme=dark]{--bg:#0f0f23;--card:#1a1a2e;--text:#e2e8f0;--t2:#94a3b8;--t3:#64748b;--accent:#818cf8;--accent2:#a5b4fc;--border:#334155;--shadow:0 1px 3px rgba(0,0,0,.3);--shadow2:0 8px 24px rgba(0,0,0,.4);--star0:#475569;--ftbg:#0a0a1a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.hd{background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;padding:2rem 1.5rem;text-align:center;position:relative}
.hd h1{font-size:1.8rem;font-weight:800}.hd .sub{font-size:.9rem;opacity:.85;margin-top:.4rem}
.hd .ut{font-size:.8rem;opacity:.7;margin-top:.2rem}
.tbtn{position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,.2);border:none;border-radius:50%;width:38px;height:38px;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center}
.ct{max-width:1200px;margin:0 auto;padding:1rem}
/* Day selector */
.days{display:flex;gap:.5rem;overflow-x:auto;padding:.5rem 0;margin-bottom:1rem}

.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:1.2rem;overflow-x:auto}
.tab{padding:.7rem 1.2rem;cursor:pointer;font-size:.88rem;font-weight:600;color:var(--t2);border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}

.panel{display:none}.panel.a{display:block}
/* Cards */
.bcard{background:var(--card);border-radius:14px;padding:1.2rem;margin-bottom:1rem;box-shadow:var(--shadow);border-left:4px solid var(--accent);transition:box-shadow .2s}

.tag-r{background:#fee2e2;color:#dc2626}

.htcard .body p{font-size:.82rem;color:var(--t2);line-height:1.6}
.htcard .meta{font-size:.75rem;color:var(--t3);margin-top:.3rem}
.stars{color:var(--star);font-size:.8rem;letter-spacing:1px}

.stable{width:100%;border-collapse:collapse;font-size:.84rem;margin-bottom:1rem}
.stable th{background:var(--accent);color:#fff;padding:.6rem .8rem;text-align:left;font-weight:600;font-size:.8rem}
.stable td{padding:.6rem .8rem;border-bottom:1px solid var(--border);vertical-align:top}
.stable tr:hover td{background:rgba(99,102,241,.04)}

.radar-item{display:flex;align-items:center;gap:.8rem;padding:.6rem 0;border-bottom:1px solid var(--border)}
.radar-item:last-child{border:none}
.radar-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-green{background:#059669}.dot-yellow{background:#d97706}.dot-red{background:#dc2626}.dot-blue{background:#2563eb}
.radar-name{font-weight:600;font-size:.88rem;min-width:140px}
.radar-status{font-size:.78rem;color:var(--t2);flex:1}
.radar-advice{font-size:.78rem;color:var(--accent);font-weight:500}

.search-bar{margin-bottom:1rem;position:relative}
.search-bar input{width:100%;padding:.7rem 1rem .7rem 2.5rem;border:2px solid var(--border);border-radius:12px;font-size:.9rem;background:var(--card);color:var(--text);outline:none}
.search-bar input:focus{border-color:var(--accent)}
.search-bar .ico{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);color:var(--t3)}

.ncard{background:var(--card);border-radius:10px;padding:.8rem 1rem;margin-bottom:.6rem;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;gap:.8rem}

.ncard .left h4 a{color:var(--text);text-decoration:none}.ncard .left h4 a:hover{color:var(--accent)}
.ncard .left .nm{font-size:.75rem;color:var(--t3);margin-top:.2rem}
.ncard .right{text-align:right;flex-shrink:0}
.ncard .cat{font-size:.72rem;padding:.15rem .5rem;border-radius:8px;background:var(--accent);color:#fff;display:inline-block}
.ftr{background:var(--ftbg);color:var(--ftc);text-align:center;padding:1.2rem;margin-top:2rem;font-size:.82rem}
@media(max-width:768px){.hd h1{font-size:1.4rem}.ct{padding:.8rem}.htcard{flex-direction:column;gap:.5rem}.stable{font-size:.76rem}.tabs{gap:0}.tab{padding:.5rem .8rem;font-size:.8rem}}

暗示英伟达的\"一统天下\"格局正在被打破。"},{"title":"DeepSeek V4架构升级：Mega MoE + FP4精度的技术路线","content":"V4参数规模或达1.6万亿，激活专家数从V3的256个跃升至512个，新增FP4精度支持。技术要点：(1)FP4在2026年仍属激进选择，对量化感知训练要求极高；(2)百万Token上下文已在API端实现，长上下文推理能力成为新标杆；(3)全面适配昇腾意味着国产算力生态正式进入前沿模型训练。"},{"title":"AI编程工具三足鼎立：Cursor vs Claude Code vs Grok Build","content":"xAI入局AI编程后，赛道形成三大阵营：Cursor(IDE集成派)、Claude Code(终端Agent派)、Grok Build(CLI+GUI双轨派)。算法工程师应关注：各工具的代码生成质量差异背后是基座模型能力的差异，选型时需评估模型的代码理解深度和上下文长度，而非仅看表面功能。"}],"tech_radar":[{"direction":"Mega MoE架构(千亿级激活参数)","status":"成长期","advice":"DeepSeek V4即将验证1.6万亿参数MoE的可行性，建议关注其开源后的架构细节和复现难度"},{"direction":"FP4量化训练与推理","status":"早期","advice":"DeepSeek率先在生产模型中引入FP4，但工具链和硬件支持尚未成熟，建议观望半年"},{"direction":"训推分离芯片架构","status":"验证期","advice":"谷歌TPU 8t/8i首次实践训推硬件分离，需关注实际性能数据和成本优势是否成立"},{"direction":"百万Token长上下文","status":"成长期","advice":"DeepSeek/Gemini均已支持1M上下文，长文档处理和Agent记忆能力进入实用阶段"},{"direction":"AI编程Agent(自主编码)","status":"成长期","advice":"三大厂商同时押注，建议深度体验各工具并关注代码质量评测基准"}],"focus":["等待DeepSeek V4正式发布后的技术报告和benchmark数据","关注谷歌TPU 8t/8i的实际算力和能效比数据","评估Grok Build发布后的代码生成质量对比","关注FAIR plus 2026展会上具身智能模型的最新进展"]},"projmgr_board":{"insights":[{"title":"机器人量产项目管理挑战：FAIR plus揭示产业链协调复杂度","content":"FAIR plus 2026汇聚500+企业覆盖50+核心环节，意味着一个机器人量产项目需要协调的供应商数量和技术接口远超传统制造业。项目经理需要：(1)建立跨企业的技术接口标准化流程；(2)预留充足的集成测试周期；(3)关注关键零部件(如灵巧手执行器)的供应链瓶颈。特斯拉Optimus Gen3的50个手部执行器就是供应链复杂度的典型案例。"},{"title":"大模型发布节奏管理：DeepSeek \"悄然升级+正式发布\"的双轨策略","content":"DeepSeek先通过API静默升级(V4 Lite)收集反馈，再正式发布V4的做法值得借鉴。这种\"灰度发布\"模式降低了一次性上线的风险，也为项目经理提供了更灵活的里程碑设置方式。建议在AI产品项目中引入\"影子发布\"节点。"},{"title":"算力成本上涨对项目预算的冲击","content":"全球算力集体涨价(AWS最高100%、阿里云34%、百度30%)，AI项目的基础设施成本不再是\"可忽略的固定项\"。项目经理需要：(1)重新评估算力预算，预留20-30%弹性空间；(2)考虑混合部署策略(自建+云)；(3)将Token消耗纳入日常监控指标。"}],"focus":["关注特斯拉Optimus Gen3量产进度和供应链风险","跟踪DeepSeek V4正式发布时间和稳定性表现","重新评估项目算力预算，应对涨价潮","关注FAIR plus展后的产业合作协议签署情况"]},"action_items":{"tech_selection":["DeepSeek API已升级至1M上下文，建议现有128k方案的项目评估迁移，但需等V4正式版稳定后再批量切换","谷歌TPU 8t/8i发布，如有训练需求的团队可开始评估GCP方案，但芯片今年晚些时候才可用","AI编程工具建议同时试用Claude Code和即将发布的Grok Build，根据团队工作 /wayle123/article/details/160412370","summary":"AI编程初创企业Cursor即将完成20亿美元融资，估值达500亿美元，成为AI编程赛道迄今最大融资事件。与DeepSeek同日曝出融资消息，标志着AI行业商业化竞赛进入终局。AI编码工具从辅助编程进化为全自主Agent模式，开发者生产力工具正成为资本新宠。","category":"重要企业动态","rating":8.5},{"title":"XEmbodied：ArXiv最新VLA基础模型，18项评测领先","source":"ArXiv","url":"https://arxiv.org/abs/2604.18484","summary":"4月21日ArXiv发布XEmbodied论文，提出面向大规模具身环境的基础模型，通过内在3D几何感知和物理线索(占据图、深度、法线)增强VLM能力。在3D理解、语义推理和具身示能方面的18个评测中取得领先，解决了云端标注与真实环境间的domain gap问题。","category":"算法突破","rating":8.5},{"title":"高德发布首款四足具身机器人，阿里正式进军机器人赛道","source":"36氪/IT之家","url":"https://www.36kr.com/p/3775075041128964","summary":"阿里巴巴旗下高德具身业务部发布首款四足机器人，在北京亦庄半马赛事上公开亮相。这是阿里集团首款具身机器人产品，此前已发布ABot-M0具身模型。从具身模型到四足机器狗，阿里正加速追赶具身智能赛道头部企业，巨头布局进一步完善。","category":"重要企业动态","rating":8.5},{"title":"FAIC 2026大会：AI研究进入\"深水区\"，基础研究重回主角","source":"中新网","url":"https://www.sh.chinanews.com.cn/kjjy/2026-04-21/146094.shtml","summary":"FAIC 2026人工智能基础大会4月18-19日在上海财经大学举行，传递出清晰信号：当大模型性能竞赛持续加速，AI研究需回归基础科学。大会聚焦AI可解释性、鲁棒性和安全对齐等核心问题，呼吁学术界与产业界在基础理论层面深度协作。","category":"行业分析","rating":7.5}],"startup_board":{"companies":[{"name":"DeepSeek(深度求索)","field":"大模型基础设施","route":"万亿参数MoE+华为昇腾纯国产算力","funding":"首轮外部融资启动，估值超100亿美元(约681.8亿元)，拟募资3亿美元","verdict":"开源王者开启融资，V4即将发布，技术+生态双壁垒极强。择业价值极高但门槛也极高，核心岗位主要面向顶尖AI研究人才。"},{"name":"Cursor(Anysphere)","field":"AI编程工具","route":"IDE内嵌AI Agent自主编码","funding":"即将完成20亿美元融资，估值500亿美元","verdict":"AI编程赛道最大独角兽，从辅助编码进化到自主Agent模式。对全栈工程师极具吸引力，但赛道竞争激烈(Windsurf/Copilot)。"},{"name":"具微科技","field":"特种工业四足机器人","route":"防爆/危险环境四足机器人","funding":"两个月内狂揽4轮数亿元融资，产业资本天团入局","verdict":"\"杭州四小狗\"新锐力量，精准卡位高壁垒特种工业场景。成立仅一年融资凶猛，适合有机器人/控制背景的工程师。"},{"name":"高德具身业务部","field":"具身智能机器人","route":"四足机器人+地图导航技术融合","funding":"阿里集团内部孵化，首款硬件产品已公开亮相","verdict":"大厂内部创业团队，依托阿里地图和AI生态。对有自动驾驶/SLAM背景的人才有吸引力，但需观察独立发展空间。"}],"trend":"大模型赛道和AI编程工具迎来超级融资轮，具身智能从百亿估值俱乐部扩容到巨头亲自下场做硬件，赛道正在从\"技术验证\"快速切换到\"商业化冲刺\"。"},"pm_board":{"insights":[{"title":"国务院采购支持信号：大模型和智能体进入政府采购清单","content":"国务院首次将大模型、智能体列入正式采购支持范围，这对产品经理意味着两个关键机会：(1)ToG市场正式打开，需要设计面向政务场景的智能体产品，重点关注审批流程自动化、政务问答、文档处理等标准化场景；(2)采购标准将倒逼产品合规化，安全评测、数据隔离、可审计性成为产品准入门槛。建议PM团队立即梳理可对接政务场景的产品能力清单。"},{"title":"AI编程工具的产品形态已从\"辅助\"进化到\"自主Agent\"","content":"Cursor 500亿美元估值、Kimi K2.6支持300子Agent并发13小时编码，揭示AI编程产品正经历第三次形态跃迁：Tab补全 -> Chat对话 -> Agent自主。产品经理需重新定义\"用户\"角色——开发者从\"写代码的人\"变成\"审核代码的人\"。产品设计重点从代码质量转向任务编排、上下文管理和审批流程。"},{"title":"具身智能产品从\"Demo展示\"进入\"场景验收\"阶段","content":"高德四足机器人、Figure 02宝马产线3万辆实绩、智元精灵G2产线零失误，具身智能产品的评价标准正从\"能不能动\"切换到\"能不能用\"。PM需建立工业级验收指标体系：MTBF(平均故障间隔)、任务成功率、人机协作效率等，而非沿用实验室评测思路。"}],"focus":["政务场景智能体产品设计与合规要求","AI编程工具Agent模式的用户体验重构","具身智能产品工业级验收标准体系建设","大模型采购评价指标(安全/性能/成本)定义"]},"algo_board":{"insights":[{"title":"开源双雄格局：Kimi K2.6 vs GLM-5.1 vs Qwen3.6定义中国AI第一梯队","content":"4月份中国开源大模型集中爆发：Kimi K2.6主打编码和长链Agent(300子Agent并发)、GLM-5.1面向Agentic Engineering、Qwen3.6-Max-Preview登顶国产综合第一(全球第六)。三者技术路线差异化明显：K2.6侧重代码生成和Agent集群、GLM-5.1强调工程化Agent、Qwen3.6走全能路线。算法工程师应根据具体应用场景选型，编码Agent选K2.6，工程化部署选GLM-5.1，通用能力选Qwen3.6。"},{"title":"VLA模型进入3D感知时代：XEmbodied开辟几何增强新范式","content":"ArXiv最新论文XEmbodied提出将3D几何感知(占据图、深度、法线)内嵌到VLM基础模型中，解决传统VLA模型在真实环境部署时的domain gap问题。18项评测领先表明，具身AI大模型不能只做2D视觉-语言对齐，必须融入物理世界的3D结构信息。这对算法工程师意味着：未来具身大模型的数据采集需同步获取深度/点云/法线数据。"},{"title":"DeepSeek V4架构前瞻：万亿MoE+昇腾原生适配的工程启示","content":"V4采用万亿参数MoE架构(推理激活370亿)、1M Token上下文、推理速度35倍提升，且全面适配华为昇腾。这释放两个重要信号：(1)MoE将成为下一代大模型标配架构，稀疏激活是平衡性能与成本的唯一解；(2)国产算力生态已具备训练万亿级模型的能力，算法工程师需提前储备昇腾/CANN开发经验。"}],"tech_radar":[{"direction":"Agent集群/多Agent协作","status":"成长期","advice":"Kimi K2.6的300子Agent并发是重要里程碑。建议深入研究Agent间通信协议和任务分解策略，这将是2026下半年的核心竞争力。"},{"direction":"VLA具身基础模型","status":"验证期","advice":"XEmbodied和HY-Embodied-0.5代表两条路线(3D增强vs端到端)，建议跟踪对比两者在真实机器人部署上的表现差异。"},{"direction":"国产算力大模型训练","status":"成长期","advice":"DeepSeek V4全面昇腾化是标志性事件。建议尽早学习昇腾MindSpore/CANN开发栈，抢占国产算力工程化先机。"},{"direction":"MoE稀疏架构","status":"成长期","advice":"万亿参数MoE成为主流趋势，重点关注路由策略优化和专家负载均衡问题。"},{"direction":"Social-aware VLN","status":"早期","advice":"ArXiv最新研究将社会规范融入视觉语言导航，从可达性扩展到社会合规性。关注但暂不重仓。"}],"focus":["Kimi K2.6 / GLM-5.1 / Qwen3.6三大开源模型的Agent能力横评","XEmbodied论文的3D几何增强VLA技术路线复现","DeepSeek V4发布后的架构分析与昇腾适配经验","MCP协议安全漏洞的防护方案"]},"projmgr_board":{"insights":[{"title":"大模型迭代节奏已从\"年\"缩短到\"周\"，项目规划需适应新节奏","content":"4月份10+主流大模型集中发布(GPT-5.4-Cyber、Claude Opus 4.7、Kimi K2.6、Qwen3.6-Max、GLM-5.1)，技术迭代周期急剧压缩。项目经理面临的核心挑战：如何在技术底座频繁变更的环境下保持项目稳定推进。建议采用\"抽象层隔离\"策略——通过API网关统一对接多模型，底层模型切换不影响上层业务逻辑，将模型升级从\"项目变更\"降级为\"配置变更\"。"},{"title":"政策利好落地需快速响应：政府采购AI项目的特殊管理要求","content":"国务院将大模型/智能体纳入采购支持清单，ToG项目将迎来爆发。但政府采购项目有特殊管理要求：(1)合规审查前置(安全评测/等保/密评)，周期通常3-6个月；(2)需求变更流程严格，要求详细的变更控制记录；(3)验收标准需提前书面化。建议项目经理立即启动合规预审流程，为后续快速投标做准备。"},{"title":"具身智能项目的跨团队协作复杂度显著上升","content":"高德四足机器人项目、智元APC2026产品线、宝马工厂Figure部署等案例显示：具身智能项目需要硬件(本体)、AI(大模型/控制)、场景(应用方)三方深度协同。项目经理需建立三方联合Stand-up机制，重点管理硬件迭代周期(通常12-18月)与AI迭代周期(月级)的节奏差异，避免\"等硬件\"或\"等模型\"造成的阻塞。"}],"focus":["多模型并行管理的API网关架构方案","ToG项目合规预审流程启动(等保/密评/安全评测)","具身智能项目的硬件-AI-场景三方协同机制设计","DeepSeek V4发布后的模型迁移和回归测试计划"]},"action_items":{"tech_selection":["Agent编码场景优先评估Kimi K2.6(支持300子Agent并发/13小时持续编码)，工程化Agent选GLM-5.1，通用场景选Qwen3.6-Max","具身AI大模型方向关注XEmbodied的3D几何增强路线和腾讯HY-Embodied-0.5的端到端路线，做对比评估","国产算力储备建议开始昇腾MindSpore/CANN开发栈学习，为DeepSeek V4适配做准备","AI编程工具从Copilot/Cursor/Windsurf中选型，重点对比Agent自主编码模式的任务成功率"],"track_judgment":["AI编程赛道进入爆发期(Cursor 500亿估值)，但竞争格局尚未固化，仍有窗口期","具身智能从\"展示期\"进入\"部署元年\"(智元宣言)，产线实绩(Figure宝马3万辆)是最好的验证信号","国务院采购政策落地意味着ToG AI市场正式打开，先发优势窗口约6-12个月","DeepSeek首轮融资+V4发布将重塑中国大模型竞争格局，开源生态红利持续释放"],"watch_list":["DeepSeek V4正式发布日期和首批评测数据(预计4月底)","国务院《关于推进服务业扩能提质的意见》配套实施细则","Qwen3.6-Max-Preview正式版本发布和开源计划","具微科技后续产品量产和工业场景部署进展","MCP协议安全修复方案(20万服务器仍面临风险)","Claude Opus 4.7在高阶编程任务上的实际表现评测"]},"raw_articles":[{"id":"art-20260422-001","title":"国务院印发《关于推进服务业扩能提质的意见》，首次支持采购大模型和智能体服务","source":"财新网","url":"https://www.caixin.com/2026-04-22/102436567.html","publish_time":"2026-04-22","summary":"国务院印发《关于推进服务业扩能提质的意见》，明确提出深入实施\"人工智能+\"行动，支持采购大模型、智能体服务，加快智能编程工具研发使用。到2030年服务业总规模迈上100万亿元台阶。这是国务院首次将大模型和智能体列入采购支持清单。","category":"政策信号","rating":9.5},{"id":"art-20260422-002","title":"DeepSeek启动首轮外部融资，估值超100亿美元，V4定档4月底发布","source":"The Info F门槛。产品经理需要关注的核心变量从'能不能做到'转向'成本何时低于人工'——智元已宣布上下料成本低于人力，这是产品化的真正拐点。下一个爆发场景：消费电子组装>汽车制造>物流分拣。"},{"title":"AI Agent产品形态分化：自进化vs工具化","content":"Hermes Agent 8万Star证明用户对'自进化Agent'的强需求——不是一次性工具，而是越用越聪明的伙伴。产品设计启示：记忆系统>即时响应，个人化>通用化，本地部署>云端托管。斯坦福报告确认95%企业已部署AI，但满意度分化严重，核心瓶颈在于Agent能否'记住并改进'。"},{"title":"中美AI产品策略差异：技术追平后的商业化竞赛","content":"斯坦福报告显示中美模型差距仅2.7%，但投资规模差23倍。对产品策略意味着：中国AI产品应充分利用技术追平窗口，以场景密度和落地速度取胜，而非陷入基准评测军备竞赛。具身智能领域中国已占先发优势（融资量、量产速度均领先），需在标准化和生态上巩固。"}],"focus":["智元新发布的7大解决方案具体场景覆盖（判断可复制的产品模板）","它石智航AWE3.0通用具身大模型的能力边界和API开放度","中国人形机器人生态大会的B端客户反馈和需求共性"]},"algo_board":{"insights":[{"title":"具身大模型进入'能干活'阶段：AWE3.0 vs 智元四大模型","content":"本周两大具身大模型密集发布：它石智航AWE3.0号称全球首个'能干活'的通用具身大模型，智元同步发布4个AI大模型。算法工程师需要关注的技术路线分化——AWE3.0走通用大一统路线（单模型覆盖多任务），智元走专精分工路线（4个模型各司其职）。两条路径的训练范式、数据需求、部署成本截然不同。"},{"title":"运动控制算法突破：从3.3m/s到10m/s的底层范式","content":"宇树H1一年内奔跑速度从3.3m/s跃升至10m/s（3倍提升），核心突破在强化学习策略优化和sim-to-real迁移效率。创始人预计年中超越博尔特，意味着仿真训练+实体迁移的闭环已经跑通。对算法方向启示：运动控制不再是瓶颈，操作灵巧度（manipulation dexterity）才是下一个高价值研究前沿。"},{"title":"AI编程工具全面Agent化：从补全到自主编程","content":"斯坦福报告和多家媒体横评确认，2026年AI编程工具已从代码补全全面进入Agent自主编程时代。Claude Code、Cursor CLI、Codex CLI五大工具在复杂重构、大代码库分析等场景表现已接近中级工程师。对具身智能开发意味着：代码生产力瓶颈大幅降低，核心竞争力进一步向算法创新和系统设计倾斜。"}],"tech_radar":[{"direction":"通用具身大模型(AWE3.0/智元系列)","status":"成长期","advice":"高度关注。两大技术路线(通用vs专精)正面竞争，建议深入研读两家技术报告，判断数据范式和训练效率差异"},{"direction":"人形机器人高速运动控制","status":"成长期","advice":"关键节点。宇树10m/s证明RL+sim2real范式天花板远超预期，但操作灵巧度仍是蓝海"},{"direction":"自进化AI Agent框架(Hermes Agent等)","status":"验证期","advice":"积极实验。持久记忆+自动技能创建是差异化方向，但生产级稳定性有待验证"},{"direction":"AI编程Agent(Claude Code/Codex CLI)","status":"成长期","advice":"深度使用。已达中级工程师水平，应将其作为日常开发标配，节省精力聚焦算法创新"},{"direction":"具身智能数据新范式(Human-centric采集)","status":"早期","advice":"跟踪了解。它石智航提出的以人为中心数据范式可能改变训练数据获取方式"}],"focus":["智元4月17日发布的4个AI大模型技术细节和开放策略","它石智航AWE3.0模型架构和训练数据量级","ICLR 2026具身智能相关论文（D2E: Scaling Vision-Action Pretraining on Desktop Data等）","宇树H1运动控制sim-to-real迁移的具体技术方案"]},"projmgr_board":{"insights":[{"title":"具身智能项目节奏：从年度规划到季度冲刺","content":"智元3年营收增20 var days=["2026-04-23","2026-04-22","2026-04-20","2026-04-17"];

function pickDay(d,el){

function renderAlgo(d){
  var b=d.algo_board;
  if(!b){document.getElementById('content').innerHTML='<div class="bcard"><p>暂无新动态</p></div>';return}
  var h='<div class="sec">🧬 算法工程师板块</div>';
  (b.insights||[]).forEach(function(t){
    h+='<div class="bcard"><h3>'+esc(t.title)+'</h3><p>'+esc(t.content)+'</p></div>';
  });
  if(b.tech_radar&&b.tech_radar.length){
    h+='<div class="sec">🛰️ 技术雷达</div><div class="bcard">';
    b.tech_radar.forEach(function(r){
      var dot=r.status.indexOf('验证')!==-1?'dot-green':r.status.indexOf('成长')!==-1?'dot-blue':r.status.indexOf('观望')!==-1?'dot-yellow':'dot-red';
      h+='<div class="radar-item"><span class="radar-dot '+dot+'"></span><span class="radar-name">'+esc(r.direction)+'</span><span class="radar-status">'+esc(r.status)+'</span><span class="radar-advice">'+esc(r.advice)+'</span></div>';
    });
    h+='</div>';
  }
  if(b.focus&&b.focus.length){
    h+='<div class="sec">📌 未来关注重点</div><div class="bcard"><ul>';
    b.focus.forEach(function(f){h+='<li>'+esc(f)+'</li>'});
    h+='</ul></div>';
  }
  document.getElementById('content').innerHTML=h;
}

function renderAll(d){
  var arts=d.raw_articles||[];
  var h='<div class="search-bar"><span class="ico">\uD83D\uDD0D</span><input id="sInput" placeholder="\u641c\u7d22\u6807\u9898\u6216\u6458\u8981..." oninput="filterAll()"></div>';
  h+='<div id="allList"></div>';
  document.getElementById('content').innerHTML=h;
  window._allArts=arts;
  filterAll();
}

function filterAll(){
  var q=(document.getElementById('sInput')||{}).value||'';
  q=q.toLowerCase().trim();
  var arts=window._allArts||[];
  if(q)arts=arts.filter(function(a){return a.title.toLowerCase().indexOf(q)!==-1||a.summary.toLowerCase().indexOf(q)!==-1});
  var h='';
  if(!arts.length){h='<div style="text-align:center;padding:2rem;color:var(--t2)">\u672a\u627e\u5230\u5339\u914d\u8d44\u8baf</div>'}
  else{arts.forEach(function(a){
    h+='<div class="ncard"><div class="left"><h4><a href="'+esc(a.url)+'" target="_blank">'+esc(a.title)+'</a></h4><div class="nm">'+esc(a.source)+' · '+a.publish_time+' · '+starsStr(a.rating)+'</div></div><div class="right"><span class="cat">'+esc(a.category)+'</span></div></div>';
  })}
  document.getElementById('allList').innerHTML=h;
}

function toggleTheme(){
  var dk=document.body.getAttribute('data-theme')==='dark';
  document.body.setAttribute('data-theme',dk?'light':'dark');
  document.querySelector('.tbtn').innerHTML=dk?'&#x1F319;':'&#x2600;&#xFE0F;';
  localStorage.setItem('ai-news-theme',dk?'light':'dark');
}

document.addEventListener('DOMContentLoaded',function(){
  var sv=localStorage.getItem('ai-news-theme');
  if(sv==='dark'||(!sv&&window.matchMedia('(prefers-color-scheme:dark)').matches)){
    document.body.setAttribute('data-theme','dark');
    document.querySelector('.tbtn').innerHTML='&#x2600;&#xFE0F;';
  }
  initDays();initTabs();render();
});
</script>
